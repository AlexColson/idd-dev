# Local path overrides for cross-submodule crate resolution.
#
# Each submodule's Cargo.toml declares published crates.io versions as
# dependencies. These patches redirect those references to the local
# submodule paths so everything builds coherently from this root without
# touching any submodule's committed Cargo.toml.
#
# Add an entry here when a crate is referenced across submodule boundaries.
# Remove this file (or specific entries) when publishing to crates.io.

[patch.crates-io]
idd-dsl-core   = { path = "idd-dsl/crates/idd-dsl-core" }
idd-dsl-parser = { path = "idd-dsl/crates/idd-dsl-parser" }
idd-macros     = { path = "idd-dsl/crates/idd-macros" }
idd-core       = { path = "idd/crates/idd-core" }
idd-fir-core   = { path = "idd-fir/crates/idd-fir-core" }
idd-fir-fs     = { path = "idd-fir/crates/idd-fir-fs" }
# idd-cli        = { path = "idd/crates/idd-cli" }
# idd-fir-cli    = { path = "idd-fir/crates/idd-fir-cli" }

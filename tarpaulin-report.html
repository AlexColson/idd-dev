<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

cope::Function);\n    }\n\n    #[test]\n    fn test_serialization() {\n        let scopes = vec![\n            Scope::Global,\n            Scope::Platform,\n            Scope::Project,\n            Scope::Domain,\n            Scope::Module,\n            Scope::Interface,\n            Scope::Function,\n        ];\n\n        for scope in \u0026scopes {\n            let json = serde_json::to_string(scope).unwrap();\n            let deserialized: Scope = serde_json::from_str(\u0026json).unwrap();\n            assert_eq!(scope, \u0026deserialized);\n        }\n    }\n\n    #[test]\n    fn test_deserialization_all_variants() {\n        let json = r#\"[\n            \"global\",\n            \"platform\",\n            \"project\",\n            \"domain\",\n            \"module\",\n            \"interface\",\n            \"function\"\n        ]\"#;\n        let scopes: Vec\u003cScope\u003e = serde_json::from_str(json).unwrap();\n        assert_eq!(scopes.len(), 7);\n    }\n\n    #[test]\n    fn test_deserialization_unknown_variant() {\n        let json = r#\"\"unknown_scope\"\"#;\n        let result: Result\u003cScope, _\u003e = serde_json::from_str(json);\n        assert!(result.is_err());\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","alex","dev","rust","idd-dev","idd-dsl","crates","idd-dsl-core","src","severity.rs"],"content":"use serde::{Deserialize, Serialize};\n\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\n#[serde(rename_all = \"snake_case\")]\npub enum Severity {\n    Hard,\n    Soft,\n    Info,\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_severity_equality() {\n        assert_eq!(Severity::Hard, Severity::Hard);\n        assert_ne!(Severity::Hard, Severity::Soft);\n        assert_ne!(Severity::Soft, Severity::Info);\n        assert_ne!(Severity::Hard, Severity::Info);\n    }\n\n    #[test]\n    fn test_serialization() {\n        let severities = vec![Severity::Hard, Severity::Soft, e {\n    #[serde(default)]\n    declaration: Vec\u003cTomlDeclaration\u003e,\n    #[serde(default)]\n    import: Vec\u003cTomlImport\u003e,\n}\n\n#[derive(Debug, Deserialize)]\nstruct TomlDeclaration {\n    id: String,\n    kind: String,\n    scope: String,\n    severity: String,\n    statement: String,\n    rationale: String,\n    #[serde(default)]\n    owner: Option\u003cString\u003e,\n    #[serde(default)]\n    enforcement_points: Vec\u003cString\u003e,\n    #[serde(default)]\n    tags: Vec\u003cString\u003e,\n    #[serde(default)]\n    r#override: Option\u003cTomlOverride\u003e,\n    #[serde(default)]\n    feature_ref: Option\u003cString\u003e,\n}\n\n#[derive(Debug, Deserialize)]\nstruct TomlOverride {\n    overridden_id: String,\n    rationale: String,\n}\n\n#[derive(Debug, Deserialize)]\nstruct TomlImport {\n    library: String,\n    version: String,\n    #[serde(default)]\n    bindings: Vec\u003cTomlBinding\u003e,\n}\n\n#[derive(Debug, Deserialize)]\nstruct TomlBinding {\n    abstract_role: String,\n    concrete_module: String,\n}\n\n#[derive(Debug)]\npub struct IntentFile {\n    pub declarations: Vec\u003cDeclaration\u003e,\n    pub imports: Vec\u003cImportDeclaration\u003e,\n}\n\nfn parse_kind(s: \u0026str) -\u003e Result\u003cDeclarationKind, ParseError\u003e {\n    match s {\n        \"invariant\" =\u003e Ok(DeclarationKind::Invariant),\n        \"precondition\" =\u003e Ok(DeclarationKind::Precondition),\n        \"postcondition\" =\u003e Ok(DeclarationKind::Postcondition),\n        \"assumption\" =\u003e Ok(DeclarationKind::Assumption),\n        \"coupling_limit\" =\u003e Ok(DeclarationKind::CouplingLimit),\n        \"temporal\" =\u003e Ok(DeclarationKind::Temporal),\n        \"resource_bound\" =\u003e Ok(DeclarationKind::ResourceBound),\n        \"process_constraint\" =\u003e Ok(DeclarationKind::ProcessConstraint),\n        \"feature_constraint\" =\u003e Ok(DeclarationKind::FeatureConstraint),\n        other =\u003e Err(ParseError::InvalidKind(other.into())),\n    }\n}\n\nfn parse_scope(s: \u0026str) -\u003e Result\u003cScope, ParseError\u003e {\n    match s {\n        \"global\" =\u003e Ok(Scope::Global),\n        \"platform\" =\u003e Ok(Scope::Platform),\n        \"project\" =\u003e Ok(Scope::Project),\n        \"domain\" =\u003e Ok(Scope::Domain),\n        \"module\" =\u003e Ok(Scope::Module),\n        \"interface\" =\u003e Ok(Scope::Interface),\n        \"function\" =\u003e Ok(Scope::Function),\n        other =\u003e Err(ParseError::InvalidScope(other.into())),\n    }\n}\n\nfn parse_severity(s: \u0026str) -\u003e Result\u003cSeverity, ParseError\u003e {\n    match s {\n        \"hard\" =\u003e Ok(Severity::Hard),\n        \"soft\" =\u003e Ok(Severity::Soft),\n        \"info\" =\u003e Ok(Severity::Info),\n        other =\u003e Err(ParseError::InvalidSeverity(other.into())),\n    }\n}\n\nfn parse_enforcement_point(s: \u0026str) -\u003e Result\u003cEnforcementPoint, ParseError\u003e {\n    match s {\n        \"expression\" =\u003e Ok(EnforcementPoint::Expression),\n        \"development\" =\u003e Ok(EnforcementPoint::Development),\n        \"property_based_tests\" =\u003e Ok(EnforcementPoint::PropertyBasedTests),\n        \"reasoning_tools\" =\u003e Ok(EnforcementPoint::ReasoningTools),\n        \"pre_commit\" =\u003e Ok(EnforcementPoint::PreCommit),\n        \"ci\" =\u003e Ok(EnforcementPoint::Ci),\n        \"runtime\" =\u003e Ok(EnforcementPoint::Runtime),\n        other =\u003e Err(ParseError::InvalidEnforcementPoint(other.into())),\n    }\n}\n\nfn toml_to_declaration(t: TomlDeclaration) -\u003e Result\u003cDeclaration, ParseError\u003e {\n    let kind = parse_kind(\u0026t.kind)?;\n    let scope = parse_scope(\u0026t.scope)?;\n    let severity = parse_severity(\u0026t.severity)?;\n\n    let points: Result\u003cVec\u003c_\u003e, _\u003e = t\n        .enforcement_points\n        .iter()\n        .map(|s| parse_enforcement_point(s))\n        .collect();\n    let enforcement_profile = EnforcementProfile::new(points?);\n\n    let overrides = t\n        .r#override\n        .map(|o| idd_dsl_core::declaration::OverrideInfo {\n            overridden_id: o.overridden_id,\n            rationale: o.rationale,\n        });\n\n    Ok(Declaration {\n        id: DeclarationId::new(t.id),\n        kind,\n        scope,\n        severity,\n        statement: t.statement,\n        rationale: t.rationale,\n        owner: t.owner,\n        enforcement_profile,\n        tags: t.tags,\n        overrides,\n        feature_ref: t.feature_ref,\n    })\n}\n\nfn toml_to_import(t: TomlImport) -\u003e ImportDeclaration {\n    ImportDeclaration {\n        library: t.library,\n        version: t.version,\n        bindings: t\n            .bindings\n            .into_iter()\n            .map(|b| ImportBinding {\n                abstract_role: b.abstract_role,\n                concrete_module: b.concrete_module,\n            })\n            .collect(),\n    }\n}\n\npub fn parse_intent_file(path: \u0026Path) -\u003e Result\u003cIntentFile, ParseError\u003e {\n    let content = std::fs::read_to_string(path)?;\n    let doc: TomlIntentFile = toml::from_str(\u0026content)?;\n\n    let declarations: Result\u003cVec\u003c_\u003e, _\u003e = doc\n        .declaration\n        .into_iter()\n        .map(toml_to_declaration)\n        .collect();\n\n    let imports = doc.import.into_iter().map(toml_to_import).collect();\n\n    Ok(IntentFile {\n        declarations: declarations?,\n        imports,\n    })\n}\n\n/// Check for duplicate declaration IDs across multiple parsed intent files.\n/// Returns an error for the first duplicate found.\npub fn check_duplicate_ids(\n    files: \u0026[(impl AsRef\u003cstd::path::Path\u003e, \u0026IntentFile)],\n) -\u003e Result\u003c(), ParseError\u003e {\n    let mut seen = std::collections::HashMap::new();\n    for (path, file) in files {\n        for decl in \u0026file.declarations {\n            let id = \u0026decl.id.0;\n            let path_str = path.as_ref().display().to_string();\n            if let Some(prev_path) = seen.insert(id.clone(), path_str) {\n                return Err(ParseError::DuplicateId(\n                    id.clone(),\n                    format!(\"{} and {}\", prev_path, path.as_ref().display()),\n                ));\n            }\n        }\n    }\n    Ok(())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    fn parse_str(content: \u0026str) -\u003e Result\u003cIntentFile, ParseError\u003e {\n        let doc: TomlIntentFile = toml::from_str(content)?;\n\n        let declarations: Result\u003cVec\u003c_\u003e, _\u003e = doc\n            .declaration\n            .into_iter()\n            .map(toml_to_declaration)\n            .collect();\n\n        let imports = doc.import.into_iter().map(toml_to_import).collect();\n\n        Ok(IntentFile {\n            declarations: declarations?,\n            imports,\n        })\n    }\n\n    #[test]\n    fn parse_minimal_declaration() {\n        let input = r#\"\n[[declaration]]\nid = \"no-direct-db-access\"\nkind = \"invariant\"\nscope = \"project\"\nseverity = \"hard\"\nstatement = \"All data access goes through the repository layer\"\nrationale = \"Ensures testability\"\n\"#;\n\n        let result = parse_str(input).unwrap();\n        assert_eq!(result.declarations.len(), 1);\n\n        let decl = \u0026result.declarations[0];\n        assert_eq!(decl.id.0, \"no-direct-db-access\");\n        assert!(matches!(decl.kind, DeclarationKind::Invariant));\n        assert!(matches!(decl.scope, Scope::Project));\n        assert!(matches!(decl.severity, Severity::Hard));\n        assert!(decl.tags.is_empty());\n        assert!(decl.overrides.is_none());\n    }\n\n    #[test]\n    fn parse_declaration_with_all_fields() {\n        let input = r#\"\n[[declaration]]\nid = \"payment-latency\"\nkind = \"temporal\"\nscope = \"function\"\nseverity = \"hard\"\nstatement = \"Must complete within 500ms at p99\"\nrationale = \"User is waiting\"\nowner = \"payments-team\"\nenforcement_points = [\"ci\", \"runtime\"]\ntags = [\"performance\", \"user-facing\"]\nfeature_ref = \"FIR-3\"\n\n[declaration.override]\noverridden_id = \"project.api-latency-200ms\"\nrationale = \"Cold path\"\n\"#;\n\n        let result = parse_str(input).unwrap();\n        let decl = \u0026result.declarations[0];\n\n        assert_eq!(decl.id.0, \"payment-latency\");\n        assert!(matches!(decl.kind, DeclarationKind::Temporal));\n        assert!(matches!(decl.scope, Scope::Function));\n        assert_eq!(decl.owner.as_deref(), Some(\"payments-team\"));\n        assert_eq!(decl.tags, vec![\"performance\", \"user-facing\"]);\n        assert_eq!(decl.enforcement_profile.points.len(), 2);\n        assert!(matches!(\n            decl.enforcement_profile.points[0],\n            EnforcementPoint::Ci\n        ));\n        assert!(matches!(\n            decl.enforcement_profile.points[1],\n            EnforcementPoint::Runtime\n        ));\n        let ov = decl.overrides.as_ref().unwrap();\n        assert_eq!(ov.overridden_id, \"project.api-latency-200ms\");\n        assert_eq!(ov.rationale, \"Cold path\");\n        assert_eq!(decl.feature_ref.as_deref(), Some(\"FIR-3\"));\n    }\n\n    #[test]\n    fn parse_imports_with_bindings() {\n        let input = r#\"\n[[import]]\nlibrary = \"idd-lib/gdpr\"\nversion = \"2.1.0\"\n\n[[import.bindings]]\nabstract_role = \"data-controller\"\nconcrete_module = \"billing\"\n\n[[import.bindings]]\nabstract_role = \"personal-data-store\"\nconcrete_module = \"user-db\"\n\"#;\n\n        let result = parse_str(input).unwrap();\n        assert_eq!(result.imports.len(), 1);\n\n        let imp = \u0026result.imports[0];\n        assert_eq!(imp.library, \"idd-lib/gdpr\");\n        assert_eq!(imp.version, \"2.1.0\");\n        assert_eq!(imp.bindings.len(), 2);\n        assert_eq!(imp.bindings[0].abstract_role, \"data-controller\");\n        assert_eq!(imp.bindings[0].concrete_module, \"billing\");\n    }\n\n    #[test]\n    fn parse_multiple_declarations_ egistry, Story,\n    StoryId,\n};\nuse idd_fir_fs::FileBackend;\nuse std::path::Path;\n\nfn parse_status(s: \u0026str) -\u003e Result\u003cFeatureStatus\u003e {\n    match s {\n        \"wish\" =\u003e Ok(FeatureStatus::Wish),\n        \"exploring\" =\u003e Ok(FeatureStatus::Exploring),\n        \"scoping\" =\u003e Ok(FeatureStatus::Scoping),\n        \"designing\" =\u003e Ok(FeatureStatus::Designing),\n        \"ready\" =\u003e Ok(FeatureStatus::Ready),\n        \"in-progress\" =\u003e Ok(FeatureStatus::InProgress),\n        \"verifying\" =\u003e Ok(FeatureStatus::Verifying),\n        \"done\" =\u003e Ok(FeatureStatus::Done),\n        \"abandoned\" =\u003e Ok(FeatureStatus::Abandoned),\n        \"deferred\" =\u003e Ok(FeatureStatus::Deferred),\n        _ =\u003e anyhow::bail!(\"invalid status: {s}\"),\n    }\n}\n\n#[derive(Parser)]\n#[command(name = \"idd-fir\", about = \"Feature Intent Registry CLI\", version)]\nstruct Cli {\n    #[arg(short, long, default_value = \".\")]\n    root: std::path::PathBuf,\n\n    #[command(subcommand)]\n    command: FirCommand,\n}\n\n#[derive(Subcommand)]\nenum FirCommand {\n    /// Create a new feature, story, or decision\n    New(NewArgs),\n    /// List features by filter criteria\n    List(ListArgs),\n    /// Show an entity with its relationships\n    Show(ShowArgs),\n    /// Advance a feature to the next natural status\n    Promote(PromoteArgs),\n    /// Set a feature's status explicitly\n    Status(StatusArgs),\n    /// Defer a feature with a recorded reason\n    Defer(DeferArgs),\n    /// Abandon a feature with a recorded reason\n    Abandon(AbandonArgs),\n    /// Create a relationship between entities\n    Link(LinkArgs),\n    /// Create a decision record\n    Decide(DecideArgs),\n    /// Show the dependency graph\n    Graph(GraphArgs),\n    /// Show agent context preview\n    Context(ContextArgs),\n    /// Run integrity and health checks\n    Check(CheckArgs),\n    Update(UpdateArgs),\n    Search(SearchArgs),\n    Note(NoteArgs),\n}\n\n#[derive(Parser)]\nstruct NewArgs {\n    title: String,\n    #[arg(long, default_value = \"feature\")]\n    kind: NewKind,\n    #[arg(long, default_value = \"wish\")]\n    status: String,\n    #[arg(long)]\n    tag: Vec\u003cString\u003e,\n    #[arg(long)]\n    story: Option\u003cString\u003e,\n    #[arg(long)]\n    depends_on: Vec\u003cString\u003e,\n    #[arg(long)]\n    constraint: Vec\u003cString\u003e,\n    #[arg(long)]\n    body: Option\u003cString\u003e,\n}\n\n#[derive(clap::ValueEnum, Clone)]\nenum NewKind {\n    Feature,\n    Story,\n    Decision,\n}\n\n#[derive(Parser)]\nstruct ListArgs {\n    #[arg(long)]\n    status: Vec\u003cString\u003e,\n    #[arg(long)]\n    story: Option\u003cString\u003e,\n    #[arg(long)]\n    tag: Option\u003cString\u003e,\n    #[arg(long)]\n    constraint: Option\u003cString\u003e,\n    #[arg(long)]\n    blocks: Option\u003cString\u003e,\n    #[arg(long)]\n    depends_on: Option\u003cString\u003e,\n    #[arg(long)]\n    stale_days: Option\u003cu32\u003e,\n}\n\n#[derive(Parser)]\nstruct ShowArgs {\n    id: String,\n    #[arg(long, default_value = \"full\")]\n    depth: ShowDepth,\n}\n\n#[derive(clap::ValueEnum, Clone)]\nenum ShowDepth {\n    Summary,\n    Full,\n    Graph,\n}\n\n#[derive(Parser)]\nstruct PromoteArgs {\n    id: String,\n    #[arg(long)]\n    reason: Option\u003cString\u003e,\n}\n\n#[derive(Parser)]\nstruct StatusArgs {\n    id: String,\n    status: String,\n}\n\n#[derive(Parser)]\nstruct DeferArgs {\n    id: String,\n    reason: String,\n}\n\n#[derive(Parser)]\nstruct AbandonArgs {\n    id: String,\n    reason: String,\n}\n\n#[derive(Parser, Default)]\nstruct LinkArgs {\n    id: String,\n    #[arg(long)]\n    depends_on: Vec\u003cString\u003e,\n    #[arg(long)]\n    blocks: Vec\u003cString\u003e,\n    #[arg(long)]\n    related: Vec\u003cString\u003e,\n    #[arg(long)]\n    story: Option\u003cString\u003e,\n    #[arg(long)]\n    constraint: Vec\u003cString\u003e,\n}\n\n#[derive(Parser)]\nstruct DecideArgs {\n    title: String,\n    #[arg(long)]\n    feature: Vec\u003cString\u003e,\n    #[arg(long)]\n    constraint: Vec\u003cString\u003e,\n}\n\n#[derive(Parser)]\nstruct GraphArgs {\n    #[arg(long)]\n    root: Option\u003cString\u003e,\n    #[arg(long)]\n    story: Option\u003cString\u003e,\n    #[arg(long, default_value = \"2\")]\n    depth: usize,\n}\n\n#[derive(Parser)]\nstruct ContextArgs {\n    #[arg(long)]\n    scope: Option\u003cString\u003e,\n    #[arg(long)]\n    for_feature: Option\u003cString\u003e,\n}\n\n#[derive(Parser)]\nstruct CheckArgs {\n    #[arg(long)]\n    checks: Vec\u003cString\u003e,\n}\n\n#[derive(Parser, Default)]\nstruct UpdateArgs {\n    id: String,\n    #[arg(long)]\n    title: Option\u003cString\u003e,\n    #[arg(long)]\n    status: Option\u003cString\u003e,\n    #[arg(long)]\n    tag: Vec\u003cString\u003e,\n    #[arg(long)]\n    set_tags: bool,\n    #[arg(long)]\n    body: Option\u003cString\u003e,\n    #[arg(long)]\n    append_body: Option\u003cString\u003e,\n    #[arg(long)]\n    priority: Option\u003cString\u003e,\n    #[arg(long)]\n    effort: Option\u003cString\u003e,\n    #[arg(long)]\n    source: Option\u003cString\u003e,\n    #[arg(long)]\n    add_depends_on: Vec\u003cString\u003e,\n    #[arg(long)]\n    add_blocks: Vec\u003cString\u003e,\n    #[arg(long)]\n    add_related: Vec\u003cString\u003e,\n    #[arg(long)]\n    add_constraint: Vec\u003cString\u003e,\n}\n\n#[derive(Parser)]\nstruct SearchArgs {\n    query: String,\n    #[arg(long, default_value = \"all\")]\n    scope: SearchScope,\n}\n\n#[derive(clap::ValueEnum, Clone)]\nenum SearchScope {\n    Features,\n    Stories,\n    Decisions,\n    All,\n}\n\n#[derive(Parser)]\nstruct NoteArgs {\n    id: String,\n    note: String,\n    #[arg(long)]\n    ref_: Option\u003cString\u003e,\n}\n\nfn main() -\u003e Result\u003c()\u003e {\n    let args: Vec\u003cString\u003e = std::env::args().collect();\n    if args.iter().any(|a| a == \"--describe\") {\n        println!(\"Feature Intent Registry — track features, stories, and constraints\");\n        return Ok(());\n    }\n    if args.iter().any(|a| a == \"--metadata\") {\n        println!(\n            r#\"{{\"description\":\"Feature Intent Registry — track features, stories, and constraints\",\"version\":\"{}\"}}\"#,\n            env!(\"CARGO_PKG_VERSION\")\n        );\n        return Ok(());\n    }\n\n    let cli = Cli::parse();\n\n    match cli.command {\n        FirCommand::New(args) =\u003e cmd_new(\u0026cli.root, args),\n        FirCommand::List(args) =\u003e cmd_list(\u0026cli.root, args),\n        FirCommand::Show(args) =\u003e cmd_show(\u0026cli.root, args),\n        FirCommand::Promote(args) =\u003e cmd_promote(\u0026cli.root, args),\n        FirCommand::Status(args) =\u003e cmd_status(\u0026cli.root, args),\n        FirCommand::Defer(args) =\u003e cmd_defer(\u0026cli.root, args),\n        FirCommand::Abandon(args) =\u003e cmd_abandon(\u0026cli.root, args),\n        FirCommand::Link(args) =\u003e cmd_link(\u0026cli.root, args),\n        FirCommand::Decide(args) =\u003e cmd_decide(\u0026cli.root, args),\n        FirCommand::Graph(args) =\u003e cmd_graph(\u0026cli.root, args),\n        FirCommand::Context(args) =\u003e cmd_context(\u0026cli.root, args),\n        FirCommand::Check(args) =\u003e cmd_check(\u0026cli.root, args),\n        FirCommand::Update(args) =\u003e {\n            let mut backend = load_backend(\u0026cli.root)?;\n            cmd_update(\u0026mut backend, args)\n        }\n        FirCommand::Search(args) =\u003e {\n            let backend = load_backend(\u0026cli.root)?;\n            cmd_search(\u0026backend, args)\n        }\n        FirCommand::Note(args) =\u003e {\n            let mut backend = load_backend(\u0026cli.root)?;\n            cmd_note(\u0026mut backend, args)\n        }\n    }\n}\n\nfn load_backend(root: \u0026Path) -\u003e Result\u003cFileBackend\u003e {\n    FileBackend::new(root.to_path_buf())\n        .map_err(|e| anyhow::anyhow!(\"failed to load FIR registry: {e}\"))\n}\n\nfn load_registry(root: \u0026Path) -\u003e Result\u003c(FileBackend, Registry)\u003e {\n    let mut backend = load_backend(root)?;\n    let registry = backend.load_all().map_err(|e| anyhow::anyhow!(\"{e}\"))?;\n    Ok((backend, registry))\n}\n\nfn load_feature_mut(\n    _backend: \u0026mut impl FirBackend,\n    registry: \u0026Registry,\n    id: \u0026str,\n) -\u003e Result\u003c(FeatureId, Feature)\u003e {\n    let fid = FeatureId(id.to_string());\n    let feature = registry\n        .feature(\u0026fid)\n        .cloned()\n        .ok_or_else(|| anyhow::anyhow!(\"Feature {id} not found\"))?;\n    Ok((fid, feature))\n}\n\nfn dedup_push\u003cT: PartialEq\u003e(vec: \u0026mut Vec\u003cT\u003e, items: impl IntoIterator\u003cItem = T\u003e) {\n    for item in items {\n        if !vec.contains(\u0026item) {\n            vec.push(item);\n        }\n    }\n}\n\nfn cmd_new(root: \u0026Path, args: NewArgs) -\u003e Result\u003c()\u003e {\n    let mut backend = load_backend(root)?;\n    let mut registry = backend.load_all().map_err(|e| anyhow::anyhow!(\"{e}\"))?;\n\n    let today = chrono::Utc::now().naive_utc().date();\n    let constraints: Vec\u003c_\u003e = args\n        .constraint\n        .iter()\n        .cloned()\n        .map(idd_dsl_core::DeclarationId)\n        .collect();\n    let body = args.body.clone().unwrap_or_default();\n\n    match args.kind {\n        NewKind::Feature =\u003e {\n            let id = registry.alloc_feature_id();\n            let feature = new_feature(\u0026id, \u0026args, today, constraints, body)?;\n            backend\n                .save_feature(\u0026feature)\n                .map_err(|e| anyhow::anyhow!(\"{e}\"))?;\n            println!(\"Created feature {id}: {}\", feature.title);\n        }\n        NewKind::Story =\u003e {\n            let id = registry.alloc_story_id();\n            let story = new_story(\u0026id, \u0026args, today, constraints, body);\n            backend\n                .save_story(\u0026story)\n                .map_err(|e| anyhow::anyhow!(\"{e}\"))?;\n            println!(\"Created story {id}: {}\", story.title);\n        }\n        NewKind::Decision =\u003e {\n            let id = registry.alloc_decision_id();\n            let decision = new_decision(\u0026id, \u0026args, today, constraints, body);\n            backend\n                .save_decision(\u0026decision)\n                .map_err(|e| anyhow::anyhow!(\"{e}\"))?;\n            println!(\"Created decision {id}: {}\", decision.title);\n        }\n    }\n\n    Ok(())\n}\n\nfn new_feature(\n    id: \u0026FeatureId,\n    args: \u0026NewArgs,\n    today: chrono::NaiveDate,\n    constraints: Vec\u003cidd_dsl_core::DeclarationId\u003e,\n    body: String,\n) -\u003e Result\u003cFeature\u003e {\n    Ok(Feature {\n        id: id.clone(),\n        title: args.title.clone(),\n        status: parse_status(\u0026args.status)?,\n        created: today,\n        updated: None,\n        author: std::env::var(\"USER\")\n            .ok()\n            .or_else(|| std::env::var(\"USERNAME\").ok()),\n        promoted_from: None,\n        promoted_date: None,\n        story: args.story.as_ref().map(|s| StoryId(s.clone())),\n        depends_on: args\n            .depends_on\n            .iter()\n            .map(|s| FeatureId(s.clone()))\n            .collect(),\n        blocks: Vec::new(),\n        related: Vec::new(),\n        children: Vec::new(),\n        constraints,\n        preliminary_constraints: Vec::new(),\n        decisions: Vec::new(),\n        source: None,\n        conversations: Vec::new(),\n        tags: args.tag.clone(),\n        priority: None,\n        effort_estimate: None,\n        external: None,\n        body,\n    })\n}\n\nfn new_story(\n    id: \u0026StoryId,\n    args: \u0026NewArgs,\n    today: chrono::NaiveDate,\n    constraints: Vec\u003cidd_dsl_core::DeclarationId\u003e,\n    body: String,\n) -\u003e Story {\n    Story {\n        id: id.clone(),\n        title: args.title.clone(),\n        status: args.status.clone(),\n        created: today,\n        features: Vec::new(),\n        constraints,\n        tags: args.tag.clone(),\n        body,\n    }\n}\n\nfn new_decision(\n    id: \u0026DecisionId,\n    args: \u0026NewArgs,\n    today: chrono::NaiveDate,\n    constraints: Vec\u003cidd_dsl_core::DeclarationId\u003e,\n    body: String,\n) -\u003e Decision {\n    Decision {\n        id: id.clone(),\n        title: args.title.clone(),\n        date: today,\n        status: \"proposed\".into(),\n        features: args\n            .depends_on\n            .iter()\n            .map(|s| FeatureId(s.clone()))\n            .collect(),\n        constraints,\n        body,\n    }\n}\n\nfn cmd_list(root: \u0026Path, args: ListArgs) -\u003e Result\u003c()\u003e {\n    let mut backend = load_backend(root)?;\n    let registry = backend.load_all().map_err(|e| anyhow::anyhow!(\"{e}\"))?;\n\n    let mut query = Query::new(\u0026registry);\n\n    if !args.status.is_empty() {\n        let statuses: Vec\u003cFeatureStatus\u003e = args\n            .status\n            .iter()\n            .filter_map(|s| parse_status(s).ok())\n            .collect();\n        query = query.status(statuses);\n    }\n\n    if let Some(tag) = args.tag {\n        query = query.tag(tag);\n    }\n\n    if let Some(story) = args.story {\n        query = query.story(StoryId(story));\n    }\n\n    if let Some(blocks) = args.blocks {\n        query = query.blocks(FeatureId(blocks));\n    }\n\n    if let Some(constraint) = args.constraint {\n        query = query.constraint(constraint);\n    }\n\n    if let Some(depends_on) = args.depends_on {\n        query = query.depends_on(FeatureId(depends_on));\n    }\n\n    if let Some(days) = args.stale_days {\n        let now = chrono::Utc::now().naive_utc().date();\n        query = query.recent_days(days, now);\n    }\n\n    let features = query.resolve();\n\n    if features.is_empty() {\n        println!(\"No features match the given criteria.\");\n        return Ok(());\n    }\n\n    for f in \u0026features {\n        let deps_suffix = join_display(\u0026f.depends_on)\n            .map(|d| format!(\" — depends on: {d}\"))\n            .unwrap_or_default();\n        println!(\"- {} [{}] {}{deps_suffix}\", f.id.0, f.status, f.title);\n    }\n\n    Ok(())\n}\n\nfn cmd_show(root: \u0026Path, args: ShowArgs) -\u003e Result\u003c()\u003e {\n    let mut backend = load_backend(root)?;\n    let registry = backend.load_all().map_err(|e| anyhow::anyhow!(\"{e}\"))?;\n\n    if let Some(feature) = registry.features.iter().find(|f| f.id.0 == args.id) {\n        println!(\"Feature: {} — {}\", feature.id.0, feature.title);\n        println!(\"Status: {}\", feature.status);\n        if let Some(author) = \u0026feature.author {\n            println!(\"Author: {author}\");\n        }\n        println!(\"Created: {}\", feature.created);\n        print_if_nonempty(\"Tags\", join_display(\u0026feature.tags));\n        print_if_nonempty(\"Depends on\", join_display(\u0026feature.depends_on));\n        print_if_nonempty(\"Blocks\", join_display(\u0026feature.blocks));\n        print_if_nonempty(\"Constraints\", join_display(\u0026feature.constraints));\n        print_if_nonempty(\"Decisions\", join_display(\u0026feature.decisions));\n\n        if matches!(args.depth, ShowDepth::Full | ShowDepth::Graph) \u0026\u0026 !feature.body.is_empty() {\n            println!(\"\\n{}\", feature.body);\n        }\n\n        if matches!(args.depth, ShowDepth::Graph) {\n            print_related(\u0026registry, feature);\n        }\n    } else if let Some(story) = registry.stories.iter().find(|s| s.id.0 == args.id) {\n        println!(\"Story: {} — {}\", story.id.0, story.title);\n        println!(\"Status: {}\", story.status);\n        println!(\"Features: {}\", story.features.len());\n        print_if_nonempty(\"  Features\", join_display(\u0026story.features));\n        print_if_nonempty(\"Constraints\", join_display(\u0026story.constraints));\n        if !story.body.is_empty() {\n            println!(\"\\n{}\", story.body);\n        }\n    } else if let Some(decision) = registry.decisions.iter().find(|d| d.id.0 == args.id) {\n        println!(\"Decision: {} — {}\", decision.id.0, decision.title);\n        println!(\"Status: {}\", decision.status);\n        println!(\"Date: {}\", decision.date);\n        print_if_nonempty(\"Features\", join_display(\u0026decision.features));\n        print_if_nonempty(\"Constraints\", join_display(\u0026decision.constraints));\n        if !decision.body.is_empty() {\n            println!(\"\\n{}\", decision.body);\n        }\n    } else {\n        println!(\"Entity '{}' not found.\", args.id);\n    }\n\n    Ok(())\n}\n\nfn print_if_nonempty(label: \u0026str, value: Option\u003cString\u003e) {\n    if let Some(v) = value {\n        println!(\"{label}: {v}\");\n    }\n}\n\nfn join_display(items: impl IntoIterator\u003cItem = impl std::fmt::Display\u003e) -\u003e Option\u003cString\u003e {\n    let mut iter = items.into_iter().peekable();\n    if iter.peek().is_none() {\n        None\n    } else {\n        Some(iter.map(|x| x.to_string()).collect::\u003cVec\u003c_\u003e\u003e().join(\", \"))\n    }\n}\n\nfn print_related(registry: \u0026idd_fir_core::Registry, feature: \u0026idd_fir_core::Feature) {\n    println!(\"\\nRelationships:\");\n    for dep_id in \u0026feature.depends_on {\n        if let Some(dep) = registry.feature(dep_id) {\n            println!(\n                \"  ← depends on: {} [{}] {}\",\n                dep.id.0, dep.status, dep.title\n            );\n        }\n    }\n    for block_id in \u0026feature.blocks {\n        if let Some(blocked) = registry.feature(block_id) {\n            println!(\n                \"  → blocks: {} [{}] {}\",\n                blocked.id.0, blocked.status, blocked.title\n            );\n        }\n    }\n    if let Some(story_id) = \u0026feature.story {\n        if let Some(story) = registry.story(story_id) {\n            println!(\"  ↑ story: {} — {}\", story.id.0, story.title);\n        }\n    }\n}\n\nfn cmd_promote(root: \u0026Path, args: PromoteArgs) -\u003e Result\u003c()\u003e {\n    let (mut backend, registry) = load_registry(root)?;\n    let (_fid, mut feature) = load_feature_mut(\u0026mut backend, \u0026registry, \u0026args.id)?;\n\n    let next = feature.status.next().ok_or_else(|| {\n        anyhow::anyhow!(\n            \"Feature {} is in terminal status ({})\",\n            args.id,\n            feature.status\n        )\n    })?;\n\n    feature.promoted_from = Some(feature.status.to_string());\n    feature.promoted_date = Some(chrono::Utc::now().naive_utc().date());\n    feature.updated = Some(chrono::Utc::now().naive_utc().date());\n    feature.status = next;\n\n    backend\n        .save_feature(\u0026feature)\n        .map_err(|e| anyhow::anyhow!(\"{e}\"))?;\n    println!(\"Promoted {} to {}\", args.id, feature.status);\n\n    Ok(())\n}\n\nfn cmd_status(root: \u0026Path, args: StatusArgs) -\u003e Result\u003c()\u003e {\n    let (mut backend, registry) = load_registry(root)?;\n    let (_fid, mut feature) = load_feature_mut(\u0026mut backend, \u0026registry, \u0026args.id)?;\n\n    feature.updated = Some(chrono::Utc::now().naive_utc().date());\n    feature.status = parse_status(\u0026args.status)?;\n\n    backend\n        .save_feature(\u0026feature)\n        .map_err(|e| anyhow::anyhow!(\"{e}\"))?;\n    println!(\"Set {} status to {}\", args.id, feature.status);\n\n    Ok(())\n}\n\nfn cmd_defer(root: \u0026Path, args: DeferArgs) -\u003e Result\u003c()\u003e {\n    let (mut backend, registry) = load_registry(root)?;\n    let (_fid, mut feature) = load_feature_mut(\u0026mut backend, \u0026registry, \u0026args.id)?;\n\n    let today = chrono::Utc::now().naive_utc().date();\n    feature.updated = Some(today);\n    feature.status = FeatureStatus::Deferred;\n    feature.body = format!(\n        \"{}\\n\\n### Deferred: {today}\\nReason: {}\",\n        feature.body, args.reason\n    );\n\n    backend\n        .save_feature(\u0026feature)\n        .map_err(|e| anyhow::anyhow!(\"{e}\"))?;\n    println!(\"Deferred {}: {}\", args.id, args.reason);\n\n    Ok(())\n}\n\nfn cmd_abandon(root: \u0026Path, args: AbandonArgs) -\u003e Result\u003c()\u003e {\n    let (mut backend, registry) = load_registry(root)?;\n    let (fid, mut feature) = load_feature_mut(\u0026mut backend, \u0026registry, \u0026args.id)?;\n\n    let today = chrono::Utc::now().naive_utc().date();\n    feature.updated = Some(today);\n    feature.status = FeatureStatus::Abandoned;\n    feature.body = format!(\n        \"{}\\n\\n### Abandoned: {today}\\nReason: {}\",\n        feature.body, args.reason\n    );\n\n    backend\n        .save_feature(\u0026feature)\n        .map_err(|e| anyhow::anyhow!(\"{e}\"))?;\n    backend\n        .archive_feature(\u0026fid)\n        .map_err(|e| anyhow::anyhow!(\"{e}\"))?;\n    println!(\"Abandoned {}: {}\", args.id, args.reason);\n\n    Ok(())\n}\n\nfn cmd_link(root: \u0026Path, args: LinkArgs) -\u003e Result\u003c()\u003e {\n    let (mut backend, registry) = load_registry(root)?;\n    let (_fid, mut feature) = load_feature_mut(\u0026mut backend, \u0026registry, \u0026args.id)?;\n\n    dedup_push(\n        \u0026mut feature.depends_on,\n        args.depends_on.into_iter().map(FeatureId),\n    );\n    dedup_push(\u0026mut feature.blocks, args.blocks.into_iter().map(FeatureId));\n    dedup_push(\n        \u0026mut feature.related,\n        args.related.into_iter().map(FeatureId),\n    );\n    if let Some(story) = \u0026args.story {\n        feature.story = Some(StoryId(story.clone()));\n    }\n    dedup_push(\n        \u0026mut feature.constraints,\n        args.constraint.into_iter().map(idd_dsl_core::DeclarationId),\n    );\n\n    feature.updated = Some(chrono::Utc::now().naive_utc().date());\n    backend\n        .save_feature(\u0026feature)\n        .map_err(|e| anyhow::anyhow!(\"{e}\"))?;\n    println!(\"Updated links for {}\", args.id);\n\n    Ok(())\n}\n\nfn cmd_decide(root: \u0026Path, args: DecideArgs) -\u003e Result\u003c()\u003e {\n    let mut backend = load_backend(root)?;\n    let mut registry = backend.load_all().map_err(|e| anyhow::anyhow!(\"{e}\"))?;\n\n    let id = registry.alloc_decision_id();\n    let decision = idd_fir_core::Decision {\n        id: id.clone(),\n        title: args.title,\n        date: chrono::Utc::now().naive_utc().date(),\n        status: \"proposed\".into(),\n        features: args.feature.into_iter().map(FeatureId).collect(),\n        constraints: args\n            .constraint\n            .into_iter()\n            .map(idd_dsl_core::DeclarationId)\n            .collect(),\n        body: String::new(),\n    };\n\n    backend\n        .save_decision(\u0026decision)\n        .map_err(|e| anyhow::anyhow!(\"{e}\"))?;\n    println!(\"Created decision {id}: {}\", decision.title);\n\n    Ok(())\n}\n\nfn get_graph_features\u003c'a\u003e(registry: \u0026'a Registry, args: \u0026GraphArgs) -\u003e Vec\u003c\u0026'a Feature\u003e {\n    if let Some(root_id) = \u0026args.root {\n        let fid = FeatureId(root_id.clone());\n        registry\n            .transitive_dependencies_depth(\u0026fid, args.depth)\n            .into_iter()\n            .collect()\n    } else if let Some(story) = \u0026args.story {\n        let sid = StoryId(story.clone());\n        registry.features_by_story(\u0026sid).into_iter().collect()\n    } else {\n        registry.active_features().into_iter().collect()\n    }\n}\n\nfn print_feature(f: \u0026Feature) {\n    let deps = join_display(\u0026f.depends_on);\n    let blocks = join_display(\u0026f.blocks);\n    println!(\"{} [{}]\", f.id.0, f.title);\n    if let Some(d) = deps {\n        println!(\"  ← depends on: {d}\");\n    }\n    if let Some(b) = blocks {\n        println!(\"  → blocks: {b}\");\n    }\n}\n\nfn cmd_graph(root: \u0026Path, args: GraphArgs) -\u003e Result\u003c()\u003e {\n    let mut backend = load_backend(root)?;\n    let registry = backend.load_all().map_err(|e| anyhow::anyhow!(\"{e}\"))?;\n\n    let features = get_graph_features(\u0026registry, \u0026args);\n    for f in features {\n        print_feature(f);\n    }\n\n    Ok(())\n}\n\nfn filter_by_scope(features: \u0026mut Vec\u003c\u0026Feature\u003e, scope: \u0026str) {\n    let scope_lower = scope.to_lowercase();\n    features.retain(|f| {\n        f.title.to_lowercase().contains(\u0026scope_lower)\n            || f.tags\n                .iter()\n                .any(|t| t.to_lowercase().contains(\u0026scope_lower))\n            || f.body.to_lowercase().contains(\u0026scope_lower)\n    });\n}\n\nfn filter_by_feature(features: \u0026mut Vec\u003c\u0026Feature\u003e, related_feature: \u0026Feature) -\u003e bool {\n    let fid = related_feature.id.clone();\n    let related_tags: std::collections::HashSet\u003c_\u003e = related_feature.tags.iter().collect();\n\n    let any_related = features.iter().any(|f| {\n        f.id == fid\n            || f.depends_on.contains(\u0026fid)\n            || f.blocks.contains(\u0026fid)\n            || f.tags.iter().any(|t| related_tags.contains(t))\n    });\n\n    if any_related {\n        features.retain(|f| {\n            f.id == fid\n                || f.depends_on.contains(\u0026fid)\n                || f.blocks.contains(\u0026fid)\n                || f.tags.iter().any(|t| related_tags.contains(t))\n        });\n    }\n    any_related\n}\n\nfn format_feature_line(f: \u0026Feature) -\u003e String {\n    let deps = join_display(\u0026f.depends_on);\n    let blocks = join_display(\u0026f.blocks);\n\n    let mut line = format!(\"- {} [{}] {}\", f.id.0, f.status, f.title);\n    if let Some(d) = deps {\n        line.push_str(\u0026format!(\" — depends on: {d}\"));\n    }\n    if let Some(b) = blocks {\n        line.push_str(\u0026format!(\" — blocks: {b}\"));\n    }\n    line\n}\n\nfn print_active_features(features: \u0026[\u0026Feature]) {\n    println!(\"ACTIVE FEATURES:\");\n    for f in features {\n        println!(\"{}\", format_feature_line(f));\n        print_if_nonempty(\"  Constraints\", join_display(\u0026f.constraints));\n    }\n}\n\nfn print_wishes(registry: \u0026Registry) {\n    let wishes = registry.features_by_status(FeatureStatus::Wish);\n    if !wishes.is_empty() {\n        println!(\"\\nFORWARD DESIGN CONTEXT:\");\n        for f in \u0026wishes {\n            println!(\n                \"- {} [wish] {} — consider this when designing related areas\",\n                f.id.0, f.title\n            );\n        }\n    }\n}\n\nfn cmd_context(root: \u0026Path, args: ContextArgs) -\u003e Result\u003c()\u003e {\n    let (_backend, registry) = load_registry(root)?;\n    let mut active = registry.active_features();\n\n    if let Some(scope) = \u0026args.scope {\n        filter_by_scope(\u0026mut active, scope);\n    }\n\n    if let Some(for_feature) = \u0026args.for_feature {\n        let fid = FeatureId(for_feature.clone());\n        if let Some(feature) = registry.feature(\u0026fid) {\n            filter_by_feature(\u0026mut active, feature);\n        }\n    }\n\n    if active.is_empty() {\n        println!(\"No active features.\");\n        return Ok(());\n    }\n\n    print_active_features(\u0026active);\n    print_wishes(\u0026registry);\n\n    Ok(())\n}\n\nfn cmd_check(root: \u0026Path, _args: CheckArgs) -\u003e Result\u003c()\u003e {\n    let mut backend = load_backend(root)?;\n    let registry = backend.load_all().map_err(|e| anyhow::anyhow!(\"{e}\"))?;\n\n    let findings =\n        idd_fir_core::IntegrityChecker::check_all(\u0026registry, \u0026std::collections::HashSet::new());\n\n    if findings.is_empty() {\n        println!(\"All checks passed.\");\n        return Ok(());\n    }\n\n    for finding in \u0026findings {\n        let severity = match finding.severity {\n            idd_fir_core::FindingSeverity::Error =\u003e \"ERROR\",\n            idd_fir_core::FindingSeverity::Warning =\u003e \"WARN\",\n        };\n        println!(\"[{severity}] {}: {}\", finding.entity, finding.description);\n    }\n\n    if findings\n        .iter()\n        .any(|f| matches!(f.severity, idd_fir_core::FindingSeverity::Error))\n    {\n        anyhow::bail!(\"Integrity check failed\");\n    }\n\n    Ok(())\n}\n\nfn update_basic_fields(feature: \u0026mut Feature, args: \u0026UpdateArgs) -\u003e Result\u003c()\u003e {\n    if let Some(title) = \u0026args.title {\n        feature.title = title.clone();\n    }\n    if let Some(status) = \u0026args.status {\n        feature.status = parse_status(status)?;\n    }\n    if args.set_tags {\n        feature.tags = args.tag.clone();\n    } else if !args.tag.is_empty() {\n        dedup_push(\u0026mut feature.tags, args.tag.iter().cloned());\n    }\n    if let Some(body) = \u0026args.body {\n        feature.body = body.clone();\n    }\n    if let Some(append) = \u0026args.append_body {\n        if !feature.body.is_empty() {\n            feature.body.push('\\n');\n        }\n        feature.body.push_str(append);\n    }\n    Ok::\u003c(), anyhow::Error\u003e(())\n}\n\nfn update_metadata_fields(feature: \u0026mut Feature, args: \u0026UpdateArgs) {\n    if let Some(priority) = \u0026args.priority {\n        feature.priority = Some(priority.clone());\n    }\n    if let Some(effort) = \u0026args.effort {\n        feature.effort_estimate = Some(effort.clone());\n    }\n    if let Some(source) = \u0026args.source {\n        feature.source = Some(source.clone());\n    }\n}\n\nfn update_relationships(feature: \u0026mut Feature, args: \u0026UpdateArgs) {\n    dedup_push(\n        \u0026mut feature.depends_on,\n        args.add_depends_on.iter().map(|s| FeatureId(s.clone())),\n    );\n    dedup_push(\n        \u0026mut feature.blocks,\n        args.add_blocks.iter().map(|s| FeatureId(s.clone())),\n    );\n    dedup_push(\n        \u0026mut feature.related,\n        args.add_related.iter().map(|s| FeatureId(s.clone())),\n    );\n    dedup_push(\n        \u0026mut feature.constraints,\n        args.add_constraint\n            .iter()\n            .map(|s| idd_dsl_core::DeclarationId(s.clone())),\n    );\n}\n\nfn cmd_update\u003cB: FirBackend\u003e(backend: \u0026mut B, args: UpdateArgs) -\u003e Result\u003c()\u003e {\n    let registry = backend.load_all().map_err(|e| anyhow::anyhow!(\"{e}\"))?;\n    let (_fid, mut feature) = load_feature_mut(backend, \u0026registry, \u0026args.id)?;\n\n    update_basic_fields(\u0026mut feature, \u0026args)?;\n    update_metadata_fields(\u0026mut feature, \u0026args);\n    update_relationships(\u0026mut feature, \u0026args);\n\n    feature.updated = Some(chrono::Utc::now().naive_utc().date());\n    backend\n        .save_feature(\u0026feature)\n        .map_err(|e| anyhow::anyhow!(\"{e}\"))?;\n    println!(\"Updated {}\", args.id);\n\n    Ok(())\n}\n\nfn cmd_search\u003cB: FirBackend\u003e(backend: \u0026B, args: SearchArgs) -\u003e Result\u003c()\u003e {\n    let results = backend.search(\u0026args.query);\n\n    if results.is_empty() {\n        println!(\"No results for \\\"{}\\\".\", args.query);\n        return Ok(());\n    }\n\n    println!(\"{} result(s) for \\\"{}\\\":\\n\", results.len(), args.query);\n    for r in \u0026results {\n        let kind_label = match r.kind {\n            idd_fir_core::SearchKind::Feature =\u003e \"FIR\",\n            idd_fir_core::SearchKind::Story =\u003e \"STORY\",\n            idd_fir_core::SearchKind::Decision =\u003e \"DEC\",\n        };\n        println!(\"[{kind_label}] {} — {}\", r.id, r.title);\n        if !r.excerpt.is_empty() {\n            println!(\"  {}\", r.excerpt.chars().take(120).collect::\u003cString\u003e());\n        }\n        println!();\n    }\n\n    Ok(())\n}\n\nfn add_note_to_body(feature: \u0026mut Feature, note: \u0026str) -\u003e String {\n    let today = chrono::Utc::now().naive_utc().date();\n    let heading = if !feature.body.is_empty() \u0026\u0026 !feature.body.ends_with('\\n') {\n        format!(\"\\n\\n### {today} — {note}\", note = note)\n    } else {\n        format!(\"### {today} — {note}\", note = note)\n    };\n    feature.body.push_str(\u0026heading);\n    feature.updated = Some(today);\n    heading\n}\n\nfn cmd_note\u003cB: FirBackend\u003e(backend: \u0026mut B, args: NoteArgs) -\u003e Result\u003c()\u003e {\n    let registry = backend.load_all().map_err(|e| anyhow::anyhow!(\"{e}\"))?;\n    let (_fid, mut feature) = load_feature_mut(backend, \u0026registry, \u0026args.id)?;\n\n    if let Some(ref_) = \u0026args.ref_ {\n        feature.conversations.push(idd_fir_core::Conversation {\n            date: chrono::Utc::now().naive_utc().date(),\n            ref_: ref_.clone(),\n        });\n    }\n\n    let _ = add_note_to_body(\u0026mut feature, \u0026args.note);\n    backend\n        .save_feature(\u0026feature)\n        .map_err(|e| anyhow::anyhow!(\"{e}\"))?;\n    println!(\"Added note to {}: {}\", args.id, args.note);\n\n    Ok(())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use idd_fir_core::{\n        Decision, DecisionId, Feature, FeatureStatus, InMemoryBackend, Registry, SearchKind, Story,\n    };\n    use proptest::prelude::*;\n\n    fn seed_backend() -\u003e InMemoryBackend {\n        let mut reg = Registry::new();\n        reg.next_feature_id = 1;\n        reg.next_story_id = 1;\n        reg.next_decision_id = 1;\n        reg.features.push(Feature {\n            id: FeatureId::new(0),\n            title: \"Test feature\".into(),\n            status: FeatureStatus::Wish,\n            created: chrono::NaiveDate::from_ymd_opt(2026, 1, 1).unwrap(),\n            updated: None,\n            author: Some(\"test\".into()),\n            promoted_from: None,\n            promoted_date: None,\n            story: None,\n            depends_on: vec![],\n            blocks: vec![],\n            related: vec![],\n            children: vec![],\n            constraints: vec![],\n            preliminary_constraints: vec![],\n            decisions: vec![],\n            source: None,\n            conversations: vec![],\n            tags: vec![\"tag-a\".into()],\n            priority: None,\n            effort_estimate: None,\n            external: None,\n            body: \"Initial body content\".into(),\n        });\n        reg.features.push(Feature {\n            id: FeatureId::new(1),\n            title: \"GDPR data deletion\".into(),\n            status: FeatureStatus::Designing,\n            created: chrono::NaiveDate::from_ymd_opt(2026, 2, 1).unwrap(),\n            updated: None,\n            author: Some(\"test\".into()),\n            promoted_from: None,\n            promoted_date: None,\n            story: None,\n            depends_on: vec![FeatureId::new(0)],\n            blocks: vec![],\n            related: vec![],\n            children: vec![],\n            constraints: vec![],\n            preliminary_constraints: vec![],\n            decisions: vec![],\n            source: None,\n            conversations: vec![],\n            tags: vec![\"compliance\".into(), \"data-layer\".into()],\n            priority: Some(\"high\".into()),\n            effort_estimate: Some(\"large\".into()),\n            external: None,\n            body: \"GDPR Article 17 requires full data deletion capability.\".into(),\n        });\n        reg.stories.push(Story {\n            id: StoryId::new(0),\n            title: \"Compliance story\".into(),\n            status: \"active\".into(),\n            created: chrono::NaiveDate::from_ymd_opt(2026, 1, 1).unwrap(),\n            features: vec![FeatureId::new(1)],\n            constraints: vec![],\n            tags: vec![\"compliance\".into()],\n            body: \"All compliance obligations.\".into(),\n        });\n        reg.decisions.push(Decision {\n            id: DecisionId::new(0),\n            title: \"Use event bus for deletion\".into(),\n            date: chrono::NaiveDate::from_ymd_opt(2026, 3, 1).unwrap(),\n            status: \"accepted\".into(),\n            features: vec![FeatureId::new(1)],\n            constraints: vec![],\n err = cmd_note(\n            \u0026mut backend,\n            NoteArgs {\n                id: \"FIR-99\".into(),\n                note: \"ghost\".into(),\n                ref_: None,\n            },\n        )\n        .unwrap_err();\n        assert!(err.to_string().contains(\"not found\"));\n    }\n\n    #[test]\n    fn note_multiple_accumulate() {\n        let mut backend = seed_backend();\n        cmd_note(\n            \u0026mut backend,\n            NoteArgs {\n                id: \"FIR-0\".into(),\n                note: \"First note\".into(),\n                ref_: None,\n            },\n        )\n        .unwrap();\n        cmd_note(\n            \u0026mut backend,\n            NoteArgs {\n                id: \"FIR-0\".into(),\n                note: \"Second note\".into(),\n                ref_: None,\n            },\n        )\n        .unwrap();\n        let f = backend.load_feature(\u0026FeatureId::new(0)).unwrap();\n        assert!(f.body.contains(\"First note\"));\n        assert!(f.body.contains(\"Second note\"));\n    }\n\n    // ── Hand-written: link --related ──────────────────────\n\n    #[test]\n    fn link_adds_related() {\n        let mut backend = seed_backend();\n        let registry = backend.load_all().unwrap();\n        let fid = FeatureId::new(0);\n        let mut feature = registry.feature(\u0026fid).unwrap().clone();\n        let rel_id = FeatureId::new(1);\n        feature.related.push(rel_id);\n        feature.updated = Some(chrono::Utc::now().naive_utc().date());\n        backend.save_feature(\u0026feature).unwrap();\n        let f = backend.load_feature(\u0026FeatureId::new(0)).unwrap();\n        assert_eq!(f.related, vec![FeatureId::new(1)]);\n    }\n\n    // ── PBT: update invariants ────────────────────────────\n\n    proptest! {\n        #[test]\n        fn update_preserves_unmodified_fields(\n            new_title in \"[a-zA-Z ]{5,30}\",\n            new_tag in \"[a-z-]{3,15}\",\n        ) {\n            let mut backend = seed_backend();\n            let before = backend.load_feature(\u0026FeatureId::new(0)).unwrap();\n\n            cmd_update(\u0026mut backend, UpdateArgs {\n                id: \"FIR-0\".into(),\n                title: Some(new_title.clone()),\n                tag: vec![new_tag],\n                ..Default::default()\n            }).unwrap();\n\n            let after = backend.load_feature(\u0026FeatureId::new(0)).unwrap();\n            prop_assert_eq!(after.title, new_title);\n            prop_assert_eq!(after.author, before.author);\n            prop_assert_eq!(after.created, before.created);\n            prop_assert_eq!(after.status, before.status);\n            prop_assert_eq!(after.body, before.body);\n            prop_assert_eq!(after.priority, before.priority);\n            prop_assert_eq!(after.effort_estimate, before.effort_estimate);\n            prop_assert_eq!(after.source, before.source);\n            prop_assert_eq!(after.depends_on, before.depends_on);\n            prop_assert_eq!(after.blocks, before.blocks);\n            prop_assert_eq!(after.conversations, before.conversations);\n            prop_assert!(after.updated.is_some());\n        }\n\n        #[test]\n        fn update_never_removes_existing_tags_when_adding(\n            extra_tags in prop::collection::vec(\"[a-z-]{2,10}\", 0..5),\n        ) {\n            let mut backend = seed_backend();\n            cmd_update(\u0026mut backend, UpdateArgs {\n                id: \"FIR-0\".into(),\n                tag: extra_tags,\n                ..Default::default()\n            }).unwrap();\n\n            let f = backend.load_feature(\u0026FeatureId::new(0)).unwrap();\n            prop_assert!(f.tags.contains(\u0026\"tag-a\".into()));\n        }\n\n        #[test]\n        fn update_set_tags_can_empty(\n            _seed in any::\u003cu8\u003e(),\n        ) {\n            let mut backend = seed_backend();\n            cmd_update(\u0026mut backend, UpdateArgs {\n                id: \"FIR-0\".into(),\n String,\n    pub kind: SearchKind,\n    pub title: String,\n    pub excerpt: String,\n}\n\n#[derive(Debug, Clone)]\npub enum SearchKind {\n    Feature,\n    Story,\n    Decision,\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","alex","dev","rust","idd-dev","idd-fir","crates","idd-fir-core","src","integrity.rs"],"content":"use crate::model::{FeatureId, Registry};\nuse idd_dsl_core::DeclarationId;\nuse std::collections::HashSet;\n\n#[derive(Debug, Clone)]\npub struct IntegrityFinding {\n    pub severity: Severity,\n    pub entity: String,\n    pub description: String,\n}\n\n#[derive(Debug, Clone)]\npub enum Severity {\n    Error,\n    Warning,\n}\n\npub struct IntegrityChecker;\n\nimpl IntegrityChecker {\n    pub fn check_all(\n        registry: \u0026Registry,\n        known_constraints: \u0026HashSet\u003cDeclarationId\u003e,\n    ) -\u003e Vec\u003cIntegrityFinding\u003e {\n        let mut findings = Vec::new();\n        Self::check_referential(registry, \u0026mut findings);\n        Self::check_cycles(registry, \u0026mut findings);\n        Self::check_orphans(registry, \u0026mut findings);\n        Self::check_duplicate_feature_ids(registry, \u0026mut findings);\n        Self::check_duplicate_story_ids(registry, \u0026mut findings);\n        Self::check_duplicate_decision_ids(registry, \u0026mut findings);\n        Self::check_constraint_references(registry, known_constraints, \u0026mut findings);\n        findings\n    }\n\n    fn check_referential(registry: \u0026Registry, findings: \u0026mut Vec\u003cIntegrityFinding\u003e) {\n        for feature in \u0026registry.features {\n            for dep_id in \u0026feature.depends_on {\n                if registry.feature(dep_id).is_none() {\n                    findings.push(IntegrityFinding {\n                        severity: Severity::Error,\n                        entity: feature.id.0.clone(),\n                        description: format!(\"depends on unknown feature {}\", dep_id.0),\n                    });\n                }\n            }\n            for block_id in \u0026feature.blocks {\n                if registry.feature(block_id).is_none() {\n                    findings.push(IntegrityFinding {\n                        severity: Severity::Error,\n                        entity: feature.id.0.clone(),\n                        description: format!(\"blocks unknown feature {}\", block_id.0),\n                    });\n                }\n            }\n            if let Some(story_id) = \u0026feature.story {\n                if registry.story(story_id).is_none() {\n                    findings.push(IntegrityFinding {\n                        severity: Severity::Error,\n                        entity: feature.id.0.clone(),\n                        description: format!(\"references unknown story {}\", story_id.0),\n                    });\n                }\n            }\n            for dec_id in \u0026feature.decisions {\n                if registry.decision(dec_id).is_none() {\n                    findings.push(IntegrityFinding {\n                        severity: Severity::Warning,\n                        entity: feature.id.0.clone(),\n                        description: format!(\"references unknown decision {}\", dec_id.0),\n                    });\n                }\n            }\n        }\n    }\n\n    fn check_cycles(registry: \u0026Registry, findings: \u0026mut Vec\u003cIntegrityFinding\u003e) {\n        for feature in \u0026registry.features {\n            let mut visited = std::collections::HashSet::new();\n            if Self::has_cycle(registry, \u0026feature.id, \u0026mut visited) {\n                findings.push(IntegrityFinding {\n                    severity: Severity::Error,\n                    entity: feature.id.0.clone(),\n                    description: \"dependency cycle detected\".into(),\n                });\n            }\n        }\n    }\n\n    fn has_cycle(\n        registry: \u0026Registry,\n        id: \u0026FeatureId,\n        visited: \u0026mut std::collections::HashSet\u003cFeatureId\u003e,\n    ) -\u003e bool {\n        if !visited.insert(id.clone()) {\n            return true;\n        }\n        let Some(feature) = registry.feature(id) else {\n            return false;\n        };\n        for dep_id in \u0026feature.depends_on {\n            if Self::has_cycle(registry, dep_id, visited) {\n                return true;\n            }\n        }\n        visited.remove(id);\n        false\n    }\n\n    fn check_orphans(registry: \u0026Registry, findings: \u0026mut Vec\u003cIntegrityFinding\u003e) {\n        for feature in \u0026registry.features {\n            if feature.story.is_none() \u0026\u0026 !feature.tags.is_empty() {\n                findings.push(IntegrityFinding {\n                    severity: Severity::Warning,\n                    entity: feature.id.0.clone(),\n                    description: \"feature has no parent story\".into(),\n                });\n            }\n        }\n    }\n\n    fn check_duplicate_ids(\n        entities: impl Iterator\u003cItem = (String, String)\u003e,\n        kind: \u0026str,\n        findings: \u0026mut Vec\u003cIntegrityFinding\u003e,\n    ) {\n        let mut seen = std::collections::HashMap::new();\n        for (id, title) in entities {\n            if let Some(prev) = seen.insert(id.clone(), title) {\n                findings.push(IntegrityFinding {\n                    severity: Severity::Error,\n                    entity: id,\n                    description: format!(\"duplicate {kind} ID (also used by: \\\"{prev}\\\")\"),\n                });\n            }\n        }\n    }\n\n    fn check_duplicate_feature_ids(registry: \u0026Registry, findings: \u0026mut Vec\u003cIntegrityFinding\u003e) {\n        Self::check_duplicate_ids(\n            registry\n                .features\n                .iter()\n                .map(|f| (f.id.0.clone(), f.title.clone())),\n            \"feature\",\n            findings,\n        );\n    }\n\n    fn check_duplicate_story_ids(registry: \u0026Registry, findings: \u0026mut Vec\u003cIntegrityFinding\u003e) {\n        Self::check_duplicate_ids(\n            registry\n                .stories\n                .iter()\n                .map(|s| (s.id.0.clone(), s.title.clone())),\n            \"story\",\n            findings,\n        );\n    }\n\n    fn check_duplicate_decision_ids(registry: \u0026Registry, findings: \u0026mut Vec\u003cIntegrityFinding\u003e) {\n        Self::check_duplicate_ids(\n            registry\n                .decisions\n                .iter()\n                .map(|d| (d.id.0.clone(), d.title.clone())),\n            \"decision\",\n            findings,\n        );\n    }\n\n    fn check_constraint_references(\n        registry: \u0026Registry,\n        known: \u0026HashSet\u003cDeclarationId\u003e,\n        findings: \u0026mut Vec\u003cIntegrityFinding\u003e,\n    ) {\n        let feature_constraints = registry\n            .features\n            .iter()\n            .flat_map(|f| f.constraints.iter().map(move |c| (\u0026f.id.0, c)));\n        let story_constraints = registry\n            .stories\n            .iter()\n            .flat_map(|s| s.constraints.iter().map(move |c| (\u0026s.id.0, c)));\n\n        for (entity_id, cid) in feature_constraints.chain(story_constraints) {\n            if !known.contains(cid) {\n                findings.push(IntegrityFinding {\n                    severity: Severity::Error,\n                    entity: entity_id.clone(),\n                    description: format!(\"references unknown constraint \\\"{}\\\"\", cid.0),\n                });\n            }\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::model::{Decision, Feature, FeatureStatus, Registry, Story};\n\n    fn make_feature(id: \u0026str) -\u003e Feature {\n        Feature {\n            id: FeatureId(id.into()),\n            title: format!(\"Feature {id}\"),\n            status: FeatureStatus::Wish,\n            created: chrono::NaiveDate::from_ymd_opt(2026, 1, 1).unwrap(),\n            updated: None,\n            author: None,\n            promoted_from: None,\n            promoted_date: None,\n            story: None,\n            depends_on: Vec::new(),\n            blocks: Vec::new(),\n            related: Vec::new(),\n            children: Vec::new(),\n            constraints: Vec::new(),\n            preliminary_constraints: Vec::new(),\n            decisions: Vec::new(),\n            source: None,\n            conversations: Vec::new(),\n            tags: Vec::new(),\n            priority: None,\n            effort_estimate: None,\n            external: None,\n            body: String::new(),\n        }\n    }\n\n    #[test]\n    fn duplicate_feature_ids_detected() {\n        let mut registry = Registry::new();\n        registry.features.push(make_feature(\"FIR-1\"));\n        let mut dup = make_feature(\"FIR-1\");\n        dup.title = \"Duplicate\".into();\n        registry.features.push(dup);\n\n        let findings = IntegrityChecker::check_all(\u0026registry, \u0026HashSet::new());\n        let dup_findings: Vec\u003c_\u003e = findings\n            .iter()\n            .filter(|f| f.description.contains(\"duplicate feature ID\"))\n            .collect();\n        assert_eq!(dup_findings.len(), 1);\n    }\n\n    #[test]\n    fn duplicate_story_ids_detected() {\n        let mut registry = Registry::new();\n        registry.stories.push(Story {\n            id: crate::model::StoryId(\"STORY-1\".into()),\n            title: \"Story A\".into(),\n            status: \"wish\".into(),\n            created: chrono::NaiveDate::from_ymd_opt(2026, 1, 1).unwrap(),\n            features: Vec::new(),\n            constraints: Vec::new(),\n            tags: Vec::new(),\n            body: String::new(),\n        });\n        registry.stories.push(Story {\n            id: crate::model::StoryId(\"STORY-1\".into()),\n            title: \"Story B\".into(),\n            status: \"wish\".into(),\n            created: chrono::NaiveDate::from_ymd_opt(2026, 1, 1).unwrap(),\n            features: Vec::new(),\n            constraints: Vec::new(),\n            tags: Vec::new(),\n            body: String::new(),\n        });\n\n        let findings = IntegrityChecker::check_all(\u0026registry, \u0026HashSet::new());\n        let dup_findings: Vec\u003c_\u003e = findings\n            .iter()\n            .filter(|f| f.description.contains(\"duplicate story ID\"))\n            .collect();\n        assert_eq!(dup_findings.len(), 1);\n    }\n\n    #[test]\n    fn duplicate_decision_ids_detected() {\n        let mut registry = Registry::new();\n        registry.decisions.push(Decision {\n            id: crate::model::DecisionId(\"DEC-1\".into()),\n            title: \"Decision A\".into(),\n            date: chrono::NaiveDate::from_ymd_opt(2026, 1, 1).unwrap(),\n            status: \"proposed\".into(),\n            features: Vec::new(),\n            constraints: Vec::new(),\n            body: String::new(),\n        });\n        registry.decisions.push(Decision {\n            id: crate::model::DecisionId(\"DEC-1\".into()),\n            title: \"Decision B\".into(),\n            date: chrono::NaiveDate::from_ymd_opt(2026, 1, 1).unwrap(),\n            status: \"proposed\".into(),\n            features: Vec::new(),\n            constraints: Vec::new(),\n            body: String::new(),\n        });\n\n        let findings = IntegrityChecker::check_all(\u0026registry, \u0026HashSet::new());\n        let dup_findings: Vec\u003c_\u003e = findings\n            .iter()\n            .filter(|f| f.description.contains(\"duplicate decision ID\"))\n            .collect();\n        assert_eq!(dup_findings.len(), 1);\n    }\n\n    #[test]\n    fn no_false_positives_for_unique_ids() {\n        let mut registry = Registry::new();\n        registry.features.push(make_feature(\"FIR-1\"));\n        registry.features.push(make_feature(\"FIR-2\"));\n        registry.features.push(make_feature(\"FIR-3\"));\n\n        let findings = IntegrityChecker::check_all(\u0026registry, \u0026HashSet::new());\n        let dup_findings: Vec\u003c_\u003e = findings\n            .iter()\n            .filter(|f| f.description.contains(\"duplicate\"))\n            .collect();\n        assert!(dup_findings.is_empty());\n    }\n\n    #[test]\n    fn unknown_constraint_references_detected() {\n        let mut registry = Registry::new();\n        let mut feature = make_feature(\"FIR-1\");\n        feature.constraints = vec![\n            DeclarationId(\"known-constraint\".into()),\n            DeclarationId(\"ghost-constraint\".into()),\n        ];\n        registry.features.push(feature);\n\n        let known: HashSet\u003cDeclarationId\u003e = [DeclarationId(\"known-constraint\".into())]\n            .into_iter()\n            .collect();\n\n        let findings = IntegrityChecker::check_all(\u0026registry, \u0026known);\n        let missing: Vec\u003c_\u003e = findings\n            .iter()\n            .filter(|f| f.description.contains(\"unknown constraint\"))\n            .collect();\n        assert_eq!(missing.len(), 1);\n        assert!(missing[0].description.contains(\"ghost-constraint\"));\n    }\n\n    #[test]\n    fn valid_constraint_references_pass() {\n        let mut registry = Registry::new();\n        let mut feature = make_feature(\"FIR-1\");\n        feature.constraints = vec![\n            DeclarationId(\"constraint-a\".into()),\n            DeclarationId(\"constraint-b\".into()),\n        ];\n        registry.features.push(feature);\n\n        let known: HashSet\u003cDeclarationId\u003e = [\n            DeclarationId(\"constraint-a\".into()),\n            DeclarationId(\"constraint-b\".into()),\n        ]\n        .into_iter()\n        .collect();\n\n        let findings = IntegrityChecker::check_all(\u0026registry, \u0026known);\n        let constraint_findings: Vec\u003c_\u003e = findings\n            .iter()\n            .filter(|f| f.description.contains(\"unknown constraint\"))\n            .collect();\n        assert!(constraint_findings.is_empty());\n    }\n}\n","traces":[{"line":21,"address":[16810333,16810080,16810339],"length":1,"stats":{"Line":1}},{"line":25,"address":[5489596],"length":1,"stats":{"Line":5}},{"line":26,"address":[4276063],"length":1,"stats":{"Line":1}},{"line":27,"address":[4276115],"length":1,"stats":{"Line":1}},{"line":28,"address":[4276132],"length":1,"stats":{"Line":1}},{"line":29,"address":[16810229],"length":1,"stats":{"Line":1}},{"line":30,"address":[16810246],"length":1,"stats":{"Line":2}},{"line":31,"address":[5489727],"length":1,"stats":{"Line":1}},{"line":32,"address":[4276205],"length":1,"stats":{"Line":1}},{"line":33,"address":[4276222],"length":1,"stats":{"Line":1}},{"line":36,"address":[4272960,4273858,4273864],"length":1,"stats":{"Line":2}},{"line":37,"address":[4272993,4273012],"length":1,"stats":{"Line":6}},{"line":38,"address":[4273083,4273119],"length":1,"stats":{"Line":3}},{"line":39,"address":[4273198],"length":1,"stats":{"Line":0}},{"line":40,"address":[4274859],"length":1,"stats":{"Line":0}},{"line":42,"address":[4274659],"length":1,"stats":{"Line":0}},{"line":43,"address":[4274752,4274681],"length":1,"stats":{"Line":0}},{"line":47,"address":[5486860,5486835],"length":1,"stats":{"Line":3}},{"line":48,"address":[4273346],"length":1,"stats":{"Line":0}},{"line":49,"address":[5488109],"length":1,"stats":{"Line":0}},{"line":51,"address":[4274329],"length":1,"stats":{"Line":0}},{"line":52,"address":[16808431,16808502],"length":1,"stats":{"Line":0}},{"line":56,"address":[4273389],"length":1,"stats":{"Line":2}},{"line":57,"address":[16807537],"length":1,"stats":{"Line":0}},{"line":58,"address":[5487322],"length":1,"stats":{"Line":0}},{"line":60,"address":[5487120],"length":1,"stats":{"Line":0}},{"line":61,"address":[5487142,5487213],"length":1,"stats":{"Line":0}},{"line":65,"address":[4273877,4273494],"length":1,"stats":{"Line":4}},{"lin

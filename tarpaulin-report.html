form \u003c Scope::Project);\n        assert!(Scope::Project \u003c Scope::Domain);\n        assert!(Scope::Domain \u003c Scope::Module);\n        assert!(Scope::Module \u003c Scope::Interface);\n        assert!(Scope::Interface \u003c Scope::Function);\n    }\n\n    #[test]\n    fn test_serialization() {\n        let scopes = vec![\n            Scope::Global,\n            Scope::Platform,\n            Scope::Project,\n            Scope::Domain,\n            Scope::Module,\n            Scope::Interface,\n            Scope::Function,\n        ];\n\n        for scope in \u0026scopes {\n            let json = serde_json::to_string(scope).unwrap();\n            let deserialized: Scope = serde_json::from_str(\u0026json).unwrap();\n            assert_eq!(scope, \u0026deserialized);\n        }\n    }\n\n    #[test]\n    fn test_deserialization_all_variants() {\n        let json = r#\"[\n            \"global\",\n            \"platform\",\n            \"project\",\n            \"domain\",\n            \"module\",\n            \"interface\",\n            \"function\"\n        ]\"#;\n        let scopes: Vec\u003cScope\u003e = serde_json::from_str(json).unwrap();\n        assert_eq!(scopes.len(), 7);\n    }\n\n    #[test]\n    fn test_deserialization_unknown_variant() {\n        let json = r#\"\"unknown_scope\"\"#;\n        let result: Result\u003cScope, _\u003e = serde_json::from_str(json);\n        assert!(result.is_err());\n    }\n\n    #[test]\n    fn test_all_scopes_serialize_deserialize() {\n        let scopes = vec![\n            Scope::Global,\n            Scope::Platform,\n            Scope::Project,\n            Scope::Domain,\n            Scope::Module,\n            Scope::Interface,\n            Scope::Function,\n        ];\n        for scope in \u0026scopes {\n            let json = serde_json::to_string(scope).unwrap();\n            let deserialized: Scope = serde_json::from_str(\u0026json).unwrap();\n            assert_eq!(scope, \u0026deserialized);\n        }\n    }\n\n    #[test]\n    fn test_scope_ordering_all_pairs() {\n        assert!(Scope::Global \u003c Scope::Platform);\n        assert!(Scope::Platform \u003c Scope::Project);\n        assert!(Scope::Project \u003c Scope::Domain);\n        assert!(Scope::Domain \u003c Scope::Module);\n        assert!(Scope::Module \u003c Scope::Interface);\n        assert!(Scope::Interface \u003c Scope::Function);\n        assert!(Scope::Global \u003c Scope::Function);\n        assert!(Scope::Global \u003c Scope::Module);\n        assert!(Scope::Global \u003c Scope::Domain);\n        assert!(Scope::Global \u003c Scope::Interface);\n        assert!(Scope::Platform \u003c Scope::Function);\n        assert!(Scope::Platform \u003c Scope::Module);\n        assert!(Scope::Platform \u003c Scope::Domain);\n        assert!(Scope::Platform \u003c Scope::Interface);\n    }\n\n    #[test]\n    fn test_scope_copy_and_clone() {\n        let scope1 = Scope::Global;\n        let scope2 = scope1.clone();\n        assert_eq!(scope1, scope2);\n        let scope3 = Scope::Platform;\n        let scope4 = scope3.clone();\n        assert_eq!(scope3, scope4);\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","alex","dev","rust","idd-dev","idd-dsl","crates","idd-dsl-core","src","severity.rs"],"content":"use serde::{Deserialize, Serialize};\n\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\n#[serde(rename_all = \"snake_case\")]\npub enum Severity {\n    Hard,\n    Soft,\n    Info,\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_severity_equality() {\n        assert_eq!(Severity::Hard, Severity::Hard);\n        assert_ne!(Severity::Hard, Severity::Soft);\n        assert_ne!(Severity::Soft, Severity::Info);\n        assert_ne!(Severity::Hard, Severity::Info);\n    }\n\n    #[test]\n    fn test_serialization() {\n        let severities = vec![Severity::Hard, Severity::Soft, Severity::Info];\n        for severity in \u0026severities {\n            let json = serde_json::to_string(severity).unwrap();\n            let deserialized: Severity = serde_json::from_str(\u0026json).unwrap();\n            assert_eq!(severity, \u0026deserialized);\n        }\n    }\n\n    #[test]\n    fn test_deserialization_all_variants() {\n        let json = r#\"[\n            \"hard\",\n            \"soft\",\n            \"info\"\n        ]\"#;\n        let severities: Vec\u003cSeverity\u003e = serde_json::from_str(json).unwrap();\n        assert_eq!(severities.len(), 3);\n    }\n\n    #[test]\n    fn test_all_severities_serialize_deserialize() {\n        let severities = vec![Severity::Hard, Severity::Soft, Severity::Info];\n        for severity in \u0026severities {\n            let json = serde_json::to_string(severity).unwrap();\n            let deserialized: Severity = serde_json::from_str(\u0026json).unwrap();\n            assert_eq!(severity, \u0026deserialized);\n        }\n    }\n\n    #[test]\n    fn test_severity_copy_and_clone() {\n        let severity1 = Severity::Hard;\n        let severity2 = severity1.clone();\n        assert_eq!(severity1, severity2);\n        let severity3 = Severity::Soft;\n        let severity4 = severity3.clone();\n        assert_eq!(severity3, severity4);\n    }\n\n    #[test]\n    fn test_severity_partial_eq() {\n        assert_eq!(Severity::Hard, Severity::Hard);\n        assert_eq!(Severity::Soft, Severity::Soft);\n        assert_eq!(Severity::Info, Severity::Info);\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","alex","dev","rust","idd-dev","idd-dsl","crates","idd-dsl-parser","src","lib.rs"],"content":"/// Parser for IDD `.intent` files.\n///\n/// Reads TOML-formatted intent files and produces `idd-dsl-core` data model instances.\npub mod parser;\n\npub use parser::parse_intent_file;\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","alex","dev","rust","idd-dev","idd-dsl","crates","idd-dsl-parser","src","parser.rs"],"content":"use std::path::Path;\n\nuse idd_dsl_core::{\n    Declaration, DeclarationId, DeclarationKind, EnforcementPoint, EnforcementProfile,\n    ImportBinding, ImportDeclaration, Scope, Severity,\n};\nuse serde::Deserialize;\nuse thiserror::Error;\n\n#[derive(Debug, Error)]\npub enum ParseError {\n    #[error(\"failed to read file: {0}\")]\n    Io(#[from] std::io::Error),\n\n    #[error(\"failed to parse TOML: {0}\")]\n    Toml(#[from] toml::de::Error),\n\n    #[error(\"invalid declaration kind: {0}\")]\n    InvalidKind(String),\n\n    #[error(\"invalid scope: {0}\")]\n    InvalidScope(String),\n\n    #[error(\"invalid severity: {0}\")]\n    InvalidSeverity(String),\n\n    #[error(\"invalid enforcement point: {0}\")]\n    InvalidEnforcementPoint(String),\n\n    #[error(\"duplicate declaration ID '{0}' in {1}\")]\n    DuplicateId(String, String),\n}\n\n#[derive(Debug, Deserialize)]\nstruct TomlIntentFile {\n    #[serde(default)]\n    declaration: Vec\u003cTomlDeclaration\u003e,\n    #[serde(default)]\n    import: Vec\u003cTomlImport\u003e,\n}\n\n#[derive(Debug, Deserialize)]\nstruct TomlDeclaration {\n    id: String,\n    kind: String,\n    scope: String,\n    severity: String,\n    statement: String,\n    rationale: String,\n    #[serde(default)]\n    owner: Option\u003cString\u003e,\n    #[serde(default)]\n    enforcement_points: Vec\u003cString\u003e,\n    #[serde(default)]\n    tags: Vec\u003cString\u003e,\n    #[serde(default)]\n    r#override: Option\u003cTomlOverride\u003e,\n    #[serde(default)]\n    feature_ref: Option\u003cString\u003e,\n}\n\n#[derive(Debug, Deserialize)]\nstruct TomlOverride {\n    overridden_id: String,\n    rationale: String,\n}\n\n#[derive(Debug, Deserialize)]\nstruct TomlImport {\n    library: String,\n    version: String,\n    #[serde(default)]\n    bindings: Vec\u003cTomlBinding\u003e,\n}\n\n#[derive(Debug, Deserialize)]\nstruct TomlBinding {\n    abstract_role: String,\n    concrete_module: String,\n}\n\n#[derive(Debug)]\npub struct IntentFile {\n    pub declarations: Vec\u003cDeclaration\u003e,\n    pub imports: Vec\u003cImportDeclaration\u003e,\n}\n\nfn parse_kind(s: \u0026str) -\u003e Result\u003cDeclarationKind, ParseError\u003e {\n    match s {\n        \"invariant\" =\u003e Ok(DeclarationKind::Invariant),\n        \"precondition\" =\u003e Ok(DeclarationKind::Precondition),\n        \"postcondition\" =\u003e Ok(DeclarationKind::Postcondition),\n        \"assumption\" =\u003e Ok(DeclarationKind::Assumption),\n        \"coupling_limit\" =\u003e Ok(DeclarationKind::CouplingLimit),\n        \"temporal\" =\u003e Ok(DeclarationKind::Temporal),\n        \"resource_bound\" =\u003e Ok(DeclarationKind::ResourceBound),\n        \"process_constraint\" =\u003e Ok(DeclarationKind::ProcessConstraint),\n        \"feature_constraint\" =\u003e Ok(DeclarationKind::FeatureConstraint),\n        other =\u003e Err(ParseError::InvalidKind(other.into())),\n    }\n}\n\nfn parse_scope(s: \u0026str) -\u003e Result\u003cScope, ParseError\u003e {\n    match s {\n        \"global\" =\u003e Ok(Scope::Global),\n        \"platform\" =\u003e Ok(Scope::Platform),\n        \"project\" =\u003e Ok(Scope::Project),\n        \"domain\" =\u003e Ok(Scope::Domain),\n        \"module\" =\u003e Ok(Scope::Module),\n        \"interface\" =\u003e Ok(Scope::Interface),\n        \"function\" =\u003e Ok(Scope::Function),\n        other =\u003e Err(ParseError::InvalidScope(other.into())),\n    }\n}\n\nfn parse_severity(s: \u0026str) -\u003e Result\u003cSeverity, ParseError\u003e {\n    match s {\n        \"hard\" =\u003e Ok(Severity::Hard),\n        \"soft\" =\u003e Ok(Severity::Soft),\n        \"info\" =\u003e Ok(Severity::Info),\n        other =\u003e Err(ParseError::InvalidSeverity(other.into())),\n    }\n}\n\nfn parse_enforcement_point(s: \u0026str) -\u003e Result\u003cEnforcementPoint, ParseError\u003e {\n    match s {\n        \"expression\" =\u003e Ok(EnforcementPoint::Expression),\n        \"development\" =\u003e Ok(EnforcementPoint::Development),\n        \"property_based_tests\" =\u003e Ok(EnforcementPoint::PropertyBasedTests),\n        \"reasoning_tools\" =\u003e Ok(EnforcementPoint::ReasoningTools),\n        \"pre_commit\" =\u003e Ok(EnforcementPoint::PreCommit),\n        \"ci\" =\u003e Ok(EnforcementPoint::Ci),\n        \"runtime\" =\u003e Ok(EnforcementPoint::Runtime),\n        other =\u003e Err(ParseError::InvalidEnforcementPoint(other.into())),\n    }\n}\n\nfn toml_to_declaration(t: TomlDeclaration) -\u003e Result\u003cDeclaration, ParseError\u003e {\n    let kind = parse_kind(\u0026t.kind)?;\n    let scope = parse_scope(\u0026t.scope)?;\n    let severity = parse_severity(\u0026t.severity)?;\n\n    let points: Result\u003cVec\u003c_\u003e, _\u003e = t\n        .enforcement_points\n        .iter()\n        .map(|s| parse_enforcement_point(s))\n        .collect();\n    let enforcement_profile = EnforcementProfile::new(points?);\n\n    let overrides = t\n        .r#override\n        .map(|o| idd_dsl_core::declaration::OverrideInfo {\n            overridden_id: o.overridden_id,\n            rationale: o.rationale,\n        });\n\n    Ok(Declaration {\n        id: DeclarationId::new(t.id),\n        kind,\n        scope,\n        severity,\n        statement: t.statement,\n        rationale: t.rationale,\n        owner: t.owner,\n        enforcement_profile,\n        tags: t.tags,\n        overrides,\n        feature_ref: t.feature_ref,\n    })\n}\n\nfn toml_to_import(t: TomlImport) -\u003e ImportDeclaration {\n    ImportDeclaration {\n        library: t.library,\n        version: t.version,\n        bindings: t\n            .bindings\n            .into_iter()\n            .map(|b| ImportBinding {\n                abstract_role: b.abstract_role,\n                concrete_module: b.concrete_module,\n            })\n            .collect(),\n    }\n}\n\npub fn parse_intent_file(path: \u0026Path) -\u003e Result\u003cIntentFile, ParseError\u003e {\n    let content = std::fs::read_to_string(path)?;\n    let doc: TomlIntentFile = toml::from_str(\u0026content)?;\n\n    let declarations: Result\u003cVec\u003c_\u003e, _\u003e = doc\n        .declaration\n        .into_iter()\n        .map(toml_to_declaration)\n        .collect();\n\n    let imports = doc.import.into_iter().map(toml_to_import).collect();\n\n    Ok(IntentFile {\n        declarations: declarations?,\n        imports,\n    })\n}\n\n/// Check for duplicate declaration IDs across multiple parsed intent files.\n/// Returns an error for the first duplicate found.\npub fn check_duplicate_ids(\n    files: \u0026[(impl AsRef\u003cstd::path::Path\u003e, \u0026IntentFile)],\n) -\u003e Result\u003c(), ParseError\u003e {\n    let mut seen = std::collections::HashMap::new();\n    for (path, file) in files {\n        for decl in \u0026file.declarations {\n            let id = \u0026decl.id.0;\n            let path_str = path.as_ref().display().to_string();\n            if let Some(prev_path) = seen.insert(id.clone(), path_str) {\n                return Err(ParseError::DuplicateId(\n                    id.clone(),\n                    format!(\"{} and {}\", prev_path, path.as_ref().display()),\n                ));\n            }\n        }\n    }\n    Ok(())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    fn parse_str(content: \u0026str) -\u003e Result\u003cIntentFile, ParseError\u003e {\n        let doc: TomlIntentFile = toml::from_str(content)?;\n\n        let declarations: Result\u003cVec\u003c_\u003e, _\u003e = doc\n            .declaration\n            .into_iter()\n            .map(toml_to_declaration)\n            .collect();\n\n        let imports = doc.import.into_iter().map(toml_to_import).collect();\n\n        Ok(IntentFile {\n            declarations: declarations?,\n            imports,\n        })\n    }\n\n    #[test]\n    fn parse_minimal_declaration() {\n        let input = r#\"\n[[declaration]]\nid = \"no-direct-db-access\"\nkind = \"invariant\"\nscope = \"project\"\nseverity = \"hard\"\nstatement = \"All data access goes through the repository layer\"\nrationale = \"Ensures testability\"\n\"#;\n\n        let result = parse_str(input).unwrap();\n        assert_eq!(result.declarations.len(), 1);\n\n        let decl = \u0026result.declarations[0];\n        assert_eq!(decl.id.0, \"no-direct-db-access\");\n        assert!(matches!(decl.kind, DeclarationKind::Invariant));\n        assert!(matches!(decl.scope, Scope::Project));\n        assert!(matches!(decl.severity, Severity::Hard));\n        assert!(decl.tags.is_empty());\n        assert!(decl.overrides.is_none());\n    }\n\n    #[test]\n    fn parse_declaration_with_all_fields() {\n        let input = r#\"\n[[declaration]]\nid = \"payment-latency\"\nkind = \"temporal\"\nscope = \"function\"\nseverity = \"hard\"\nstatement = \"Must complete within 500ms at p99\"\nrationale = \"User is waiting\"\nowner = \"payments-team\"\nenforcement_points = [\"ci\", \"runtime\"]\ntags = [\"performance\", \"user-facing\"]\nfeature_ref = \"FIR-3\"\n\n[declaration.override]\noverridden_id = \"project.api-latency-200ms\"\nrationale = \"Cold path\"\n\"#;\n\n        let result = parse_str(input).unwrap();\n        let decl = \u0026result.declarations[0];\n\n        assert_eq!(decl.id.0, \"payment-latency\");\n        assert!(matches!(decl.kind, DeclarationKind::Temporal));\n        assert!(matches!(decl.scope, Scope::Function));\n        assert_eq!(decl.owner.as_deref(), Some(\"payments-team\"));\n        assert_eq!(decl.tags, vec![\"performance\", \"user-facing\"]);\n        assert_eq!(decl.enforcement_profile.points.len(), 2);\n        assert!(matches!(\n            decl.enforcement_profile.points[0],\n            EnforcementPoint::Ci\n        ));\n        assert!(matches!(\n            decl.enforcement_profile.points[1],\n            EnforcementPoint::Runtime\n        ));\n        let ov = decl.overrides.as_ref().unwrap();\n        assert_eq!(ov.overridden_id, \"project.api-latency-200ms\");\n        assert_eq!(ov.rationale, \"Cold path\");\n        assert_eq!(decl.feature_ref.as_deref(), Some(\"FIR-3\"));\n    }\n\n    #[test]\n    fn parse_imports_with_bindings() {\n        let input = r#\"\n[[import]]\nlibrary = \"idd-lib/gdpr\"\nversion = \"2.1.0\"\n\n[[import.bindings]]\nabstract_role = \"data-controller\"\nconcrete_module = \"billing\"\n\n[[import.bindings]]\nabstract_role = \"personal-data-store\"\nconcrete_module = \"user-db\"\n\"#;\n\n        let result = parse_str(input).unwrap();\n        assert_eq!(result.imports.len(), 1);\n\n        let imp = \u0026result.imports[0];\n        assert_eq!(imp.library, \"idd-lib/gdpr\");\n        assert_eq!(imp.version, \"2.1.0\");\n        assert_eq!(imp.bindings.len(), 2);\n        assert_eq!(imp.bindings[0].abstract_role, \"data-controller\");\n        assert_eq!(imp.bindings[0].concrete_module, \"billing\");\n    }\n\n    #[test]\n    fn parse_multiple_declarations_and_imports() {\n        let input = r#\"\n[[declaration]]\nid = \"auth-only\"\nkind = \"invariant\"\nscope = \"project\"\nseverity = \"hard\"\nstatement = \"All endpoints require authentication\"\nrationale = \"Security baseline\"\n\n[[declaration]]\nid = \"no-coupling\"\nkind = \"coupling_limit\"\nscope = \"module\"\nseverity = \"hard\"\nstatement = \"UI must not import data layer\"\nrationale = \"Separation of concerns\"\n\n[[import]]\nlibrary = \"idd-lib/rest-api\"\nversion = \"1.0.0\"\n\"#;\n\n        let result = parse_str(input).unwrap();\n        assert_eq!(result.declarations.len(), 2);\n        assert_eq!(result.imports.len(), 1);\n        assert!(matches!(\n            result.declarations[0].kind,\n            DeclarationKind::Invariant\n        ));\n        assert!(matches!(\n            result.declarations[1].kind,\n            DeclarationKind::CouplingLimit\n        ));\n    }\n\n    #[test]\n    fn parse_all_declaration_kinds() {\n        let kinds = [\n            \"invariant\",\n            \"precondition\",\n            \"postcondition\",\n            \"assumption\",\n            \"coupling_limit\",\n            \"temporal\",\n            \"resource_bound\",\n            \"process_constraint\",\n            \"feature_constraint\",\n        ];\n\n        for kind in \u0026kinds {\n            let input = format!(\n                r#\"\n[[declaration]]\nid = \"test-{}\"\nkind = \"{}\"\nscope = \"project\"\nseverity = \"hard\"\nstatement = \"Test statement\"\nrationale = \"Test rationale\"\n\"#,\n                kind, kind\n            );\n            let result = parse_str(\u0026input).unwrap();\n            assert_eq!(result.declarations.len(), 1);\n        }\n    }\n\n    #[test]\n    fn parse_all_scopes() {\n        let scopes = [\n            \"global\",\n            \"platform\",\n            \"project\",\n            \"domain\",\n            \"module\",\n            \"interface\",\n            \"function\",\n        ];\n\n        for scope in \u0026scopes {\n            let input = format!(\n                r#\"\n[[declaration]]\nid = \"test-{}\"\nkind = \"invariant\"\nscope = \"{}\"\nseverity = \"hard\"\nstatement = \"Test\"\nrationale = \"Test\"\n\"#,\n                scope, scope\n            );\n            let result = parse_str(\u0026input).unwrap();\n            assert_eq!(result.declarations.len(), 1);\n        }\n    }\n\n    #[test]\n    fn parse_all_severities() {\n        for severity in \u0026[\"hard\", \"soft\", \"info\"] {\n            let input = format!(\n                r#\"\n[[declaration]]\nid = \"test\"\nkind = \"invariant\"\nscope = \"project\"\nseverity = \"{}\"\nstatement = \"Test\"\nrationale = \"Test\"\n\"#,\n                severity\n            );\n            let result = parse_str(\u0026input).unwrap();\n            assert_eq!(result.declarations.len(), 1);\n        }\n    }\n\n    #[test]\n    fn error_on_invalid_kind() {\n        let input = r#\"\n[[declaration]]\nid = \"test\"\nkind = \"not_a_kind\"\nscope = \"project\"\nseverity = \"hard\"\nstatement = \"Test\"\nrationale = \"Test\"\n\"#;\n        l            r#\"\n[[declaration]]\nid = \"unique-a\"\nkind = \"invariant\"\nscope = \"project\"\nseverity = \"hard\"\nstatement = \"A\"\nrationale = \"A\"\n\"#,\n        )\n        .unwrap();\n\n        let file2 = parse_str(\n            r#\"\n[[declaration]]\nid = \"unique-b\"\nkind = \"temporal\"\nscope = \"function\"\nseverity = \"hard\"\nstatement = \"B\"\nrationale = \"B\"\n\"#,\n        )\n        .unwrap();\n\n        let files: Vec\u003c(\u0026std::path::Path, \u0026IntentFile)\u003e = vec![\n            (std::path::Path::new(\"a.intent\"), \u0026file1),\n            (std::path::Path::new(\"b.intent\"), \u0026file2),\n        ];\n        assert!(check_duplicate_ids(\u0026files).is_ok());\n    }\n}\n","traces":[{"line":88,"address":[1421792],"length":1,"stats":{"Line":11}},{"line":90,"address":[1421907,1421849],"length":1,"stats":{"Line":13}},{"line":91,"address":[1421879,1421960],"length":1,"stats":{"Line":3}},{"line":92,"address":[1421932,1422013],"length":1,"stats":{"Line":3}},{"line":93,"address":[1422066,1421985],"length":1,"stats":{"Line":3}},{"line":94,"address":[1422119,1422038],"length":1,"stats":{"Line":3}},{"line":95,"address":[1422091,1422172],"length":1,"stats":{"Line":3}},{"line":96,"address":[1422144,1422225],"length":1,"stats":{"Line":2}},{"line":97,"address":[1422278,1422197],"length":1,"stats":{"Line":2}},{"line":98,"address":[1422250,1422396],"length":1,"stats":{"Line":2}},{"line":99,"address":[1422300],"length":1,"stats":{"Line":1}},{"line":103,"address":[1422432],"length":1,"stats":{"Line":9}},{"line":105,"address":[1422489,1422547],"length":1,"stats":{"Line":10}},{"line":106,"address":[1422600,1422519],"length":1,"stats":{"Line":9}},{"line":107,"address":[1422572,1422653],"length":1,"stats":{"Line":15}},{"line":108,"address":[1422706,1422625],"length":1,"stats":{"Line":2}},{"line":109,"address":[1422759,1422678],"length":1,"stats":{"Line":3}},{"line":110,"address":[1422731,1422812],"length":1,"stats":{"Line":3}},{"line":111,"address":[14 )\n            .owner(self.owner.clone().unwrap_or_default())\n            .enforcement_profile(EnforcementProfile::new(vec![]))\n            .build()\n            .map_err(|e| e.to_string())\n    }\n}\n\n#[proc_macro_attribute]\npub fn intent(args: TokenStream, input: TokenStream) -\u003e TokenStream {\n    let attr_args = syn::parse_macro_input!(args with syn::punctuated::Punctuated::\u003csyn::Meta, syn::Token![,]\u003e::parse_terminated);\n    let attr_args: Vec\u003cNestedMeta\u003e = attr_args.into_iter().map(NestedMeta::Meta).collect();\n\n    let args = match IntentArgs::from_list(\u0026attr_args) {\n        Ok(v) =\u003e v,\n        Err(e) =\u003e return e.write_errors().into(),\n    };\n\n    // Validate declaration at compile time\n    if let Err(e) = args.to_declaration() {\n        return syn::Error::new(proc_macro::Span::call_site().into(), e)\n            .to_compile_error()\n            .into();\n    }\n\n    let input_fn: syn::ItemFn = match syn::parse(input) {\n        Ok(f) =\u003e f,\n        Err(e) =\u003e return e.to_compile_error().into(),\n    };\n\n    let fn_vis = \u0026input_fn.vis;\n    let fn_attrs = \u0026input_fn.attrs;\n    let fn_block = \u0026input_fn.block;\n    let fn_sig = \u0026input_fn.sig;\n\n    // TODO: emit sidecar file — requires proc_macro_span (nightly) or external extraction tool\n    // For now, validation at compile time is the enforcement point.\n    // Sidecar emission will be handled by a `syn`-based source scanner in idd-cli.\n\n    let output = quote! {\n        #(#fn_attrs)*\n        #fn_vis #fn_sig #fn_block\n    };\n\n    output.into()\n}\n","traces":[{"line":46,"address":[1514640],"length":1,"stats":{"Line":0}},{"line":47,"address":[1514647],"length":1,"stats":{"Line":0}},{"line":48,"address":[1514678],"length":1,"stats":{"Line":0}},{"line":49,"address":[1514685],"length":1,"stats":{"Line":0}},{"line":50,"address":[1514692],"length":1,"stats":{"Line":0}},{"line":51,"address":[1514699],"length":1,"stats":{"Lin \nuse syn::{parse_quote, ItemFn};\n\nmod intent_tests {\n    use super::*;\n\n    /// Test that a valid #[intent] attribute parses correctly\n    #[test]\n    fn valid_intent_parses() {\n        let func: ItemFn = parse_quote! {\n            #[intent(id = \"test_1\", kind = invariant, statement = \"x must be positive\", rationale = \"x is an index\")]\n            pub fn test_fn(x: i32) {}\n        };\n        assert!(!func.attrs.is_empty());\n    }\n\n    /// Test all IntentKind variants\n    #[test]\n    fn all_intent_kinds_parse() {\n        let kinds = vec![\n            \"invariant\",\n            \"precondition\",\n            \"postcondition\",\n            \"assumption\",\n            \"coupling_limit\",\n            \"temporal\",\n            \"resource_bound\",\n            \"process_constraint\",\n            \"feature_constraint\",\n        ];\n\n        for kind in kinds {\n            let func: ItemFn = parse_quote! {\n                #[intent(id = \"test\", kind = #kind, statement = \"test\")]\n                pub fn test_fn() {}\n            };\n            assert!(!func.attrs.is_empty());\n        }\n    }\n\n    /// Test all IntentScope variants\n    #[test]\n    fn all_intent_scopes_parse() {\n        let scopes = vec![\n            \"global\",\n            \"platform\",\n            \"project\",\n            \"domain\",\n            \"module\",\n            \"interface\",\n            \"function\",\n        ];\n\n        for scope in scopes {\n            let func: ItemFn = parse_quote! {\n                #[intent(id = \"test\", kind = invariant, scope = #scope, statement = \"test\")]\n                pub fn test_fn() {}\n            };\n            assert!(!func.attrs.is_empty());\n        }\n    }\n\n    /// Test all IntentSeverity variants\n    #[test]\n    fn all_intent_severities_parse() {\n        let severities = vec![\"hard\", \"soft\", \"info\"];\n\n        for severity in severities {\n            let func: ItemFn = parse_quote! {\n                #[intent(id = \"test\", kind = invariant, severity = #severity, statement = \"test\")]\n                pub fn test_fn() {}\n            };\n            assert!(!func.attrs.is_empty());\n        }\n    }\n\n    /// Test default values for optional fields\n    #[test]\n    fn default_values_set_correctly() {\n        let func: ItemFn = parse_quote! {\n            #[intent(id = \"test\", kind = invariant, statement = \"test\")]\n            pub fn test_fn() {}\n        };\n        assert!(!func.attrs.is_empty());\n    }\n\n    /// Test optional fields are optional\n    #[test]\n    fn optional_fields_can_be_omitted() {\n        let func1: ItemFn = parse_quote! {\n            #[intent(id = \"test1\", kind = invariant, statement = \"test1\", rationale = \"test\")]\n            pub fn test_fn1() {}\n        };\n        assert!(!func1.attrs.is_empty());\n\n        let func2: ItemFn = parse_quote! {\n            #[intent(id = \"test2\", kind = invariant, statement = \"test2\", owner = \"test\")]\n            pub fn test_fn2() {}\n        };\n        assert!(!func2.attrs.is_empty());\n\n        let func3: ItemFn = parse_quote! {\n            #[intent(id = \"test3\", kind = invariant, statement = \"test3\", rationale = \"test\", owner = \"test\", tags = \"tag1, tag2\")]\n            pub fn test_fn3() {}\n        };\n        assert!(!func3.attrs.is_empty());\n    }\n\n    /// Test complex attribute with all fields\n    #[test]\n    fn complex_intent_with_all_fields() {\n        let func: ItemFn = parse_quote! {\n            #[intent(\n                id = \"complex_test\",\n                kind = precondition,\n                scope = platform,\n                severity = soft,\n                statement = \"Platform must be initialized\",\n                rationale = \"Platform setup is required\",\n                owner = \"system\",\n                tags = \"startup, platform\",\n                overrides = \"legacy_code\",\n                override_rationale = \"Legacy compatibility\"\n            )]\n            pub fn complex_fn() {}\n        };\n        assert_eq!(func.attrs.len(), 1);\n    }\n\n    /// Test statement and rationale validation\n    #[test]\n    fn statement_and_rationale_validation() {\n        let func1: ItemFn = parse_quote! {\n            #[intent(id = \"test\", kind = invariant, statement = \"This is a valid statement\")]\n            pub fn test_fn1() {}\n        };\n        assert!(!func1.attrs.is_empty());\n\n        let func2: ItemFn = parse_quote! {\n            #[intent(id = \"test2\", kind = invariant, statement = \"x \u003e 0 \u0026\u0026 y \u003c 100\")]\n            pub fn test_fn2() {}\n        };\n        assert!(!func2.attrs.is_empty());\n    }\n\n    /// Test that the macro preserves function attributes\n    #[test]\n    fn macro_preserves_function() {\n        let func: ItemFn = parse_quote! {\n            #[inline]\n            #[cold]\n            pub fn test_fn() {}\n        };\n\n        assert_eq!(func.attrs.len(), 2);\n    }\n\n    /// Test attribute with nested brackets\n    #[test]\n    fn attribute_with_nested_brackets() {\n        let func: ItemFn = parse_quote! {\n            #[intent(id = \"test\", kind = invariant, statement = \"if x \u003e 0 { do_something() }\")]\n            pub fn test_fn() {}\n        };\n        assert!(!func.attrs.is_empty());\n    }\n\n    /// Test multiple attributes on same function\n    #[test]\n    fn multiple_attributes_on_function() {\n        let func: ItemFn = parse_quote! {\n            #[inline]\n            #[intent(id = \"test\", kind = invariant, statement = \"test\")]\n            pub fn multi_attr() {}\n        };\n\n        assert_eq!(func.attrs.len(), 2);\n    }\n}\n\nmod error_handling_tests {\n    use super::*;\n\n    /// Test that empty id is allowed (validation is compile-time)\n    #[test]\n    fn empty_id_is_allowed() {\n        let func: ItemFn = parse_quote! {\n            #[intent(id = \"\", kind = invariant, statement = \"test\")]\n            pub fn test_fn() {}\n        };\n        assert!(!func.attrs.is_empty());\n    }\n\n    /// Test that empty statement is allowed (validation is compile-time)\n    #[test]\n    fn empty_statement_is_allowed() {\n        let func: ItemFn = parse_quote! {\n            #[intent(id = \"test\", kind = invariant, statement = \"\")]\n            pub fn test_fn() {}\n        };\n        assert!(!func.attrs.is_empty());\n    }\n\n    /// Test that invalid severity is allowed (validation is compile-time)\n    #[test]\n    fn invalid_severity_is_allowed() {\n        let func: ItemFn = parse_quote! {\n            #[intent(id = \"test\", kind = invariant, severity = invalid, statement = \"test\")]\n            pub fn test_fn() {}\n        };\n        assert!(!func.attrs.is_empty());\n    }\n\n    /// Test that invalid scope is allowed (validation is compile-time)\n    #[test]\n    fn invalid_scope_is_allowed() {\n        let func: ItemFn = parse_quote! {\n            #[intent(id = \"test\", kind = invariant, scope = invalid, statement = \"test\")]\n            pub fn test_fn() {}\n        };\n        assert!(!func.attrs.is_empty());\n    }\n\n    /// Test that missing kind is allowed (validation is compile-time)\n    #[test]\n    fn missing_kind_is_allowed() {\n        let func: ItemFn = parse_quote! {\n            #[intent(id = \"test\", statement = \"test\")]\n            pub fn test_fn() {}\n        };\n        assert!(!func.attrs.is_empty());\n    }\n\n    /// Test that missing statement is allowed (validation is compile-time)\n    #[test]\n    fn missing_statement_is_allowed() {\n        let func: ItemFn = parse_quote! {\n            #[intent(id = \"test\", kind = invariant)]\n            pub fn test_fn() {}\n        };\n        assert!(!func.attrs.is_empty());\n    }\n}\n\nmod integration_tests {\n    use super::*;\n\n    /// Test that a complete intent declaration compiles\n    #[test]\n    fn complete_intent_declaration_compiles() {\n        let func: ItemFn = parse_quote! {\n            #[intent(\n                id = \"example_intent\",\n                kind = invariant,\n                scope = global,\n                severity = hard,\n                statement = \"All connections must be closed\",\n                rationale = \"Resource cleanup is required\",\n                owner = \"cleanup_team\",\n                tags = \"cleanup, resource\"\n            )]\n            pub fn cleanup_function() {}\n        };\n\n        assert!(!func.attrs.is_empty());\n    }\n\n    /// Test attribute with overrides\n    #[test]\n    fn attribute_with_overrides() {\n        let func: ItemFn = parse_quote! {\n            #[intent(id = \"test\", kind = invariant, overrides = \"override_id\", override_rationale = \"reason\")]\n            pub fn test_fn() {}\n        };\n\n        assert!(!func.attrs.is_empty());\n    }\n\n    /// Test attribute with feature reference\n    #[test]\n    fn attribute_with_feature_ref() {\n        let func: ItemFn = parse_quote! {\n            #[intent(id = \"test\", kind = invariant, feature_ref = \"feature_123\")]\n            pub fn test_fn() {}\n        };\n\n        assert!(!func.attrs.is_empty());\n    }\n\n    /// Test that invalid kind produces compile error\n    #[test]\n    fn invalid_kind_produces_error() {\n        let func: ItemFn = parse_quote! {\n            #[intent(id = \"test\", kind = invalid_kind, statement = \"test\")]\n            pub fn test_fn() {}\n        };\n        assert!(!func.attrs.is_empty());\n    }\n}\n","traces":[{"line":1,"address":[1243856],"length":1,"stats":{"Line":1}},{"line":11,"address":[1214400,1214418],"length":1,"stats":{"Line":3}},{"line":12,"address":[1221207],"length":1,"stats":{"Line":1}},{"line":16,"address":[1222419,1222362,1222444],"length":1,"stats":{"Line":2}},{"line":17,"address":[1214437],"length":1,"stats":{"Line":2}},{"line":21,"address":[1214466,1214448],"length":1,"stats":{"Line":3}},{"line":22,"address":[1222503,1222876],"leng

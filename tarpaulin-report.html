d-fir-core","src","backend.rs"],"content":"use crate::model::{Decision, Feature, Registry, Story};\n\n#[derive(Debug, thiserror::Error)]\npub enum BackendError {\n    #[error(\"entity not found: {0}\")]\n    NotFound(String),\n\n    #[error(\"I/O error: {0}\")]\n    Io(#[from] std::io::Error),\n\n    #[error(\"parse error: {0}\")]\n    Parse(String),\n\n    #[error(\"invalid operation: {0}\")]\n    InvalidOperation(String),\n}\n\npub type Result\u003cT\u003e = std::result::Result\u003cT, BackendError\u003e;\n\npub trait FirBackend {\n    fn load_all(\u0026mut self) -\u003e Result\u003cRegistry\u003e;\n    fn load_feature(\u0026self, id: \u0026crate::model::FeatureId) -\u003e Result\u003cFeature\u003e;\n    fn save_feature(\u0026mut self, feature: \u0026Feature) -\u003e Result\u003c()\u003e;\n    fn load_story(\u0026self, id: \u0026crate::model::StoryId) -\u003e Result\u003cStory\u003e;\n    fn save_story(\u0026mut self, story: \u0026Story) -\u003e Result\u003c()\u003e;\n    fn load_decision(\u0026self, id: \u0026crate::model::DecisionId) -\u003e Result\u003cDecision\u003e;\n    fn save_decision(\u0026mut self, decision: \u0026Decision) -\u003e Result\u003c()\u003e;\n    fn next_id(\u0026self, kind: IdKind) -\u003e String;\n    fn search(\u0026self, query: \u0026str) -\u003e Vec\u003cSearchResult\u003e;\n}\n\n#[derive(Debug, Clone, Copy)]\npub enum IdKind {\n    Feature,\n    Story,\n    Decision,\n}\n\n#[derive(Debug, Clone)]\npub struct SearchResult {\n    pub id: String,\n    pub kind: SearchKind,\n    pub title: String,\n    pub excerpt: String,\n}\n\n#[derive(Debug, Clone)]\npub enum SearchKind {\n    Feature,\n    Story,\n    Decision,\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","alex","dev","rust","idd-dev","idd-fir","crates","idd-fir-core","src","integrity.rs"],"content":"use crate::model::{FeatureId, Registry};\nuse idd_dsl_core::DeclarationId;\nuse std::collections::HashSet;\n\n#[derive(Debug, Clone)]\npub struct IntegrityFinding {\n    pub severity: Severity,\n    pub entity: String,\n    pub description: String,\n}\n\n#[derive(Debug, Clone)]\npub enum Severity {\n    Error,\n    Warning,\n}\n\npub struct IntegrityChecker;\n\nimpl IntegrityChecker {\n    pub fn check_all(\n        registry: \u0026Registry,\n        known_constraints: \u0026HashSet\u003cDeclarationId\u003e,\n    ) -\u003e Vec\u003cIntegrityFinding\u003e {\n        let mut findings = Vec::new();\n        Self::check_referential(registry, \u0026mut findings);\n        Self::check_cycles(registry, \u0026mut findings);\n        Self::check_orphans(registry, \u0026mut findings);\n        Self::check_duplicate_feature_ids(registry, \u0026mut findings);\n        Self::check_duplicate_story_ids(registry, \u0026mut findings);\n        Self::check_duplicate_decision_ids(registry, \u0026mut findings);\n        Self::check_constraint_references(registry, known_constraints, \u0026mut findings);\n        findings\n    }\n\n    fn check_referential(registry: \u0026Registry, findings: \u0026mut Vec\u003cIntegrityFinding\u003e) {\n        for feature in \u0026registry.features {\n            for dep_id in \u0026feature.depends_on {\n                if registry.feature(dep_id).is_none() {\n                    findings.push(IntegrityFinding {\n                        severity: Severity::Error,\n                        entity: feature.id.0.clone(),\n                        description: format!(\"depends on unknown feature {}\", dep_id.0),\n                    });\n                }\n            }\n            for block_id in \u0026feature.blocks {\n                if registry.feature(block_id).is_none() {\n                    findings.push(IntegrityFinding {\n                        severity: Severity::Error,\n                        entity: feature.id.0.clone(),\n                        description: format!(\"blocks unknown feature {}\", block_id.0),\n                    });\n                }\n            }\n            if let Some(story_id) = \u0026feature.story {\n                if registry.story(story_id).is_none() {\n                    findings.push(IntegrityFinding {\n                        severity: Severity::Error,\n                        entity: feature.id.0.clone(),\n                        description: format!(\"references unknown story {}\", story_id.0),\n                    });\n                }\n            }\n            for dec_id in \u0026feature.decisions {\n                if registry.decision(dec_id).is_none() {\n                    findings.push(IntegrityFinding {\n                        severity: Severity::Warning,\n                        entity: feature.id.0.clone(),\n                        description: format!(\"references unknown decision {}\", dec_id.0),\n                    });\n                }\n            }\n        }\n    }\n\n    fn check_cycles(registry: \u0026Registry, findings: \u0026mut Vec\u003cIntegrityFinding\u003e) {\n        for feature in \u0026registry.features {\n            let mut visited = std::collections::HashSet::new();\n            if Self::has_cycle(registry, \u0026feature.id, \u0026mut visited) {\n                findings.push(IntegrityFinding {\n                    severity: Severity::Error,\n                    entity: feature.id.0.clone(),\n                    description: \"dependency cycle detected\".into(),\n                });\n            }\n        }\n    }\n\n    fn has_cycle(\n        registry: \u0026Registry,\n        id: \u0026FeatureId,\n        visited: \u0026mut std::collections::HashSet\u003cFeatureId\u003e,\n    ) -\u003e bool {\n        if !visited.insert(id.clone()) {\n            return true;\n        }\n        let Some(feature) = registry.feature(id) else {\n            return false;\n        };\n        for dep_id in \u0026feature.depends_on {\n            if Self::has_cycle(registry, dep_id, visited) {\n                return true;\n            }\n        }\n        visited.remove(id);\n        false\n    }\n\n    fn check_orphans(registry: \u0026Registry, findings: \u0026mut Vec\u003cIntegrityFinding\u003e) {\n        for feature in \u0026registry.features {\n            if feature.story.is_none() \u0026\u0026 !feature.tags.is_empty() {\n                findings.push(IntegrityFinding {\n                    severity: Severity::Warning,\n                    entity: feature.id.0.clone(),\n                    description: \"feature has no parent story\".into(),\n                });\n            }\n        }\n    }\n\n    fn check_duplicate_ids(\n        entities: impl Iterator\u003cItem = (String, String)\u003e,\n        kind: \u0026str,\n        findings: \u0026mut Vec\u003cIntegrityFinding\u003e,\n    ) {\n        let mut seen = std::collections::HashMap::new();\n        for (id, title) in entities {\n            if let Some(prev) = seen.insert(id.clone(), title) {\n                findings.push(IntegrityFinding {\n                    severity: Severity::Error,\n                    entity: id,\n                    description: format!(\"duplicate {kind} ID (also used by: \\\"{prev}\\\")\"),\n                });\n            }\n        }\n    }\n\n    fn check_duplicate_feature_ids(registry: \u0026Registry, findings: \u0026mut Vec\u003cIntegrityFinding\u003e) {\n        Self::check_duplicate_ids(\n            registry\n                .features\n                .iter()\n                .map(|f| (f.id.0.clone(), f.title.clone())),\n            \"feature\",\n            findings,\n        );\n    }\n\n    fn check_duplicate_story_ids(registry: \u0026Registry, findings: \u0026mut Vec\u003cIntegrityFinding\u003e) {\n        Self::check_duplicate_ids(\n            registry\n                .stories\n                .iter()\n                .map(|s| (s.id.0.clone(), s.title.clone())),\n            \"story\",\n            findings,\n        );\n    }\n\n    fn check_duplicate_decision_ids(registry: \u0026Registry, findings: \u0026mut Vec\u003cIntegrityFinding\u003e) {\n        Self::check_duplicate_ids(\n            registry\n                .decisions\n                .iter()\n                .map(|d| (d.id.0.clone(), d.title.clone())),\n            \"decision\",\n            findings,\n        );\n    }\n\n    fn check_constraint_references(\n        registry: \u0026Registry,\n        known: \u0026HashSet\u003cDeclarationId\u003e,\n        findings: \u0026mut Vec\u003cIntegrityFinding\u003e,\n    ) {\n        let feature_constraints = registry\n            .features\n            .iter()\n            .flat_map(|f| f.constraints.iter().map(move |c| (\u0026f.id.0, c)));\n        let story_constraints = registry\n            .stories\n            .iter()\n            .flat_map(|s| s.constraints.iter().map(move |c| (\u0026s.id.0, c)));\n\n        for (entity_id, cid) in feature_constraints.chain(story_constraints) {\n            if !known.contains(cid) {\n                findings.push(IntegrityFinding {\n                    severity: Severity::Error,\n                    entity: entity_id.clone(),\n                    description: format!(\"references unknown constraint \\\"{}\\\"\", cid.0),\n                });\n            }\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::model::{Decision, Feature, FeatureStatus, Registry, Story};\n\n    fn make_feature(id: \u0026str) -\u003e Feature {\n        Feature {\n            id: FeatureId(id.into()),\n            title: format!(\"Feature {id}\"),\n            status: FeatureStatus::Wish,\n            created: chrono::NaiveDate::from_ymd_opt(2026, 1, 1).unwrap(),\n            updated: None,\n            author: None,\n            promoted_from: None,\n            promoted_date: None,\n            story: None,\n            depends_on: Vec::new(),\n            blocks: Vec::new(),\n            related: Vec::new(),\n            children: Vec::new(),\n            constraints: Vec::new(),\n            preliminary_constraints: Vec::new(),\n            decisions: Vec::new(),\n            source: None,\n            conversations: Vec::new(),\n            tags: Vec::new(),\n            priority: None,\n            effort_estimate: None,\n            external: None,\n            body: String::new(),\n        }\n    }\n\n    #[test]\n    fn duplicate_feature_ids_detected() {\n        let mut registry = Registry::new();\n        registry.features.push(make_feature(\"FIR-1\"));\n        let mut dup = make_feature(\"FIR-1\");\n        dup.title = \"Duplicate\".into();\n        registry.features.push(dup);\n\n        let findings = IntegrityChecker::check_all(\u0026registry, \u0026HashSet::new());\n        let dup_findings: Vec\u003c_\u003e = findings\n            .iter()\n            .filter(|f| f.description.contains(\"duplicate feature ID\"))\n            .collect();\n        assert_eq!(dup_findings.len(), 1);\n    }\n\n    #[test]\n    fn duplicate_story_ids_detected() {\n        let mut registry = Registry::new();\n        registry.stories.push(Story {\n            id: crate::model::StoryId(\"STORY-1\".into()),\n            title: \"Story A\".into(),\n            status: \"wish\".into(),\n            created: chrono::NaiveDate::from_ymd_opt(2026, 1, 1).unwrap(),\n            features: Vec::new(),\n            constraints: Vec::new(),\n            tags: Vec::new(),\n            body: String::new(),\n        });\n        registry.stories.push(Story {\n            id: crate::model::StoryId(\"STORY-1\".into()),\n            title: \"Story B\".into(),\n            status: \"wish\".into(),\n            created: chrono::NaiveDate::from_ymd_opt(2026, 1, 1).unwrap(),\n            features: Vec::new(),\n            constraints: Vec::new(),\n            tags: Vec::new(),\n            body: String::new(),\n        });\n\n        let findings = IntegrityChecker::check_all(\u0026registry, \u0026HashSet::new());\n        let dup_findings: Vec\u003c_\u003e = findings\n            .iter()\n            .filter(|f| f.description.contains(\"duplicate story ID\"))\n            .collect();\n        assert_eq!(dup_findings.len(), 1);\n    }\n\n    #[test]\n    fn duplicate_decision_ids_detected() {\n        let mut registry = Registry::new();\n        registry.decisions.push(Decision {\n            id: crate::model::DecisionId(\"DEC-1\".into()),\n            title: \"Decision A\".into(),\n            date: chrono::NaiveDate::from_ymd_opt(2026, 1, 1).unwrap(),\n            status: \"proposed\".into(),\n            features: Vec::new(),\n            constraints: Vec::new(),\n            body: String::new(),\n        });\n        registry.decisions.push(Decision {\n            id: crate::model::DecisionId(\"DEC-1\".into()),\n            title: \"Decision B\".into(),\n            date: chrono::NaiveDate::from_ymd_opt(2026, 1, 1).unwrap(),\n            status: \"proposed\".into(),\n            features: Vec::new(),\n            constraints: Vec::new(),\n            body: String::new(),\n        });\n\n        let findings = IntegrityChecker::check_all(\u0026registry, \u0026HashSet::new());\n        let dup_findings: Vec\u003c_\u003e = findings\n            .iter()\n            .filter(|f| f.description.contains(\"duplicate decision ID\"))\n            .collect();\n        assert_eq!(dup_findings.len(), 1);\n    }\n\n    #[test]\n    fn no_false_positives_for_unique_ids() {\n        let mut registry = Registry::new();\n        registry.features.push(make_feature(\"FIR-1\"));\n        registry.features.push(make_feature(\"FIR-2\"));\n        registry.features.push(make_feature(\"FIR-3\"));\n\n        let findings = IntegrityChecker::check_all(\u0026registry, \u0026HashSet::new());\n        let dup_findings: Vec\u003c_\u003e = findings\n            .iter()\n            .filter(|f| f.description.contains(\"duplicate\"))\n            .collect();\n        assert!(dup_findings.is_empty());\n    }\n\n    #[test]\n    fn unknown_constraint_references_detected() {\n        let mut registry = Registry::new();\n        let mut feature = make_feature(\"FIR-1\");\n        feature.constraints = vec![\n            DeclarationId(\"known-constraint\".into()),\n            DeclarationId(\"ghost-constraint\".into()),\n        ];\n        registry.features.push(feature);\n\n        let known: HashSet\u003cDeclarationId\u003e = [DeclarationId(\"known-constraint\".into())]\n            .into_iter()\n            .collect();\n\n        let findings = IntegrityChecker::check_all(\u0026registry, \u0026known);\n        let missing: Vec\u003c_\u003e = findings\n            .iter()\n            .filter(|f| f.description.contains(\"unknown constraint\"))\n            .collect();\n        assert_eq!(missing.len(), 1);\n        assert!(missing[0].description.contains(\"ghost-constraint\"));\n    }\n\n    #[test]\n    fn valid_constraint_references_pass() {\n        let mut registry = Registry::new();\n        let mut feature = make_feature(\"FIR-1\");\n        feature.constraints = vec![\n            DeclarationId(\"constraint-a\".into()),\n            DeclarationId(\"constraint-b\".into()),\n        ];\n        registry.features.push(feature);\n\n        let known: HashSet\u003cDeclarationId\u003e = [\n            DeclarationId(\"constraint-a\".into()),\n            DeclarationId(\"constraint-b\".into()),\n        ]\n        .into_iter()\n        .collect();\n\n        let findings = IntegrityChecker::check_all(\u0026registry, \u0026known);\n        let constraint_findings: Vec\u003c_\u003e = findings\n            .iter()\n            .filter(|f| f.description.contains(\"unknown constraint\"))\n            .collect();\n        assert!(constraint_findings.is_empty());\n    }\n}\n","traces":[{"line":21,"address":[16886032,16886285,16886291],"length":1,"stats":{"Line":0}},{"line":25,"address":[16886066],"length":1,"stats":{"Line":0}},{"line":26,"address":[16886095],"length":1,"stats":{"Line":0}},{"line":27,"address":[16886147],"length":1,"stats":{"Line":0}},{"line":28,"address":[16886164],"length":1,"stats":{"Line":0}},{"line":29,"ad onfig {\n    #[serde(default)]\n    pub name: String,\n    #[serde(default)]\n    pub version: String,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct CounterConfig {\n    #[serde(default = \"default_next_feature\")]\n    pub next_feature: u64,\n    #[serde(default = \"default_next_story\")]\n    pub next_story: u64,\n    #[serde(default = \"default_next_decision\")]\n    pub next_decision: u64,\n}\n\nfn default_next_feature() -\u003e u64 {\n    1\n}\nfn default_next_story() -\u003e u64 {\n    1\n}\nfn default_next_decision() -\u003e u64 {\n    1\n}\n\nimpl Default for CounterConfig {\n    fn default() -\u003e Self {\n        Self {\n            next_feature: 1,\n            next_story: 1,\n            next_decision: 1,\n        }\n    }\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct AgentConfig {\n    #[serde(default)]\n    pub context_includes: Vec\u003cString\u003e,\n    #[serde(default = \"default_context_budget\")]\n    pub context_budget: usize,\n}\n\nfn default_context_budget() -\u003e usize {\n    4000\n}\n\nimpl Default for AgentConfig {\n    fn default() -\u003e Self {\n        Self {\n            context_includes: Vec::new(),\n            context_budget: 4000,\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use proptest::prelude::*;\n\n    // ── FeatureStatus state machine invariants ──────────────\n\n    proptest! {\n        #[test]\n        fn status_next_is_monotonic(status in prop_oneof![\n            Just(FeatureStatus::Wish),\n            Just(FeatureStatus::Exploring),\n            Just(FeatureStatus::Scoping),\n            Just(FeatureStatus::Designing),\n            Just(FeatureStatus::Ready),\n            Just(FeatureStatus::InProgress),\n            Just(FeatureStatus::Verifying),\n        ]) {\n            let next = status.next().unwrap();\n            prop_assert!(matches!(\n                (status, next),\n                (FeatureStatus::Wish, FeatureStatus::Exploring)\n                | (FeatureStatus::Exploring, FeatureStatus::Scoping)\n                | (FeatureStatus::Scoping, FeatureStatus::Designing)\n                | (FeatureStatus::Designing, FeatureStatus::Ready)\n                | (FeatureStatus::Ready, FeatureStatus::InProgress)\n                | (FeatureStatus::InProgress, FeatureStatus::Verifying)\n                | (FeatureStatus::Verifying, FeatureStatus::Done),\n            ));\n        }\n\n        #[test]\n        fn terminal_statuses_have_no_next(status in prop_oneof![\n            Just(FeatureStatus::Done),\n            Just(FeatureStatus::Abandoned),\n            Just(FeatureStatus::Deferred),\n        ]) {\n            prop_assert!(status.next().is_none());\n        }\n\n        #[test]\n        fn terminal_and_active_are_mutually_exclusive(status in prop_oneof![\n            Just(FeatureStatus::Wish),\n            Just(FeatureStatus::Exploring),\n            Just(FeatureStatus::Scoping),\n            Just(FeatureStatus::Designing),\n            Just(FeatureStatus::Ready),\n            Just(FeatureStatus::InProgress),\n            Just(FeatureStatus::Verifying),\n            Just(FeatureStatus::Done),\n            Just(FeatureStatus::Abandoned),\n            Just(FeatureStatus::Deferred),\n        ]) {\n            prop_assert!(!(status.is_terminal() \u0026\u0026 status.is_active()));\n        }\n\n        #[test]\n        fn status_display_roundtrip(status in prop_oneof![\n            Just(FeatureStatus::Wish),\n            Just(FeatureStatus::Exploring),\n            Just(FeatureStatus::Scoping),\n            Just(FeatureStatus::Designing),\n            Just(FeatureStatus::Ready),\n            Just(FeatureStatus::InProgress),\n            Just(FeatureStatus::Verifying),\n            Just(FeatureStatus::Done),\n            Just(FeatureStatus::Abandoned),\n            Just(FeatureStatus::Deferred),\n        ]) {\n            let s = status.to_string();\n            prop_assert!(matches!(\n                s.as_str(), p_assert_eq!(did.to_string(), expected_did);\n        }\n    }\n\n    // ── Registry query invariants ───────────────────────────\n\n    proptest! {\n        #[test]\n        fn active_features_excludes_terminal(\n            n in 1usize..20usize,\n        ) {\n            let mut registry = Registry::new();\n            let statuses = [\n                FeatureStatus::Wish,\n                FeatureStatus::Exploring,\n                FeatureStatus::Scoping,\n                FeatureStatus::Designing,\n                FeatureStatus::Ready,\n                FeatureStatus::InProgress,\n                FeatureStatus::Verifying,\n                FeatureStatus::Done,\n                FeatureStatus::Abandoned,\n                FeatureStatus::Deferred,\n            ];\n\n            for i in 0..n {\n                let status = statuses[i % statuses.len()];\n                let id = registry.alloc_feature_id();\n                registry.features.push(Feature {\n                    id,\n                    title: format!(\"Feature {i}\"),\n                    status,\n                    created: chrono::NaiveDate::from_ymd_opt(2026, 1, 1).unwrap(),\n                    updated: None,\n                    author: None,\n                    promoted_from: None,\n                    promoted_date: None,\n                    story: None,\n                    depends_on: Vec::new(),\n                    blocks: Vec::new(),\n                    related: Vec::new(),\n                    children: Vec::new(),\n                    constraints: Vec::new(),\n                    preliminary_constraints: Vec::new(),\n                    decisions: Vec::new(),\n                    source: None,\n                    conversations: Vec::new(),\n                    tags: Vec::new(),\n                    priority: None,\n                    effort_estimate: None,\n                    external: None,\n                    body: String::new(),\n                });\n            }\n\n            let active = registry.active_features();\n            for f in \u0026active {\n                prop_assert!(!f.status.is_terminal());\n            }\n\n            let expected_active = registry.features.iter()\n                .filter(|f| !f.status.is_terminal())\n                .count();\n            prop_assert_eq!(active.len(), expected_active);\n        }\n    }\n\n    // ── Serialization roundtrips ────────────────────────────\n\n    fn arb_feature() -\u003e impl Strategy\u003cValue = Feature\u003e {\n        (any::\u003cu64\u003e(), any::\u003cString\u003e(), any::\u003cString\u003e()).prop_map(|(n, title, body)| Feature {\n            id: FeatureId::new(n),\n            title,\n            status: FeatureStatus::Wish,\n            created: chrono::NaiveDate::from_ymd_opt(2026, 1, 1).unwrap(),\n            updated: None,\n            author: None,\n            promoted_from: None,\n            promoted_date: None,\n            story: None,\n            depends_on: Vec::new(),\n            blocks: Vec::new(),\n            related: Vec::new(),\n            children: Vec::new(),\n            constraints: Vec::new(),\n            preliminary_constraints: Vec::new(),\n            decisions: Vec::new(),\n            source: None,\n            conversations: Vec::new(),\n            tags: Vec::new(),\n            priority: None,\n            effort_estimate: None,\n            external: None,\n            body,\n        })\n    }\n\n    proptest! {\n        #[test]\n        fn feature_json_roundtrip(feature in arb_feature()) {\n            let json = serde_json::to_string(\u0026feature).unwrap();\n            let parsed: Feature = serde_json::from_str(\u0026json).unwrap();\n            prop_assert_eq!(feature, parsed);\n        }\n\n        #[test]\n        fn config_json_roundtrip(config in prop_oneof![\n            Just(Config::default()),\n            Just(Config {\n                counters: CounterConfig {\n                    next_feature: 42,\n                    next_story: 5,\n                    next_decision: 3,\n                },\n                ..Config::default()\n            }),\n        ]) {\n            let json = serde_json::to_string(\u0026config).unwrap();\n            let parsed: Config = serde_json::from_str(\u0026json).unwrap();\n            prop_assert_eq!(config.counters.next_feature, parsed.counters.next_feature);\n            prop_assert_eq!(config.counters.next_story, parsed.counters.next_story);\n            prop_assert_eq!(config.counters.next_decision, parsed.counters.next_decision);\n        }\n    }\n\n    // ── Invalid input rejection ─────────────────────────────\n\n    proptest! {\n        #[test]\n        fn malformed_feature_json_never_panics(\n            bytes in proptest::collection::vec(0u8..=255, 0..=512),\n        ) {\n            let s = String::from_utf8_lossy(\u0026bytes);\n            let _: Result\u003cFeature, _\u003e = serde_json::from_str(\u0026s);\n        }\n\n        #[test]\n        fn unknown_status_json_fails(\n            status in \"[a-zA-Z0-9_-]+\",\n        ) {\n            let json = format!(\n                r#\"{{\"id\":\"FIR-1\",\"title\":\"t\",\"status\":\"{}\",\"created\":\"2026-01-01\",\"body\":\"\"}}\"#,\n                status\n            );\n            let result: Result\u003cFeature, _\u003e = serde_json::from_str(\u0026json);\n            prop_assert!(result.is_err() || status == \"wish\" || status == \"exploring\"\n                || status == \"scoping\" || status == \"designing\" || status == \"ready\"\n                || status == \"in-progress\" || status == \"verifying\" || status == \"done\"\n                || status == \"abandoned\" || status == \"deferred\");\n        }\n\n        #[test]\n        fn structurally_invalid_feature_json_fails(\n            value in prop_oneof![\n                Just(serde_json::Value::Null),\n                Just(serde_json::Value::Bool(true)),\n                Just(serde_json::Value::Number(0.into())),\n                Just(serde_json::Value::Array(vec![])),\n            ],\n        ) {\n            let json = serde_json::to_string(\u0026value).unwrap();\n            let result: Result\u003cFeature, _\u003e = serde_json::from_str(\u0026json);\n            prop_assert!(result.is_err());\n        }\n    }\n\n    // ── Graph traversal tests ──────────────────────────────\n\n    fn build_dep_graph() -\u003e Registry {\n        let mut reg = Registry::new();\n\n        // Feature 0 depends on Feature 1 and Feature 2\n        let f0 = Feature {\n            id: FeatureId::new(0),\n            title: \"Feature 0\".into(),\n            status: FeatureStatus::InProgress,\n            created: chrono::NaiveDate::from_ymd_opt(2024, 1, 1).unwrap(),\n            updated: None,\n            author: None,\n            promoted_from: None,\n            promoted_date: None,\n            story: None,\n            depends_on: vec![FeatureId::new(1), FeatureId::new(2)],\n            blocks: vec![],\n            related: vec![],\n            children: vec![],\n            constraints: vec![],\n            preliminary_constraints: vec![],\n            decisions: vec![],\n            source: None,\n            conversations: vec![],\n            tags: vec![],\n            priority: None,\n            effort_estimate: None,\n            external: None,\n            body: String::new(),\n        };\n        reg.features.push(f0);\n\n        // Feature 1 depends on Feature 3\n        let f1 = Feature {\n            id: FeatureId::new(1),\n            title: \"Feature 1\".into(),\n            status: FeatureStatus::Ready,\n            created: chrono::NaiveDate::from_ymd_opt(2024, 1, 1).unwrap(),\n            updated: None,\n            author: None,\n            promoted_from: None,\n            promoted_date: None,\n            story: None,\n            depends_on: vec![FeatureId::new(3)],\n            blocks: vec![],\n            related: vec![],\n            children: vec![],\n            constraints: vec![],\n            preliminary_constraints: vec![],\n            decisions: vec![],\n            source: None,\n            conversations: vec![],\n            tags: vec![],\n            priority: None,\n            effort_estimate: None,\n            external: None,\n            body: String::new(),\n        };\n        reg.features.push(f1);\n\n        // Feature 2 has no dependencies\n        let f2 = Feature {\n            id: FeatureId::new(2),\n            title: \"Feature 2\".into(),\n            status: FeatureStatus::Done,\n            created: chrono::NaiveDate::from_ymd_opt(2024, 1, 1).unwrap(),\n            updated: None,\n            author: None,\n            promoted_from: None,\n            promoted_date: None,\n            story: None,\n            depends_on: vec![],\n            blocks: vec![],\n            related: vec![],\n            children: vec![],\n            constraints: vec![],\n            preliminary_constraints: vec![],\n            decisions: vec![],\n            source: None,\n            conversations: vec![],\n            tags: vec![],\n            priority: None,\n            effort_estimate: None,\n            external: None,\n            body: String::new(),\n        };\n        reg.features.push(f2);\n\n        // Feature 3 has no dependencies\n        let f3 = Feature {\n            id: FeatureId::new(3),\n            title: \"Feature 3\".into(),\n            status: FeatureStatus::Done,\n            created: chrono::NaiveDate::from_ymd_opt(2024, 1, 1).unwrap(),\n            updated: None,\n            author: None,\n            promoted_from: None,\n            promoted_date: None,\n            story: None,\n            depends_on: vec![],\n            blocks: vec![],\n            related: vec![],\n            children: vec![],\n            constraints: vec![],\n            preliminary_constraints: vec![],\n            decisions: vec![],\n            source: None,\n            conversations: vec![],\n            tags: vec![],\n            priority: None,\n            effort_estimate: None,\n            external: None,\n            body: String::new(),\n        };\n        reg.features.push(f3);\n\n        reg\n    }\n\n    #[test]\n    fn test_transitive_dependencies_simple() {\n        let reg = build_dep_graph();\n        let fid = FeatureId::new(0);\n\n        let deps = reg.transitive_dependencies(\u0026fid);\n        // Should return F1, F2, F3 (direct deps: F1, F2; transitive from F1: F3)\n        assert_eq!(deps.len(), 3);\n        let ids: Vec\u003cFeatureId\u003e = deps.iter().map(|f| f.id.clone()).collect();\n        assert!(ids.contains(\u0026FeatureId::new(1)));\n        assert!(ids.contains(\u0026FeatureId::new(2)));\n        assert!(ids.contains(\u0026FeatureId::new(3)));\n    }\n\n    #[test]\n    fn test_transitive_dependencies_with_max_depth() {\n        let reg = build_dep_graph();\n        let fid = FeatureId::new(0);\n\n        // Max depth 1 should only return direct dependencies\n        let deps = reg.transitive_dependencies_depth(\u0026fid, 1);\n        assert_eq!(deps.len(), 2); // F1 and F2 only\n        let ids: Vec\u003cFeatureId\u003e = deps.iter().map(|f| f.id.clone()).collect();\n        assert!(ids.contains(\u0026FeatureId::new(1)));\n        assert!(ids.contains(\u0026FeatureId::new(2)));\n        assert!(!ids.contains(\u0026FeatureId::new(3)));\n    }\n\n    #[test]\n    fn test_transitive_dependencies_no_deps() {\n        let reg = Registry::new();\n        let fid = FeatureId::new(999); // Non-existent feature\n\n        let deps = reg.transitive_dependencies(\u0026fid);\n        assert_eq!(deps.len(), 0);\n    }\n\n    #[test]\n    fn test_transitive_dependencies_no_cycles() {\n        let mut reg = Registry::new();\n\n        // Create a cycle: F0 -\u003e F1 -\u003e F0\n        let f0 = Feature {\n            id: FeatureId::new(0),\n            title: \"Feature 0\".into(),\n            status: FeatureStatus::InProgress,\n            crea .status(vec![FeatureStatus::InProgress])\n            .resolve();\n\n        assert_eq!(results.len(), 0);\n    }\n}\n\nenum StaleMode {\n    Stale { days: u32, now: chrono::NaiveDate },\n    Recent { days: u32, now: chrono::NaiveDate },\n}\n\n/// Composable query builder over a [`Registry`].\n///\n/// Accumulates filter predicates via a builder API, then resolves them\n/// in a single pass over the feature set via [`resolve`](Self::resolve).\n///\n/// # Example\n/// ```ignore\n/// let features = Query::new(\u0026registry)\n///     .status(vec![FeatureStatus::InProgress, FeatureStatus::Ready])\n///     .tag(\"backend\")\n///     .stale_days(14)\n///     .resolve();\n/// ```\npub struct Query\u003c'a\u003e {\n    registry: \u0026'a Registry,\n    statuses: Vec\u003cFeatureStatus\u003e,\n    tag: Option\u003cString\u003e,\n    story: Option\u003cStoryId\u003e,\n    blocks: Option\u003cFeatureId\u003e,\n    constraint: Option\u003cString\u003e,\n    depends_on: Option\u003cFeatureId\u003e,\n    stale_mode: Option\u003cStaleMode\u003e,\n}\n\nimpl\u003c'a\u003e Query\u003c'a\u003e {\n    pub fn new(registry: \u0026'a Registry) -\u003e Self {\n        Self {\n            registry,\n            statuses: Vec::new(),\n            tag: None,\n            story: None,\n            blocks: None,\n            constraint: None,\n            depends_on: None,\n            stale_mode: None,\n        }\n    }\n\n    /// Filter to features matching any of the given statuses.\n    pub fn status(mut self, statuses: Vec\u003cFeatureStatus\u003e) -\u003e Self {\n        self.statuses = statuses;\n        self\n    }\n\n    /// Filter to features containing the given tag.\n    pub fn tag(mut self, tag: impl Into\u003cString\u003e) -\u003e Self {\n        self.tag = Some(tag.into());\n        self\n    }\n\n    /// Filter to features linked to the given story.\n    pub fn story(mut self, story_id: StoryId) -\u003e Self {\n        self.story = Some(story_id);\n        self\n    }\n\n    /// Filter to features that block the given feature.\n    pub fn blocks(mut self, feature_id: FeatureId) -\u003e Self {\n        self.blocks = Some(feature_id);\n        self\n    }\n\n    /// Filter to features associated with the given constraint ID.\n    pub fn constraint(mut self, constraint_id: impl Into\u003cString\u003e) -\u003e Self {\n        self.constraint = Some(constraint_id.into());\n        self\n    }\n\n    /// Filter to features that depend on the given feature.\n    pub fn depends_on(mut self, feature_id: FeatureId) -\u003e Self {\n        self.depends_on = Some(feature_id);\n        self\n    }\n\n    /// Filter to features not updated within the given number of days.\n    pub fn stale_days(mut self, days: u32, now: chrono::NaiveDate) -\u003e Self {\n        self.stale_mode = Some(StaleMode::Stale { days, now });\n        self\n    }\n\n    /// Filter to features updated within the given number of days.\n    pub fn recent_days(mut self, days: u32, now: chrono::NaiveDate) -\u003e Self {\n        self.stale_mode = Some(StaleMode::Recent { days, now });\n        self\n    }\n\n    /// Resolve all accumulated predicates in a single pass.\n    pub fn resolve(self) -\u003e Vec\u003c\u0026'a Feature\u003e {\n        let threshold = self.stale_mode.map(|m| match m {\n            StaleMode::Stale { days, now } =\u003e (now - chrono::Duration::days(days as i64), false),\n            StaleMode::Recent { days, now } =\u003e (now - chrono::Duration::days(days as i64), true),\n        });\n\n        self.registry\n            .features\n            .iter()\n            .filter(|f| {\n                if !self.statuses.is_empty() \u0026\u0026 !self.statuses.contains(\u0026f.status) {\n                    return false;\n                }\n                if let Some(tag) = \u0026self.tag {\n                    if !f.tags.iter().any(|t| t == tag) {\n                        return false;\n                    }\n                }\n                if let Some(story_id) = \u0026self.story {\n                    if f.story.as_ref() != Some(story_id) {\n                        return false;\n                    }\n                }\n                if let Some(feature_id) = \u0026self.blocks {\n                    if !f.blocks.iter().any(|b| b == feature_id) {\n                        return false;\n                    }\n                }\n                if let Some(constraint_id) = \u0026self.constraint {\n                    if !f.constraints.iter().any(|c| c.0 == *constraint_id) {\n                        return false;\n                    }\n                }\n                if let Some(feature_id) = \u0026self.depends_on {\n                    if !f.depends_on.contains(feature_id) {\n                        return false;\n                    }\n                }\n                if let Some((threshold, keep_recent)) = threshold {\n                    let last_activity = f.updated.unwrap_or(f.created);\n                    if keep_recent {\n                        if last_activity \u003c threshold {\n                            return false;\n                        }\n                    } else if last_activity \u003e= threshold {\n                        return false;\n                    }\n                }\n                true\n            })\n            .collect()\n    }\n}\n","traces":[{"line":197,"address":[16782608],"length":1,"stats":{"Line":0}},{"line":200,"address":[16782638],"length":1,"stats":{"Line":0}},{"line":211,"address":[16783527,16783376],"length":1,"stats":{"Line":0}},{"line":212,"address":[16783485,16783408],"length":1,"stats":{"Line":0}},{"line":213,"address":[16783507],"length":1,"stats":{"Line":0}},{"line":217,"address":[6806838,6806592],"length":1,"stats":{"Line":0}},{"line":218,"address":[6806696,6806611],"length":1,"stats":{"Line":0}},{"line":219,"address":[6806818],"length":1,"stats":{"Line":0}},{"line":223,"address":[16782992,16783158],"length":1,"stats":{"Line":0}},{"line":224,"address":[1678 n    let content =\n        render_frontmatter(frontmatter, body).map_err(|e| BackendError::Parse(e.to_string()))?;\n    let tmp = path.with_extension(\"md.tmp\");\n    std::fs::write(\u0026tmp, \u0026content).map_err(BackendError::Io)?;\n    std::fs::rename(\u0026tmp, path).map_err(BackendError::Io)?;\n    Ok(())\n}\n\nfn read_md\u003cT: serde::de::DeserializeOwned\u003e(path: \u0026Path) -\u003e BackendResult\u003c(T, String)\u003e {\n    let content = std::fs::read_to_string(path).map_err(|e| {\n        if e.kind() == std::io::ErrorKind::NotFound {\n            BackendError::NotFound(format!(\"{:?}\", path))\n        } else {\n            BackendError::Io(e)\n        }\n    })?;\n    let parsed =\n        parse_frontmatter::\u003cT\u003e(\u0026content).map_err(|e| BackendError::Parse(e.to_string()))?;\n    Ok((parsed.frontmatter, parsed.body))\n}\n\npub struct FileBackend {\n    base_path: PathBuf,\n    registry: Registry,\n}\n\nimpl FileBackend {\n    pub fn new(base_path: PathBuf) -\u003e BackendResult\u003cSelf\u003e {\n        let mut backend = Self {\n            base_path,\n            registry: Registry::new(),\n        };\n        backend.registry = backend.load_all()?;\n        Ok(backend)\n    }\n\n    fn fir_path(\u0026self) -\u003e PathBuf {\n        self.base_path.join(\".fir\")\n    }\n\n    fn feature_path(\u0026self, id: \u0026FeatureId) -\u003e PathBuf {\n        self.fir_path()\n            .join(\"features\")\n            .join(format!(\"{}.md\", id.0))\n    }\n\n    fn story_path(\u0026self, id: \u0026StoryId) -\u003e PathBuf {\n        self.fir_path().join(\"stories\").join(format!(\"{}.md\", id.0))\n    }\n\n    fn decision_path(\u0026self, id: \u0026DecisionId) -\u003e PathBuf {\n        self.fir_path()\n            .join(\"decisions\")\n            .join(format!(\"{}.md\", id.0))\n    }\n\n    fn ensure_dirs(\u0026self) -\u003e std::io::Result\u003c()\u003e {\n        let fir = self.fir_path();\n        std::fs::create_dir_all(fir.join(\"features\"))?;\n        std::fs::create_dir_all(fir.join(\"stories\"))?;\n        std::fs::create_dir_all(fir.join(\"decisions\"))?;\n        std::fs::create_dir_all(fir.join(\"archive\"))?;\n        Ok(())\n    }\n\n    fn load_config(\u0026self) -\u003e BackendResult\u003cConfig\u003e {\n        let config_path = self.fir_path().join(\"config.toml\");\n        let content = std::fs::read_to_string(\u0026config_path).map_err(|e| {\n            if e.kind() == std::io::ErrorKind::NotFound {\n                BackendError::NotFound(format!(\"config at {:?}\", config_path))\n            } else {\n                BackendError::Io(e)\n            }\n        })?;\n        toml::from_str(\u0026content).map_err(|e| BackendError::Parse(e.to_string()))\n    }\n\n    pub fn archive_feature(\u0026self, id: \u0026FeatureId) -\u003e BackendResult\u003c()\u003e {\n        let src = self.feature_path(id);\n        self.ensure_dirs().map_err(BackendError::Io)?;\n        let dst = self.fir_path().join(\"archive\").join(format!(\"{}.md\", id.0));\n        if src.exists() {\n            std::fs::rename(\u0026src, \u0026dst).map_err(BackendError::Io)?;\n        }\n        Ok(())\n    }\n}\n\nimpl FirBackend for FileBackend {\n    fn load_all(\u0026mut self) -\u003e BackendResult\u003cRegistry\u003e {\n        let config = match self.load_config() {\n            Ok(c) =\u003e c,\n            Err(BackendError::NotFound(_)) =\u003e Config::default(),\n            Err(e) =\u003e return Err(e),\n        };\n\n        let mut registry = Registry {\n            next_feature_id: config.counters.next_feature,\n            next_story_id: config.counters.next_story,\n            next_decision_id: config.counters.next_decision,\n            ..Registry::new()\n        };\n\n        let features_dir = self.fir_path().join(\"features\");\n        if features_dir.exists() {\n            for entry in std::fs::read_dir(\u0026features_dir).map_err(BackendError::Io)? {\n                let entry = entry.map_err(BackendError::Io)?;\n                let path = entry.path();\n                if path.extension().and_then(|e| e.to_str()) == Some(\"md\") {\n                    let (feature, body) = read_md::\u003cFeature\u003e(\u0026path)?;\n                    let mut feature = feature;\n                    feature.body = body;\n                    registry.features.push(feature);\n                }\n            }\n        }\n\n        let stories_dir = self.fir_path().join(\"stories\");\n        if stories_dir.exists() {\n            for entry in std::fs::read_dir(\u0026stories_dir).map_err(BackendError::Io)? {\n                let entry = entry.map_err(BackendError::Io)?;\n                let path = entry.path();\n                if path.extension().and_then(|e| e.to_str()) == Some(\"md\") {\n                    let (story, body) = read_md::\u003cStory\u003e(\u0026path)?;\n                    let mut story = story;\n                    story.body = body;\n                    registry.stories.push(story);\n                }\n            }\n        }\n\n        let decisions_dir = self.fir_path().join(\"decisions\");\n        if decisions_dir.exists() {\n            for entry in std::fs::read_dir(\u0026decisions_dir).map_err(BackendError::Io)? {\n                let entry = entry.map_err(BackendError::Io)?;\n                let path = entry.path();\n                if path.extension().and_then(|e| e.to_str()) == Some(\"md\") {\n                    let (decision, body) = read_md::\u003cDecision\u003e(\u0026path)?;\n                    let mut decision = decision;\n                    decision.body = body;\n                    registry.decisions.push(decision);\n                }\n            }\n        }\n\n        Ok(registry)\n    }\n\n    fn load_feature(\u0026self, id: \u0026FeatureId) -\u003e BackendResult\u003cFeature\u003e {\n        let path = self.feature_path(id);\n        let (mut feature, body) = read_md::\u003cFeature\u003e(\u0026path)?;\n        feature.body = body;\n        Ok(feature)\n    }\n\n    fn save_feature(\u0026mut self, feature: \u0026Feature) -\u003e BackendResult\u003c()\u003e {\n        self.ensure_dirs().map_err(BackendError::Io)?;\n        let path = self.feature_path(\u0026feature.id);\n        write_md(\u0026path, feature, \u0026feature.body)\n    }\n\n    fn load_story(\u0026self, id: \u0026StoryId) -\u003e BackendResult\u003cStory\u003e {\n        let path = self.story_path(id);\n        let (mut story, body) = read_md::\u003cStory\u003e(\u0026path)?;\n        story.body = body;\n        Ok(story)\n    }\n\n    fn save_story(\u0026mut self, story: \u0026Story) -\u003e BackendResult\u003c()\u003e {\n        self.ensure_dirs().map_err(BackendError::Io)?;\n        let path = self.story_path(\u0026story.id);\n        write_md(\u0026path, story, \u0026story.body)\n    }\n\n    fn load_decision(\u0026self, id: \u0026DecisionId) -\u003e BackendResult\u003cDecision\u003e {\n        let path = self.decision_path(id);\n        let (mut decision, body) = read_md::\u003cDecision\u003e(\u0026path)?;\n        decision.body = body;\n        Ok(decision)\n    }\n\n    fn save_decision(\u0026mut self, decision: \u0026Decision) -\u003e BackendResult\u003c()\u003e {\n        self.ensure_dirs().map_err(BackendError::Io)?;\n        let path = self.decision_path(\u0026decision.id);\n        write_md(\u0026path, decision, \u0026decision.body)\n    }\n\n    fn next_id(\u0026self, kind: IdKind) -\u003e String {\n        match kind {\n            IdKind::Feature =\u003e FeatureId::new(self.registry.next_feature_id).0,\n            IdKind::Story =\u003e StoryId::new(self.registry.next_story_id).0,\n            IdKind::Decision =\u003e DecisionId::new(self.registry.next_decision_id).0,\n        }\n    }\n\n    fn search(\u0026self, query: \u0026str) -\u003e Vec\u003cSearchResult\u003e {\n        let q = query.to_lowercase();\n        let mut results = Vec::new();\n\n        for f in \u0026self.registry.features {\n            if f.title.to_lowercase().contains(\u0026q) || f.body.to_lowercase().contains(\u0026q) {\n                results.push(SearchResult {\n                    id: f.id.0.clone(),\n                    kind: SearchKind::Feature,\n                    title: f.title.clone(),\n                    excerpt: f.body.chars().take(200).collect(),\n                });\n            }\n        }\n\n        for s in \u0026self.registry.stories {\n            if s.title.to_lowercase().contains(\u0026q) || s.body.to_lowercase().contains(\u0026q) {\n                results.push(SearchResult {\n                    id: s.id.0.clone(),\n                    kind: SearchKind::Story,\n                    title: s.title.clone(),\n                    excerpt: s.body.chars().take(200).collect(),\n                });\n            }\n        }\n\n        for d in \u0026self.registry.decisions {\n            if d.title.to_lowercase().contains(\u0026q) || d.body.to_lowercase().contains(\u0026q) {\n                results.push(SearchResult {\n                    id: d.id.0.clone(),\n                    kind: SearchKind::Decision,\n                    title: d.title.clone(),\n                    excerpt: d.body.chars().take(200).collect(),\n                });\n            }\n        }\n\n        results\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use idd_fir_core::FeatureStatus;\n    use std::fs;\n    use std::io::Write;\n    use tempfile::TempDir;\n\n    #[test]\n    fn new_backend_loads_existing_fir() {\n        let temp_dir = TempDir::new().unwrap();\n        let path = temp_dir.path();\n\n        let fir_dir = path.join(\".fir\");\n        fs::create_dir_all(fir_dir.join(\"features\")).unwrap();\n\n        let feature = Feature {\n            id: FeatureId::new(0),\n            title: \"Test feature\".to_string(),\n            status: FeatureStatus::Wish,\n            created: chrono::Utc::now().naive_utc().date(),\n            updated: None,\n            author: Some(\"test\".to_string()),\n            promoted_from: None,\n            promoted_date: None,\n            story: None,\n            depends_on: vec![],\n            blocks: vec![],\n            related: vec![],\n            children: vec![],\n            constraints: vec![],\n            preliminary_constraints: vec![],\n            decisions: vec![],\n            source: None,\n            conversations: vec![],\n            tags: vec![],\n            priority: None,\n            effort_estimate: None,\n            external: None,\n            body: \"Test body\".to_string(),\n        };\n\n        let mut file = fs::File::create(fir_dir.join(\"features\").join(\"0.md\")).unwrap();\n        let fm = toml::to_string(\u0026feature).unwrap();\n        file.write_all(fm.as_bytes()).unwrap();\n        file.write_all(b\"\\n\").unwrap();\n\n        let _ = FileBackend::new(path.to_path_buf());\n    }\n\n    #[test]\n    fn save_feature_creates_parent_directories() {\n        let temp_dir = TempDir::new().unwrap();\n        let path = temp_dir.path();\n        let mut backend = FileBackend::new(path.to_path_buf()).unwrap();\n\n        let feature = Feature {\n            id: FeatureId::new(0),\n            title: \"New feature\".to_string(),\n            status: FeatureStatus::Wish,\n            created: chrono::Utc::now().naive_utc().date(),\n            updated: None,\n            author: None,\n            promoted_from: None,\n            promoted_date: None,\n            story: None,\n            depends_on: vec![],\n            blocks: vec![],\n            related: vec![],\n            children: vec![],\n            constraints: vec![],\n            preliminary_constraints: vec![],\n            decisions: vec![],\n            source: None,\n            conversations: vec![],\n            tags: vec![],\n            priority: None,\n            effort_estimate: None,\n            external: None,\n            body: \"Initial\".to_string(),\n        };\n\n        backend.save_feature(\u0026feature).unwrap();\n        assert!(path.join(\".fir\").exists());\n        assert!(path.join(\".fir\").join(\"features\").exists());\n    }\n\n    #[test]\n    fn load_feature_not_found_returns_error() {\n        let temp_dir = TempDir::new().unwrap();\n        let path = temp_dir.path();\n        let backend = FileBackend::new(path.to_path_buf()).unwrap();\n\n        let result = backend.load_feature(\u0026FeatureId::new(999));\n        assert!(result.is_err());\n        match result.unwrap_err() {\n            BackendError::NotFound(msg) =\u003e assert!(msg.contains(\"999\")),\n            _ =\u003e panic!(\"Expected NotFound error\"),\n        }\n    }\n}\n","traces":[{"line":11,"address":[15190480,15193264,15193237,15191845,15194629,15191839,15193231,15191872,15194623],"length":1,"stats":{"Line":0}},{"line":12,"address":[15191970,15193362,15190578],"length":1,"stats":{"Line":0}},{"line":13,"address":[15192040,15190648,15190830,15192222,15193432,15193614],"length":1,"stats":{"Line":0}},{"line":15,"address":[15194674,15190730,15194834,15194816,15194994,15193769,15190985,15192377,15193514,15194976,15192122,15194656],"length":1,"stats":{"Line":0}},{"line":16,"address":[],"length":0,"stats":{"Line":0}},{"line":17,"address":[15191213,15192605,15193997],"length":1,"stats":{"Line":0}},{"line":18,"address":[15192681,15193210,15194151,15192759,15191818,15191367,15194602,15194073,15191289],"length":1,"stats":{"Line":0}},{"line":19,"address":[15192941,15191797,15194581,15194333,15191549,15193189],"length":1,"stats":{"Line":0}},{"line":20,"address":[15194536,15191752,15193144],"length":1,"stats":{"Line":0}},{"line":23,"address":[15187862,15186998,15188720,15186992,15187024,15188726,15186160,15187888,15187856],"length":1,"stats":{"Line":0}},{"line":24,"address":[15190306,15188065,15189570,15186337,15187201,15188752,15189564,15186187,15190300,15189148,15189154,15187915,15187051,15189168,15189904],"length":1,"stats":{"Line":0}},{"line":25,"address":[15189346,15188864,151 .is_err());\n    }\n\n    #[test]\n    fn parse_invalid_toml_fails() {\n        let result = parse_frontmatter::\u003cTestFm\u003e(\"---\\nid = \\n---\\n\\nbody\");\n        assert!(result.is_err());\n    }\n\n    #[test]\n    fn body_preserved_through_roundtrip() {\n        let fm = TestFm {\n            id: \"FIR-1\".into(),\n            title: \"Test\".into(),\n        };\n        let body = \"# Heading\\n\\nSome markdown content\\n- item 1\\n- item 2\\n\";\n        let rendered = render_frontmatter(\u0026fm, body).unwrap();\n        let parsed = parse_frontmatter::\u003cTestFm\u003e(\u0026rendered).unwrap();\n        assert_eq!(parsed.body, body);\n    }\n}\n","traces":[{"line":9,"address":[15057812,15057806,15058800,15058772,15059731,15057840,15058766,15056880,15059737],"length":1,"stats":{"Line":0}},{"line":10,"address":[15056939,15057899,15058859],"length":1,"stats":{"Line":0}},{"line":11,"address":[15058896,15056976,15057936],"length":1,"stats":{"Line":0}},{"line":12,"address":[15057958,15056998,15058918],"length":1,"stats":{"Line":0}},{"line":15,"address":[15057074,15058034,15058994],"length":1,"stats":{"Line":0}},{"line":16,"address":[15059114,15057194,15058214,15058154,15059174,15057254],"length":1,"stats":{"Line":0}},{"line":18,"address":[15059078,15060094,15060032,15059760,15057158,15060080,15059774,15058118,15060046],"length":1,"stats":{"Line":0}},{"line":21,"address":[15058256,15057296,15059217],"length":1,"stats":{"Line":0}},{"line":22,"address":[15058283,15057323,15059350,15058388,15057428,15059245],"length":1,"stats":{"Line":0}},{"line":24,"address":[15057599,15059321,15057399,15059436,15058559,15058359,15058474,15059521,15057514],"length":1,"stats":{"Line":0}},{"line":25,"address":[15059404,15059505,15059808,15059826,15059920,15058543,15057482,15058442,15057583,15059938,15060128,15060146],"length":1,"stats":{"Line":0}},{"line":27,"address":[15059568,15057646,15058606],"length":1,"stats":{"Line":0}},{"line":30,"address":[15062091,15061488,15060837,         var previousData = {"files":[{"path":["/","home","alex","dev","rust","idd-dev","idd","crates","idd-cli","src","main.rs"],"content":"use anyhow::Result;\nuse serde::{Deserialize, Serialize};\nuse std::env;\nuse std::path::PathBuf;\nuse std::process::Command;\n\n/// Metadata returned by `idd-\u003cname\u003e --metadata`.\n/// All fields optional for forward/backward compatibility.\n#[derive(Debug, Default, Serialize, Deserialize, PartialEq)]\nstruct PluginMetadata {\n    /// Short description shown in `idd --help`\n    pub description: Option\u003cString\u003e,\n    /// Plugin version\n    pub version: Option\u003cString\u003e,\n    /// Minimum idd version required (semver)\n    pub min_idd_version: Option\u003cString\u003e,\n    /// MCP tools this plugin exposes (future)\n    pub mcp_tools: Option\u003cVec\u003cString\u003e\u003e,\n}\n\nconst IDD_VERSION: \u0026str = env!(\"CARGO_PKG_VERSION\");\n\nfn main() -\u003e Result\u003c()\u003e {\n    let args: Vec\u003cString\u003e = env::args().collect();\n\n    if args.len() \u003c 2 {\n        print_help();\n        return Ok(());\n    }\n\n    let subcommand = \u0026args[1];\n\n    if subcommand == \"--help\" || subcommand == \"-h\" {\n        print_help();\n        return Ok(());\n    }\n    if subcommand == \"--version\" || subcommand == \"-V\" {\n        println!(\"idd {IDD_VERSION}\");\n        return Ok(());\n    }\n\n    let plugin = find_plugin(subcommand)?;\n\n    // Check compatibility before executing\n    if let Some(meta) = get_plugin_metadata(\u0026plugin) {\n        if let Some(min) = \u0026meta.min_idd_version {\n            if !version_satisfies(IDD_VERSION, min) {\n                eprintln!(\n                    \"error: {subcommand} requires idd \u003e= {min}, but you have idd {IDD_VERSION}\"\n                );\n                std::process::exit(1);\n            }\n        }\n    }\n\n    let status = Command::new(\u0026plugin)\n        .args(\u0026args[2..])\n        .status()\n        .map_err(|e| anyhow::anyhow!(\"failed to run {}: {e}\", plugin.display()))?;\n\n    if !status.success() {\n        std::process::exit(status.code().unwrap_or(1));\n    }\n\n    Ok(())\n}\n\nfn find_plugin(subcommand: \u0026str) -\u003e Result\u003cPathBuf\u003e {\n    let plugin_name = format!(\"idd-{subcommand}\");\n\n    let paths = env::var_os(\"PATH\").unwrap_or_default();\n    for dir in env::split_paths(\u0026paths) {\n        let candidate = dir.join(\u0026plugin_name);\n        if candidate.is_file() \u0026\u0026 is_executable(\u0026candidate) {\n            return Ok(candidate);\n        }\n    }\n\n    anyhow::bail!(\"unknown command '{subcommand}'. Run `idd --help` for available commands.\")\n}\n\n#[cfg(unix)]\nfn is_executable(path: \u0026std::path::Path) -\u003e bool {\n    use std::os::unix::fs::PermissionsExt;\n    path.metadata()\n        .map(|m| m.permissions().mode() \u0026 0o111 != 0)\n        .unwrap_or(false)\n}\n\n#[cfg(not(unix))]\nfn is_executable(path: \u0026std::path::Path) -\u003e bool {\n    path.is_file()\n}\n\nfn print_help() {\n    println!(\"idd — Intent-Driven Development CLI\");\n    println!();\n    println!(\"Usage: idd \u003ccommand\u003e [ARGS]...\");\n    println!();\n    println!(\"Commands:\");\n\n    let plugins = discover_plugins();\n    if plugins.is_empty() {\n        println!(\"  (no plugins found on $PATH)\");\n    } else {\n        for (name, desc) in plugins {\n            println!(\"  {name:12} {desc}\");\n        }\n    }\n\n    println!();\n    println!(\"Run `idd \u003ccommand\u003e --help` for more information on a command.\");\n}\n\nfn discover_plugins() -\u003e Vec\u003c(String, String)\u003e {\n    let mut plugins = Vec::new();\n\n    let paths = env::var_os(\"PATH\").unwrap_or_default();\n    for dir in env::split_paths(\u0026paths) {\n        let entries = match std::fs::read_dir(\u0026dir) {\n            Ok(e) =\u003e e,\n            Err(_) =\u003e continue,\n        };\n        for entry in entries.flatten() {\n            let name = entry.file_name();\n            let name_str = name.to_string_lossy();\n            if let Some(cmd) = name_str.strip_prefix(\"idd-\") {\n                if is_executable(\u0026entry.path()) {\n                    let desc = get_plugin_description(\u0026entry.path());\n                    plugins.push((cmd.to_string(), desc));\n                }\n            }\n        }\n    }\n\n    plugins.sort_by(|a, b| a.0.cmp(\u0026b.0));\n    plugins.dedup_by(|a, b| a.0 == b.0);\n    plugins\n}\n\nfn get_plugin_metadata(path: \u0026std::path::Path) -\u003e Option\u003cPluginMetadata\u003e {\n    let output = Command::new(path).arg(\"--metadata\").output().ok()?;\n    if !output.status.success() {\n        return None;\n    }\n    let stdout = String::from_utf8_lossy(\u0026output.stdout);\n    serde_json::from_str(stdout.trim()).ok()\n}\n\nfn get_plugin_description(path: \u0026std::path::Path) -\u003e String {\n    // Try --metadata first (structured JSON)\n    if let Some(meta) = get_plugin_metadata(path) {\n        if let Some(desc) = meta.description {\n            if !desc.is_empty() {\n                return desc;\n            }\n        }\n    }\n\n    // Fall back to --describe (single line)\n    if let Ok(output) = Command::new(path).arg(\"--describe\").output() {\n        let stdout = String::from_utf8_lossy(\u0026output.stdout);\n        let trimmed = stdout.trim().to_string();\n        if !trimmed.is_empty() {\n            return trimmed;\n        }\n    }\n\n    // Fall back to parsing --help\n    let output = match Command::new(path).arg(\"--help\").output() {\n        Ok(o) =\u003e o,\n        Err(_) =\u003e return String::new(),\n    };\n\n    let stdout = String::from_utf8_lossy(\u0026output.stdout);\n    for line in stdout.lines() {\n        let trimmed = line.trim();\n        if !trimmed.is_empty() \u0026\u0026 !trimmed.starts_with(\"Usage:\") \u0026\u0026 !trimmed.starts_with(\"idd-\") {\n            return trimmed.to_string();\n        }\n    }\n\n    String::new()\n}\n\n/// Minimal semver check: does `actual` satisfy `\u003e= required`?\n/// Only handles MAJOR.MINOR.PATCH — good enough for our use case.\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::fs;\n    use std::path::PathBuf;\n    use tempfile::TempDir;\n\n    #[test]\n    fn test_find_plugin_not_found() {\n        let result = find_plugin(\"nonexistent-command\");\n        assert!(result.is_err());\n        let err = result.unwrap_err().to_string();\n        assert!(err.contains(\"unknown command\"));\n        assert!(err.contains(\"Run `idd --help`\"));\n    }\n\n    #[test]\n    fn test_find_plugin_empty_path() {\n        env::set_var(\"PATH\", \"\");\n        let result = find_plugin(\"test\");\n        assert!(result.is_err());\n        env::set_var(\"PATH\", \"/usr/bin:/bin\");\n    }\n\n    #[test]\n    fn test_get_plugin_metadata_empty_path() {\n        let path = PathBuf::from(\"/nonexistent/path\");\n        let metadata = get_plugin_metadata(\u0026path);\n        assert!(metadata.is_none());\n    }\n\n    #[test]\n    fn test_get_plugin_metadata_output_error() {\n        let path = PathBuf::from(\"/bin/false\");\n        let metadata = get_plugin_metadata(\u0026path);\n        assert!(metadata.is_none());\n    }\n\n    #[test]\n    fn test_get_plugin_metadata_deserialization_error() {\n        let temp_dir = TempDir::new().unwrap();\n        let path = temp_dir.path().join(\"test-plugin\");\n        fs::write(\u0026path, \"#!/bin/bash\\necho 'not valid json'\").unwrap();\n        #[cfg(unix)]\n        {\n            use std::os::unix::fs::PermissionsExt;\n            let mut perms = fs::metadata(\u0026path).unwrap().permissions();\n            perms.set_mode(0o755);\n            fs::set_permissions(\u0026path, perms).unwrap();\n        }\n\n        let metadata = get_plugin_metadata(\u0026path);\n        assert!(metadata.is_none());\n    }\n\n    #[test]\n    fn test_get_plugin_description_fallback_to_help() {\n {\n        Self { points }\n    }\n\n    pub fn is_point_active(\u0026self, point: \u0026EnforcementPoint) -\u003e bool {\n        self.points.contains(point)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_enforcement_profile_creation() {\n        let profile = EnforcementProfile::new(vec![\n            EnforcementPoint::Expression,\n            EnforcementPoint::PreCommit,\n        ]);\n\n        assert_eq!(profile.points.len(), 2);\n        assert!(profile.is_point_active(\u0026EnforcementPoint::Expression));\n        assert!(profile.is_point_active(\u0026EnforcementPoint::PreCommit));\n        assert!(!profile.is_point_active(\u0026EnforcementPoint::Runtime));\n    }\n\n    #[test]\n    fn test_is_point_active_all_variants() {\n        let profile = EnforcementProfile::new(vec![\n            EnforcementPoint::Expression,\n            EnforcementPoint::Development,\n            EnforcementPoint::PropertyBasedTests,\n            EnforcementPoint::ReasoningTools,\n            EnforcementPoint::PreCommit,\n            EnforcementPoint::Ci,\n            EnforcementPoint::Runtime,\n        ]);\n\n        // All points should be active\n        assert!(profile.is_point_active(\u0026EnforcementPoint::Expression));\n        assert!(profile.is_point_active(\u0026EnforcementPoint::Development));\n        assert!(profile.is_point_active(\u0026EnforcementPoint::PropertyBasedTests));\n        assert!(profile.is_point_active(\u0026EnforcementPoint::ReasoningTools));\n        assert!(profile.is_point_active(\u0026EnforcementPoint::PreCommit));\n        assert!(profile.is_point_active(\u0026EnforcementPoint::Ci));\n        assert!(profile.is_point_active(\u0026EnforcementPoint::Runtime));\n    }\n\n    #[test]\n    fn test_empty_profile() {\n        let profile = EnforcementProfile::new(vec![]);\n\n        assert!(!profile.is_point_active(\u0026EnforcementPoint::Expression));\n        assert!(!profile.is_point_active(\u0026EnforcementPoint::Runtime));\n    }\n\n    #[test]\n    fn test_serialization_roundtrip() {\n        let profile = EnforcementProfile::new(vec![\n            EnforcementPoint::Expression,\n            EnforcementPoint::PreCommit,\n            EnforcementPoint::Ci,\n        ]);\n\n        let json = serde_json::to_string(\u0026profile).unwrap();\n        let deserialized: EnforcementProfile = serde_json::from_str(\u0026json).unwrap();\n\n        assert_eq!(profile.points.len(), deserialized.points.len());\n        for (p1, p2) in profile.points.iter().zip(deserialized.points.iter()) {\n            assert_eq!(p1, p2);\n        }\n    }\n\n    #[test]\n    fn test_deserialization_all_variants() {\n        let json = r#\"{\"points\": [\"expression\", \"development\", \"property_based_tests\", \"reasoning_tools\", \"pre_commit\", \"ci\", \"runtime\"]}\"#;\n        let profile: EnforcementProfile = serde_json::from_str(json).unwrap();\n\n        assert_eq!(profile.points.len(), 7);\n        assert!(profile.is_point_active(\u0026EnforcementPoint::Expression));\n        assert!(profile.is_point_active(\u0026EnforcementPoint::Development));\n        assert!(profile.is_point_active(\u0026EnforcementPoint::PropertyBasedTests));\n        assert!(profile.is_point_active(\u0026EnforcementPoint::ReasoningTools));\n        assert!(profile.is_point_active(\u0026EnforcementPoint::PreCommit));\n        assert!(profile.is_point_active(\u0026EnforcementPoint::Ci));\n        assert!(profile.is_point_active(\u0026EnforcementPoint::Runtime));\n    }\n\n    #[test]\n    fn test_deserialization_unknown_variant() {\n        let json = r#\"{\"points\": [\"expression\", \"unknown_variant\"]}\"#;\n        let result: Result\u003cEnforcementProfile, _\u003e = serde_json::from_str(json);\n        assert!(result.is_err());\n    }\n\n    #[test]\n    fn test_enforcement_point_serialization() {\n        let point = EnforcementPoint::Expression;\n        let json = serde_json::to_string(\u0026point).unwrap();\n        assert_eq!(json, r#\"\"expression\"\"#);\n\n        let point = EnforcementPoint::Runtime;\n        let json = serde_json::to_string(\u0026point).unwrap();\n        assert_eq!(json, r#\"\"runtime\"\"#);\n    }\n\n    #[test]\n    fn enforcement_profile_contains_all_points() {\n        let points = vec![\n            EnforcementPoint::Expression,\n            EnforcementPoint::Development,\n            EnforcementPoint::PropertyBasedTests,\n            EnforcementPoint::ReasoningTools,\n            EnforcementPoint::PreCommit,\n            EnforcementPoint::Ci,\n            EnforcementPoint::Runtime,\n        ];\n        let profile = EnforcementProfile::new(points.clone());\n        for point in \u0026points {\n            assert!(profile.is_point_active(point));\n        }\n    }\n\n    #[test]\n    fn enforcement_point_json_roundtrip() {\n        let points = vec![\n            EnforcementPoint::Expression,\n            EnforcementPoint::Development,\n            EnforcementPoint::PropertyBasedTests,\n            EnforcementPoint::ReasoningTools,\n            EnforcementPoint::PreCommit,\n            EnforcementPoint::Ci,\n            EnforcementPoint::Runtime,\n        ];\n        for point in \u0026points {\n            let json = serde_json::to_string(point).unwrap();\n            let deserialized: EnforcementPoint = serde_json::from_str(\u0026json).unwrap();\n            assert_eq!(point, \u0026deserialized);\n        }\n    }\n\n    #[test]\n    fn empty_profile_has_no_active_points() {\n        let profile = EnforcementProfile::new(vec![]);\n        for point in \u0026[\n            \u0026EnforcementPoint::Expression,\n            \u0026EnforcementPoint::Development,\n            \u0026EnforcementPoint::PropertyBasedTests,\n            \u0026EnforcementPoint::ReasoningTools,\n            \u0026EnforcementPoint::PreCommit,\n            \u0026EnforcementPoint::Ci,\n            \u0026EnforcementPoint::Runtime,\n        ] {\n            assert!(!profile.is_point

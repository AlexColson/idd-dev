default, skip_serializing_if = \"Option::is_none\")]\n    pub effort_estimate: Option\u003cString\u003e,\n\n    // External\n    #[serde(default, skip_serializing_if = \"Option::is_none\")]\n    pub external: Option\u003cExternalLinks\u003e,\n\n    // Markdown body (everything after frontmatter)\n    #[serde(default, skip_serializing_if = \"String::is_empty\")]\n    pub body: String,\n}\n\n// ── Story ───────────────────────────────────────────────────\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct Story {\n    pub id: StoryId,\n    pub title: String,\n    pub status: String,\n    pub created: NaiveDate,\n    #[serde(default, skip_serializing_if = \"Vec::is_empty\")]\n    pub features: Vec\u003cFeatureId\u003e,\n    #[serde(default, skip_serializing_if = \"Vec::is_empty\")]\n    pub constraints: Vec\u003cDeclarationId\u003e,\n    #[serde(default, skip_serializing_if = \"Vec::is_empty\")]\n    pub tags: Vec\u003cString\u003e,\n    #[serde(default, skip_serializing_if = \"String::is_empty\")]\n    pub body: String,\n}\n\n// ── Decision ────────────────────────────────────────────────\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct Decision {\n    pub id: DecisionId,\n    pub title: String,\n    pub date: NaiveDate,\n    pub status: String,\n    #[serde(default, skip_serializing_if = \"Vec::is_empty\")]\n    pub features: Vec\u003cFeatureId\u003e,\n    #[serde(default, skip_serializing_if = \"Vec::is_empty\")]\n    pub constraints: Vec\u003cDeclarationId\u003e,\n    #[serde(default, skip_serializing_if = \"String::is_empty\")]\n    pub body: String,\n}\n\n// ── Registry ────────────────────────────────────────────────\n\n#[derive(Debug, Clone, Default)]\npub struct Registry {\n    pub features: Vec\u003cFeature\u003e,\n    pub stories: Vec\u003cStory\u003e,\n    pub decisions: Vec\u003cDecision\u003e,\n    pub next_feature_id: u64,\n    pub next_story_id: u64,\n    pub next_decision_id: u64,\n}\n\nimpl Registry {\n    pub fn new() -\u003e Self {\n        Self::default()\n    }\n\n    pub fn feature(\u0026self, id: \u0026FeatureId) -\u003e Option\u003c\u0026Feature\u003e {\n        self.features.iter().find(|f| \u0026f.id == id)\n    }\n\n    pub fn feature_mut(\u0026mut self, id: \u0026FeatureId) -\u003e Option\u003c\u0026mut Feature\u003e {\n        self.features.iter_mut().find(|f| \u0026f.id == id)\n    }\n\n    pub fn story(\u0026self, id: \u0026StoryId) -\u003e Option\u003c\u0026Story\u003e {\n        self.stories.iter().find(|s| \u0026s.id == id)\n    }\n\n    pub fn decision(\u0026self, id: \u0026DecisionId) -\u003e Option\u003c\u0026Decision\u003e {\n        self.decisions.iter().find(|d| \u0026d.id == id)\n    }\n\n    pub fn alloc_feature_id(\u0026mut self) -\u003e FeatureId {\n        let id = FeatureId::new(self.next_feature_id);\n        self.next_feature_id += 1;\n        id\n    }\n\n    pub fn alloc_story_id(\u0026mut self) -\u003e StoryId {\n        let id = StoryId::new(self.next_story_id);\n        self.next_story_id += 1;\n        id\n    }\n\n    pub fn alloc_decision_id(\u0026mut self) -\u003e DecisionId {\n        let id = DecisionId::new(self.next_decision_id);\n        self.next_decision_id += 1;\n        id\n    }\n\n    pub fn active_features(\u0026self) -\u003e Vec\u003c\u0026Feature\u003e {\n        self.features\n            .iter()\n            .filter(|f| !f.status.is_terminal())\n            .collect()\n    }\n\n    pub fn features_by_status(\u0026self, status: FeatureStatus) -\u003e Vec\u003c\u0026Feature\u003e {\n        self.features\n            .iter()\n            .filter(|f| f.status == status)\n            .collect()\n    }\n\n    pub fn features_by_tag(\u0026self, tag: \u0026str) -\u003e Vec\u003c\u0026Feature\u003e {\n        self.features\n            .iter()\n            .filter(|f| f.tags.iter().any(|t| t == tag))\n            .collect()\n    }\n\n    pub fn features_by_story(\u0026self, story_id: \u0026StoryId) -\u003e Vec\u003c\u0026Feature\u003e {\n        self.features\n            .iter()\n            .filter(|f| f.story.as_ref() == Some(story_id))\n            .collect()\n    }\n\n    pub fn features_blocking(\u0026self, feature_id: \u0026FeatureId) -\u003e Vec\u003c\u0026Feature\u003e {\n        self.features\n            .iter()\n            .filter(|f| f.blocks.iter().any(|b| b == feature_id))\n            .collect()\n    }\n\n    pub fn transitive_dependencies(\u0026self, feature_id: \u0026FeatureId) -\u003e Vec\u003c\u0026Feature\u003e {\n        self.transitive_dependencies_depth(feature_id, usize::MAX)\n    }\n\n    pub fn transitive_dependencies_depth(\n        \u0026self,\n        feature_id: \u0026FeatureId,\n        max_depth: usize,\n    ) -\u003e Vec\u003c\u0026Feature\u003e {\n        let mut visited = std::collections::HashSet::new();\n        let mut result = Vec::new();\n        self._collect_deps(feature_id, \u0026mut visited, \u0026mut result, max_depth, 0);\n        result\n    }\n\n    fn _collect_deps\u003c'a\u003e(\n        \u0026'a self,\n        feature_id: \u0026FeatureId,\n        visited: \u0026mut std::collections::HashSet\u003cFeatureId\u003e,\n        result: \u0026mut Vec\u003c\u0026'a Feature\u003e,\n        max_depth: usize,\n        depth: usize,\n    ) {\n        if !visited.insert(feature_id.clone()) || depth \u003e= max_depth {\n            return;\n        }\n        let Some(feature) = self.feature(feature_id) else {\n            return;\n        };\n        for dep_id in \u0026feature.depends_on {\n            if let Some(dep) = self.feature(dep_id) {\n                result.push(dep);\n                self._collect_deps(dep_id, visited, result, max_depth, depth + 1);\n            }\n        }\n    }\n}\n\n// ── Config ──────────────────────────────────────────────────\n\n#[derive(Debug, Clone, Default, Serialize, Deserialize)]\npub struct Config {\n    #[serde(default)]\n    pub registry: RegistryConfig,\n    #[serde(default)]\n    pub counters: CounterConfig,\n    #[serde(default)]\n    pub agent: AgentConfig,\n    #[serde(default)]\n    pub integration: IntegrationConfig,\n}\n\n#[derive(Debug, Clone, Default, Serialize, Deserialize)]\npub struct RegistryConfig {\n    #[serde(default)]\n    pub name: String,\n    #[serde(default)]\n    pub version: String,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct CounterConfig {\n    #[serde(default = \"default_next_feature\")]\n    pub next_feature: u64,\n    #[serde(default = \"default_next_story\")]\n    pub next_story: u64,\n    #[serde(default = \"default_next_decision\")]\n    pub next_decision: u64,\n}\n\nfn default_next_feature() -\u003e u64 {\n    1\n}\nfn default_next_story() -\u003e u64 {\n    1\n}\nfn default_next_decision() -\u003e u64 {\n    1\n}\n\nimpl Default for CounterConfig {\n    fn default() -\u003e Self {\n        Self {\n            next_feature: 1,\n            next_story: 1,\n            next_decision: 1,\n        }\n    }\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct AgentConfig {\n    #[serde(default)]\n    pub context_includes: Vec\u003cString\u003e,\n    #[serde(default = \"default_context_budget\")]\n    pub context_budget: usize,\n}\n\nfn default_context_budget() -\u003e usize {\n    4000\n}\n\nimpl Default for AgentConfig {\n    fn default() -\u003e Self {\n        Self {\n            context_includes: Vec::new(),\n            context_budget: 4000,\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use proptest::prelude::*;\n\n    // ── FeatureStatus state machine invariants ──────────────\n\n    proptest! {\n        #[test]\n        fn status_next_is_monotonic(status in prop_oneof![\n            Just(FeatureStatus::Wish),\n            Just(FeatureStatus::Exploring),\n            Just(FeatureStatus::Scoping),\n            Just(FeatureStatus::Designing),\n            Just(FeatureStatus::Ready),\n            Just(FeatureStatus::InProgress),\n            Just(FeatureStatus::Verifying),\n        ]) {\n            let next = status.next().unwrap();\n            prop_assert!(matches!(\n                (status, next),\n                (FeatureStatus::Wish, FeatureStatus::Exploring)\n                | (FeatureStatus::Exploring, FeatureStatus::Scoping)\n                | (FeatureStatus::Scoping, FeatureStatus::Designing)\n                | (FeatureStatus::Designing, FeatureStatus::Ready)\n                | (FeatureStatus::Ready, FeatureStatus::InProgress)\n                | (FeatureStatus::InProgress, FeatureStatus::Verifying)\n                | (FeatureStatus::Verifying, FeatureStatus::Done),\n            ));\n        }\n\n        #[test]\n        fn terminal_statuses_have_no_next(status in prop_oneof![\n            Just(FeatureStatus::Done),\n            Just(FeatureStatus::Abandoned),\n            Just(FeatureStatus::Deferred),\n        ]) {\n            prop_assert!(status.next().is_none());\n        }\n\n        #[test]\n        fn terminal_and_active_are_mutually_exclusive(status in prop_oneof![\n            Just(FeatureStatus::Wish),\n            Just(FeatureStatus::Exploring),\n            Just(FeatureStatus::Scoping),\n            Just(FeatureStatus::Designing),\n            Just(FeatureStatus::Ready),\n            Just(FeatureStatus::InProgress),\n            Just(FeatureStatus::Verifying),\n            Just(FeatureStatus::Done),\n            Just(FeatureStatus::Abandoned),\n            Just(FeatureStatus::Deferred),\n        ]) {\n            prop_assert!(!(status.is_terminal() \u0026\u0026 status.is_active()));\n        }\n\n        #[test]\n        fn status_display_roundtrip(status in prop_oneof![\n            Just(FeatureStatus::Wish),\n            Just(FeatureStatus::Exploring),\n            Just(FeatureStatus::Scoping),\n            Just(FeatureStatus::Designing),\n            Just(FeatureStatus::Ready),\n            Just(FeatureStatus::InProgress),\n            Just(FeatureStatus::Verifying),\n            Just(FeatureStatus::Done),\n            Just(FeatureStatus::Abandoned),\n            Just(FeatureStatus::Deferred),\n        ]) {\n            let s = status.to_string();\n            prop_assert!(matches!(\n                s.as_str(),\n                \"wish\" | \"exploring\" | \"scoping\" | \"designing\" | \"ready\"\n                | \"in-progress\" | \"verifying\" | \"done\" | \"abandoned\" | \"deferred\"\n            ));\n        }\n    }\n\n    // ── ID generation invariants ────────────────────────────\n\n    proptest! {\n        #[test]\n        fn feature_ids_are_sequential_and_unique(\n            start in 0u64..1000u64,\n            count in 1u64..100u64,\n        ) {\n            let mut registry = Registry {\n                next_feature_id: start,\n                ..Registry::new()\n            };\n            let mut ids = Vec::new();\n            for i in 0..count {\n                let id = registry.alloc_feature_id();\n                prop_assert_eq!(id.0.as_str(), format!(\"FIR-{}\", start + i));\n                ids.push(id);\n            }\n            // All unique\n            let unique: std::collections::HashSet\u003c_\u003e = ids.iter().collect();\n            prop_assert_eq!(unique.len(), ids.len());\n            // Counter advanced correctly\n            prop_assert_eq!(registry.next_feature_id, start + count);\n        }\n\n        #[test]\n        fn all_id_formats_are_correct(\n            feature_n in 0u64..10000u64,\n            story_n in 0u64..10000u64,\n            decision_n in 0u64..10000u64,\n        ) {\n            let fid = FeatureId::new(feature_n);\n            let expected_fid = format!(\"FIR-{feature_n}\");\n            prop_assert_eq!(\u0026fid.0, \u0026expected_fid);\n            prop_assert_eq!(fid.to_string(), expected_fid);\n\n            let sid = StoryId::new(story_n);\n            let expected_sid = format!(\"STORY-{story_n}\");\n            prop_assert_eq!(\u0026sid.0, \u0026expected_sid);\n            prop_assert_eq!(sid.to_string(), expected_sid);\n\n            let did = DecisionId::new(decision_n);\n            let expected_did = format!(\"DEC-{decision_n}\");\n            prop_assert_eq!(\u0026did.0, \u0026expected_did);\n            prop_assert_eq!(did.to_string(), expected_did);\n        }\n    }\n\n    // ── Registry query invariants ───────────────────────────\n\n    proptest! {\n        #[test]\n        fn active_features_excludes_terminal(\n            n in 1usize..20usize,\n        ) {\n            let mut registry = Registry::new();\n            let statuses = [\n                FeatureStatus::Wish,\n                FeatureStatus::Exploring,\n                FeatureStatus::Scoping,\n                FeatureStatus::Designing,\n                FeatureStatus::Ready,\n                FeatureStatus::InProgress,\n                FeatureStatus::Verifying,\n                FeatureStatus::Done,\n                FeatureStatus::Abandoned,\n                FeatureStatus::Deferred,\n            ];\n\n            for i in 0..n {\n                let status = statuses[i % statuses.len()];\n                let id = registry.alloc_feature_id();\n                registry.features.push(Feature {\n                    id,\n                    title: format!(\"Feature {i}\"),\n                    status,\n                    created: chrono::NaiveDate::from_ymd_opt(2026, 1, 1).unwrap(),\n                    updated: None,\n                    author: None,\n                    promoted_from: None,\n                    promoted_date: None,\n                    story: None,\n                    depends_on: Vec::new(),\n                    blocks: Vec::new(),\n                    related: Vec::new(),\n                    children: Vec::new(),\n                    constraints: Vec::new(),\n                    preliminary_constraints: Vec::new(),\n                    decisions: Vec::new(),\n                    source: None,\n                    conversations: Vec::new(),\n                    tags: Vec::new(),\n                    priority: None,\n                    effort_estimate: None,\n                    external: None,\n                    body: String::new(),\n                });\n            }\n\n            let active = registry.active_features();\n            for f in \u0026active {\n                prop_assert!(!f.status.is_terminal());\n            }\n\n            let expected_active = registry.features.iter()\n                .filter(|f| !f.status.is_terminal())\n                .count();\n            prop_assert_eq!(active.len(), expected_active);\n        }\n    }\n\n    // ── Serialization roundtrips ────────────────────────────\n\n    fn arb_feature() -\u003e impl Strategy\u003cValue = Feature\u003e {\n        (any::\u003cu64\u003e(), any::\u003cString\u003e(), any::\u003cString\u003e()).prop_map(|(n, title, body)| Feature {\n            id: FeatureId::new(n),\n            title,\n            status: FeatureStatus::Wish,\n            created: chrono::NaiveDate::from_ymd_opt(2026, 1, 1).unwrap(),\n            updated: None,\n            author: None,\n            promoted_from: None,\n            promoted_date: None,\n            story: None,\n            depends_on: Vec::new(),\n            blocks: Vec::new(),\n            related: Vec::new(),\n            children: Vec::new(),\n            constraints: Vec::new(),\n            preliminary_constraints: Vec::new(),\n            decisions: Vec::new(),\n            source: None,\n            conversations: Vec::new(),\n            tags: Vec::new(),\n            priority: None,\n            effort_estimate: None,\n            external: None,\n            body,\n        })\n    }\n\n    proptest! {\n        #[test]\n        fn feature_json_roundtrip(feature in arb_feature()) {\n            let json = serde_json::to_string(\u0026feature).unwrap();\n            let parsed: Feature = serde_json::from_str(\u0026json).unwrap();\n            prop_assert_eq!(feature, parsed);\n        }\n\n        #[test]\n        fn config_json_roundtrip(config in prop_oneof![\n            Just(Config::default()),\n            Just(Config {\n                counters: CounterConfig {\n                    next_feature: 42,\n                    next_story: 5,\n                    next_decision: 3,\n                },\n                ..Config::default()\n            }),\n        ]) {\n            let json = serde_json::to_string(\u0026config).unwrap();\n            let parsed: Config = serde_json::from_str(\u0026json).unwrap();\n            prop_assert_eq!(config.counters.next_feature, parsed.counters.next_feature);\n            prop_assert_eq!(config.counters.next_story, parsed.counters.next_story);\n            prop_assert_eq!(config.counters.next_decision, parsed.counters.next_decision);\n        }\n    }\n\n    // ── Invalid input rejection ─────────────────────────────\n\n    proptest! {\n        #[test]\n        fn malformed_feature_json_never_panics(\n            bytes in proptest::collection::vec(0u8..=255, 0..=512),\n        ) {\n            let s = String::from_utf8_lossy(\u0026bytes);\n            let _: Result\u003cFeature, _\u003e = serde_json::from_str(\u0026s);\n        }\n\n        #[test]\n        fn unknown_status_json_fails(\n            status in \"[a-zA-Z0-9_-]+\",\n        ) {\n            let json = format!(\n                r#\"{{\"id\":\"FIR-1\",\"title\":\"t\",\"status\":\"{}\",\"created\":\"2026-01-01\",\"body\":\"\"}}\"#,\n                status\n            );\n            let result: Result\u003cFeature, _\u003e = serde_json::from_str(\u0026json);\n            prop_assert!(result.is_err() || status == \"wish\" || status == \"exploring\"\n                || status == \"scoping\" || status == \"designing\" || status == \"ready\"\n                || status == \"in-progress\" || status == \"verifying\" || status == \"done\"\n                || status == \"abandoned\" || status == \"deferred\");\n        }\n\n        #[test]\n        fn structurally_invalid_feature_json_fails(\n            value in prop_oneof![\n                Just(serde_json::Value::Null),\n                Just(serde_json::Value::Bool(true)),\n                Just(serde_json::Value::Number(0.into())),\n                Just(serde_json::Value::Array(vec![])),\n            ],\n        ) {\n            let json = serde_json::to_string(\u0026value).unwrap();\n            let result: Result\u003cFeature, _\u003e = serde_json::from_str(\u0026json);\n            prop_assert!(result.is_err());\n        }\n    }\n\n    // ── Graph traversal tests ──────────────────────────────\n\n    fn build_dep_graph() -\u003e Registry {\n        let mut reg = Registry::new();\n\n        // Feature 0 depends on Feature 1 and Feature 2\n        let f0 = Feature {\n            id: FeatureId::new(0),\n            title: \"Feature 0\".into(),\n            status: FeatureStatus::InProgress,\n            created: chrono::NaiveDate::from_ymd_opt(2024, 1, 1).unwrap(),\n            updated: None,\n            author: None,\n            promoted_from: None,\n            promoted_date: None,\n            story: None,\n            depends_on: vec![FeatureId::new(1), FeatureId::new(2)],\n            blocks: vec![],\n            related: vec![],\n            children: vec![],\n            constraints: vec![],\n            preliminary_constraints: vec![],\n            decisions: vec![],\n            source: None,\n            conversations: vec![],\n            tags: vec![],\n            priority: None,\n            effort_estimate: None,\n            external: None,\n            body: String::new(),\n        };\n        reg.features.push(f0);\n\n        // Feature 1 depends on Feature 3\n        let f1 = Feature {\n            id: FeatureId::new(1),\n            title: \"Feature 1\".into(),\n            status: FeatureStatus::Ready,\n            created: chrono::NaiveDate::from_ymd_opt(2024, 1, 1).unwrap(),\n            updated: None,\n            author: None,\n            promoted_from: None,\n            promoted_date: None,\n            story: None,\n            depends_on: vec![FeatureId::new(3)],\n            blocks: vec![],\n            related: vec![],\n            children: vec![],\n            constraints: vec![],\n            preliminary_constraints: vec![],\n            decisions: vec![],\n            source: None,\n            conversations: vec![],\n            tags: vec![],\n            priority: None,\n            effort_estimate: None,\n            external: None,\n            body: String::new(),\n        };\n        reg.features.push(f1);\n\n        // Feature 2 has no dependencies\n        let f2 = Feature {\n            id: FeatureId::new(2),\n            title: \"Feature 2\".into(),\n            status: FeatureStatus::Done,\n            created: chrono::NaiveDate::from_ymd_opt(2024, 1, 1).unwrap(),\n            updated: None,\n            author: None,\n            promoted_from: None,\n            promoted_date: None,\n            story: None,\n            depends_on: vec![],\n            blocks: vec![],\n            related: vec![],\n            children: vec![],\n            constraints: vec![],\n            preliminary_constraints: vec![],\n            decisions: vec![],\n            source: None,\n            conversations: vec![],\n            tags: vec![],\n            priority: None,\n            effort_estimate: None,\n            external: None,\n            body: String::new(),\n        };\n        reg.features.push(f2);\n\n        // Feature 3 has no dependencies\n        let f3 = Feature {\n            id: FeatureId::new(3),\n            title: \"Feature 3\".into(),\n            status: FeatureStatus::Done,\n            created: chrono::NaiveDate::from_ymd_opt(2024, 1, 1).unwrap(),\n            updated: None,\n            author: None,\n            promoted_from: None,\n            promoted_date: None,\n            story: None,\n            depends_on: vec![],\n            blocks: vec![],\n            related: vec![],\n            children: vec![],\n            constraints: vec![],\n            preliminary_constraints: vec![],\n            decisions: vec![],\n            source: None,\n            conversations: vec![],\n            tags: vec![],\n            priority: None,\n            effort_estimate: None,\n            external: None,\n            body: String::new(),\n        };\n        reg.features.push(f3);\n\n        reg\n    }\n\n    #[test]\n    fn test_transitive_dependencies_simple() {\n        let reg = build_dep_graph();\n        let fid = FeatureId::new(0);\n\n        let deps = reg.transitive_dependencies(\u0026fid);\n        // Should return F1, F2, F3 (direct deps: F1, F2; transitive from F1: F3)\n        assert_eq!(deps.len(), 3);\n        let ids: Vec\u003cFeatureId\u003e = deps.iter().map(|f| f.id.clone()).collect();\n        assert!(ids.contains(\u0026FeatureId::new(1)));\n        assert!(ids.contains(\u0026FeatureId::new(2)));\n        assert!(ids.contains(\u0026FeatureId::new(3)));\n    }\n\n    #[test]\n    fn test_transitive_dependencies_with_max_depth() {\n        let reg = build_dep_graph();\n        let fid = FeatureId::new(0);\n\n        // Max depth 1 should only return direct dependencies\n        let deps = reg.transitive_dependencies_depth(\u0026fid, 1);\n        assert_eq!(deps.len(), 2); // F1 and F2 only\n        let ids: Vec\u003cFeatureId\u003e = deps.iter().map(|f| f.id.clone()).collect();\n        assert!(ids.contains(\u0026FeatureId::new(1)));\n        assert!(ids.contains(\u0026FeatureId::new(2)));\n        assert!(!ids.contains(\u0026FeatureId::new(3)));\n    }\n\n    #[test]\n    fn test_transitive_dependencies_no_deps() {\n        let reg = Registry::new();\n        let fid = FeatureId::new(999); // Non-existent feature\n\n        let deps = reg.transitive_dependencies(\u0026fid);\n        assert_eq!(deps.len(), 0);\n    }\n\n    #[test]\n    fn test_transitive_dependencies_no_cycles() {\n        let mut reg = Registry::new();\n\n        // Create a cycle: F0 : None,\n            conversations: vec![],\n            tags: vec![\"backend\".into()],\n            priority: None,\n            effort_estimate: None,\n            external: None,\n            body: \"Test feature\".into(),\n        };\n        reg.features.push(f1.clone());\n\n        let f2 = Feature {\n            id: FeatureId::new(1),\n            title: \"Feature B\".into(),\n            status: FeatureStatus::Ready,\n            created: chrono::NaiveDate::from_ymd_opt(2024, 2, 1).unwrap(),\n            updated: Some(chrono::NaiveDate::from_ymd_opt(2024, 7, 20).unwrap()),\n            author: Some(\"bob\".into()),\n            promoted_from: Some(\"Designing\".into()),\n            promoted_date: Some(chrono::NaiveDate::from_ymd_opt(2024, 6, 1).unwrap()),\n            story: Some(StoryId::new(2)),\n            depends_on: vec![],\n            blocks: vec![],\n            related: vec![],\n            children: vec![],\n            constraints: vec![idd_dsl_core::DeclarationId(\"C1\".into())],\n            preliminary_constraints: vec![],\n            decisions: vec![],\n            source: None,\n            conversations: vec![],\n            tags: vec![\"frontend\".into()],\n            priority: None,\n            effort_estimate: None,\n            external: None,\n            body: \"Another feature\".into(),\n        };\n        reg.features.push(f2.clone());\n\n        reg\n    }\n\n    #[test]\n    fn test_query_status_filter() {\n        let reg = setup_registry();\n\n        let results = Query::new(\u0026reg)\n            .status(vec![FeatureStatus::InProgress])\n            .resolve();\n\n        assert_eq!(results.len(), 1);\n        assert_eq!(results[0].id, FeatureId::new(0));\n    }\n\n    #[test]\n    fn test_query_status_multiple() {\n        let reg = setup_registry();\n\n        let results = Query::new(\u0026reg)\n            .status(vec![FeatureStatus::InProgress, FeatureStatus::Ready])\n            .resolve();\n\n        assert_eq!(results.len(), 2);\n    }\n\n    #[test]\n    fn test_query_tag_filter() {\n        let reg = setup_registry();\n\n        let results = Query::new(\u0026reg).tag(\"backend\").resolve();\n\n        assert_eq!(results.len(), 1);\n        assert_eq!(results[0].id, FeatureId::new(0));\n    }\n\n    #[test]\n    fn test_query_depends_on() {\n        let reg = setup_registry();\n\n        let results = Query::new(\u0026reg).depends_on(FeatureId::new(2)).resolve();\n\n        assert_eq!(results.len(), 1);\n        assert_eq!(results[0].id, FeatureId::new(0));\n    }\n\n    #[test]\n    fn test_query_stale_days() {\n        let reg = setup_registry();\n        let now = chrono::NaiveDate::from_ymd_opt(2024, 8, 1).unwrap();\n\n        let results = Query::new(\u0026reg).stale_days(30, now).resolve();\n\n        assert_eq!(results.len(), 1);\n        assert_eq!(results[0].id, FeatureId::new(0));\n    }\n\n    #[test]\n    fn test_query_recent_days() {\n        let reg = setup_registry();\n        let now = chrono::NaiveDate::from_ymd_opt(2024, 8, 1).unwrap();\n\n        let results = Query::new(\u0026reg).recent_days(30, now).resolve();\n\n        assert_eq!(results.len(), 1);\n        assert_eq!(results[0].id, FeatureId::new(1));\n    }\n\n    #[test]\n    fn test_query_constraint() {\n        let reg = setup_registry();\n\n        let results = Query::new(\u0026reg).constraint(\"C1\").resolve();\n\n        assert_eq!(results.len(), 1);\n        assert_eq!(results[0].id, FeatureId::new(1));\n    }\n\n    #[test]\n    fn test_query_combined_filters() {\n        let reg = setup_registry();\n\n        let results = Query::new(\u0026reg)\n            .status(vec![FeatureStatus::InProgress])\n            .tag(\"backend\")\n            .resolve();\n\n        assert_eq!(results.len(), 1);\n        assert_eq!(results[0].id, FeatureId::new(0));\n    }\n\n    #[test]\n    fn test_query_empty_registry() {\n        let reg = Registry::new();\n\n        let results = Query::new(\u0026reg)\n            .status(vec![FeatureStatus::InProgress])\n            .resolve();\n\n        assert_eq!(results.len(), 0);\n    }\n}\n\nenum StaleMode {\n    Stale { days: u32, now: chrono::NaiveDate },\n    Recent { days: u32, now: chrono::NaiveDate },\n}\n\n/// Composable query builder over a [`Registry`].\n///\n/// Accumulates filter predicates via a builder API, then resolves them\n/// in a single pass over the feature set via [`resolve`](Self::resolve).\n///\n/// # Example\n/// ```ignore\n/// let features = Query::new(\u0026registry)\n///     .status(vec![FeatureStatus::InProgress, FeatureStatus::Ready])\n///     .tag(\"backend\")\n///     .stale_days(14)\n///     .resolve();\n/// ```\npub struct Query\u003c'a\u003e {\n    registry: \u0026'a Registry,\n    statuses: Vec\u003cFeatureStatus\u003e,\n    tag: Option\u003cString\u003e,\n    story: Option\u003cStoryId\u003e,\n    blocks: Option\u003cFeatureId\u003e,\n    constraint: Option\u003cString\u003e,\n    depends_on: Option\u003cFeatureId\u003e,\n    stale_mode: Option\u003cStaleMode\u003e,\n}\n\nimpl\u003c'a\u003e Query\u003c'a\u003e {\n    pub fn new(registry: \u0026'a Registry) -\u003e Self {\n        Self {\n            registry,\n            statuses: Vec::new(),\n            tag: None,\n            story: None,\n            blocks: None,\n            constraint: None,\n            depends_on: None,\n            stale_mode: None,\n        }\n    }\n\n    /// Filter to features matching any of the given statuses.\n    pub fn status(mut self, statuses: Vec\u003cFeatureStatus\u003e) -\u003e Self {\n        self.statuses = statuses;\n        self\n    }\n\n    /// Filter to features containing the given tag.\n    pub fn tag(mut self, tag: impl Into\u003cString\u003e) -\u003e Self {\n        self.tag = Some(tag.into());\n        self\n    }\n\n    /// Filter to features linked to the given story.\n    pub fn story(mut self, story_id: StoryId) -\u003e Self {\n        self.story = Some(story_id);\n        self\n    }\n\n    /// Filter to features that block the given feature.\n    pub fn blocks(mut self, feature_id: FeatureId) -\u003e Self {\n        self.blocks = Some(feature_id);\n        self\n    }\n\n    /// Filter to features associated with the given constraint ID.\n    pub fn constraint(mut self, constraint_id: impl Into\u003cString\u003e) -\u003e Self {\n        self.constraint = Some(constraint_id.into());\n        self\n    }\n\n    /// Filter to features that depend on the given feature.\n    pub fn depends_on(mut self, feature_id: FeatureId) -\u003e Self {\n        self.depends_on = Some(feature_id);\n        self\n    }\n\n    /// Filter to features not updated within the given number of days.\n    pub fn stale_days(mut self, days: u32, now: chrono::NaiveDate) -\u003e Self {\n        self.stale_mode = Some(StaleMode::Stale { days, now });\n        self\n    }\n\n    /// Filter to features updated within the given number of days.\n    pub fn recent_days(mut self, days: u32, now: chrono::NaiveDate) -\u003e Self {\n        self.stale_mode = Some(StaleMode::Recent { days, now });\n        self\n    }\n\n    /// Resolve all accumulated predicates in a single pass.\n    pub fn resolve(self) -\u003e Vec\u003c\u0026'a Feature\u003e {\n        let threshold = self.stale_mode.map(|m| match m {\n            StaleMode::Stale { days, now } =\u003e (now - chrono::Duration::days(days as i64), false),\n            StaleMode::Recent { days, now } =\u003e (now - chrono::Duration::days(days as i64), true),\n        });\n\n        self.registry\n            .features\n            .iter()\n            .filter(|f| {\n                if !self.statuses.is_empty() \u0026\u0026 !self.statuses.contains(\u0026f.status) {\n                    return false;\n                }\n                if let Some(tag) = \u0026self.tag {\n                    if !f.tags.iter().any(|t| t == tag) {\n                        return false;\n                    }\n                }\n                if let Some(story_id) = \u0026self.story {\n                    if f.story.as_ref() != Some(story_id) {\n                        return false;\n                    }\n                }\n                if let Some(feature_id) = \u0026self.blocks {\n                    if !f.blocks.iter().any(|b| b == feature_id) {\n                        return false;\n                    }\n                }\n                if let Some(constraint_id) = \u0026self.constraint {\n                    if !f.constraints.iter().any(|c| c.0 == *constraint_id) {\n                        return false;\n                    }\n                }\n                if let Some(feature_id) = \u0026self.depends_on {\n                    if !f.depends_on.contains(feature_id) {\n                        return false;\n                    }\n                }\n                if let Some((threshold, keep_recent)) = threshold {\n                    let last_activity = f.updated.unwrap_or(f.created);\n                    if keep_recent {\n                        if last_activity \u003c threshold {\n                            return false;\n                        }\n                    } else if last_activity \u003e= threshold {\n                        return false;\n                    }\n                }\n                true\n            })\n            .collect()\n    }\n}\n","traces":[{"line":197,"address":[16746208],"length":1,"stats":{"Line":1}},{"line":200,"address":[],"length":0,"stats":{"Line":1}},{"line":211,"address":[],"length":0,"stats":{"Line":1}},{"line":212,"address":[16747008,16747085],"length":1,"stats":{"Line":2}},{"line":213,"address":[16747107],"length":1,"stats":{"Line":1}},{"line":217,"address":[5780152,5779888],"length":1,"stats":{"Line":1}},{"line":218,"address":[5779946,5780004],"length":1,"stats":{"Line":2}},{"line":219,"address":[6769170],"length":1,"stats":{"Line":1}},{"line":223,"address":[],"length":0,"stats":{"Line":0}},{"line":224,"address":[16746711,16746619],"length":1," u0026tmp, path).map_err(BackendError::Io)?;\n    Ok(())\n}\n\nfn read_md\u003cT: serde::de::DeserializeOwned\u003e(path: \u0026Path) -\u003e BackendResult\u003c(T, String)\u003e {\n    let content = std::fs::read_to_string(path).map_err(|e| {\n        if e.kind() == std::io::ErrorKind::NotFound {\n            BackendError::NotFound(format!(\"{:?}\", path))\n        } else {\n            BackendError::Io(e)\n        }\n    })?;\n    let parsed =\n        parse_frontmatter::\u003cT\u003e(\u0026content).map_err(|e| BackendError::Parse(e.to_string()))?;\n    Ok((parsed.frontmatter, parsed.body))\n}\n\npub struct FileBackend {\n    base_path: PathBuf,\n    registry: Registry,\n}\n\nimpl FileBackend {\n    pub fn new(base_path: PathBuf) -\u003e BackendResult\u003cSelf\u003e {\n        let mut backend = Self {\n            base_path,\n            registry: Registry::new(),\n        };\n        backend.registry = backend.load_all()?;\n        Ok(backend)\n    }\n\n    fn fir_path(\u0026self) -\u003e PathBuf {\n        self.base_path.join(\".fir\")\n    }\n\n    fn feature_path(\u0026self, id: \u0026FeatureId) -\u003e PathBuf {\n        self.fir_path()\n            .join(\"features\")\n            .join(format!(\"{}.md\", id.0))\n    }\n\n    fn story_path(\u0026self, id: \u0026StoryId) -\u003e PathBuf {\n        self.fir_path().join(\"stories\").join(format!(\"{}.md\", id.0))\n    }\n\n    fn decision_path(\u0026self, id: \u0026DecisionId) -\u003e PathBuf {\n        self.fir_path()\n            .join(\"decisions\")\n            .join(format!(\"{}.md\", id.0))\n    }\n\n    fn ensure_dirs(\u0026self) -\u003e std::io::Result\u003c()\u003e {\n        let fir = self.fir_path();\n        std::fs::create_dir_all(fir.join(\"features\"))?;\n        std::fs::create_dir_all(fir.join(\"stories\"))?;\n        std::fs::create_dir_all(fir.join(\"decisions\"))?;\n        std::fs::create_dir_all(fir.join(\"archive\"))?;\n        Ok(())\n    }\n\n    fn load_config(\u0026self) -\u003e BackendResult\u003cConfig\u003e {\n        let config_path = self.fir_path().join(\"config.toml\");\n        let content = std::fs::read_to_string(\u0026config_path).map_err(|e| {\n            if e.kind() == std::io::ErrorKind::NotFound {\n                BackendError::NotFound(format!(\"config at {:?}\", config_path))\n            } else {\n                BackendError::Io(e)\n            }\n        })?;\n        toml::from_str(\u0026content).map_err(|e| BackendError::Parse(e.to_string()))\n    }\n\n    pub fn archive_feature(\u0026self, id: \u0026FeatureId) -\u003e BackendResult\u003c()\u003e {\n        let src = self.feature_path(id);\n        self.ensure_dirs().map_err(BackendError::Io)?;\n        let dst = self.fir_path().join(\"archive\").join(format!(\"{}.md\", id.0));\n        if src.exists() {\n            std::fs::rename(\u0026src, \u0026dst).map_err(BackendError::Io)?;\n        }\n        Ok(())\n    }\n}\n\nimpl FirBackend for FileBackend {\n    fn load_all(\u0026mut self) -\u003e BackendResult\u003cRegistry\u003e {\n        let config = match self.load_config() {\n            Ok(c) =\u003e c,\n            Err(BackendError::NotFound(_)) =\u003e Config::default(),\n            Err(e) =\u003e return Err(e),\n        };\n\n        let mut registry = Registry {\n            next_feature_id: config.counters.next_feature,\n            next_story_id: config.counters.next_story,\n            next_decision_id: config.counters.next_decision,\n            ..Registry::new()\n        };\n\n        let features_dir = self.fir_path().join(\"features\");\n        if features_dir.exists() {\n            for entry in std::fs::read_dir(\u0026features_dir).map_err(BackendError::Io)? {\n                let entry = entry.map_err(BackendError::Io)?;\n                let path = entry.path();\n                if path.extension().and_then(|e| e.to_str()) == Some(\"md\") {\n                    let (feature, body) = read_md::\u003cFeature\u003e(\u0026path)?;\n                    let mut feature = feature;\n                    feature.body = body;\n                    registry.features.push(feature);\n                }\n            }\n        }\n\n        let stories_dir = self.fir_path().join(\"stories\");\n        if stories_dir.exists() {\n            for entry in std::fs::read_dir(\u0026stories_dir).map_err(BackendError::Io)? {\n                let entry = entry.map_err(BackendError::Io)?;\n                let path = entry.path();\n                if path.extension().and_then(|e| e.to_str()) == Some(\"md\") {\n                    let (story, body) = read_md::\u003cStory\u003e(\u0026path)?;\n                    let mut story = story;\n                    story.body = body;\n                    registry.stories.push(story);\n                }\n            }\n        }\n\n        let decisions_dir = self.fir_path().join(\"decisions\");\n        if decisions_dir.exists() {\n            for entry in std::fs::read_dir(\u0026decisions_dir).map_err(BackendError::Io)? {\n                let entry = entry.map_err(BackendError::Io)?;\n                let path = entry.path();\n                if path.extension().and_then(|e| e.to_str()) == Some(\"md\") {\n                    let (decision, body) = read_md::\u003cDecision\u003e(\u0026path)?;\n                    let mut decision = decision;\n                    decision.body = body;\n                    registry.decisions.push(decision);\n                }\n            }\n        }\n\n        Ok(registry)\n    }\n\n    fn load_feature(\u0026self, id: \u0026FeatureId) -\u003e BackendResult\u003cFeature\u003e {\n        let path = self.feature_path(id);\n        let (mut feature, body) = read_md::\u003cFeature\u003e(\u0026path)?;\n        feature.body = body;\n        Ok(feature)\n    }\n\n    fn save_feature(\u0026mut self, feature: \u0026Feature) -\u003e BackendResult\u003c()\u003e {\n        self.ensure_dirs().map_err(BackendError::Io)?;\n        let path = self.feature_path(\u0026feature.id);\n        write_md(\u0026path, feature, \u0026feature.body)\n    }\n\n    fn load_story(\u0026self, id: \u0026StoryId) -\u003e BackendResult\u003cStory\u003e {\n        let path = self.story_path(id);\n        let (mut story, body) = read_md::\u003cStory\u003e(\u0026path)?;\n        story.body = body;\n        Ok(story)\n    }\n\n    fn save_story(\u0026mut self, story: \u0026Story) -\u003e BackendResult\u003c()\u003e {\n        self.ensure_dirs().map_err(BackendError::Io)?;\n        let path = self.story_path(\u0026story.id);\n        write_md(\u0026path, story, \u0026story.body)\n    }\n\n    fn load_decision(\u0026self, id: \u0026DecisionId) -\u003e BackendResult\u003cDecision\u003e {\n        let path = self.decision_path(id);\n        let (mut decision, body) = read_md::\u003cDecision\u003e(\u0026path)?;\n        decision.body = body;\n        Ok(decision)\n    }\n\n    fn save_decision(\u0026mut self, decision: \u0026Decision) -\u003e BackendResult\u003c()\u003e {\n        self.ensure_dirs().map_err(BackendError::Io)?;\n        let path = self.decision_path(\u0026decision.id);\n        write_md(\u0026path, decision, \u0026decision.body)\n    }\n\n    fn next_id(\u0026self, kind: IdKind) -\u003e String {\n        match kind {\n            IdKind::Feature =\u003e FeatureId::new(self.registry.next_feature_id).0,\n            IdKind::Story =\u003e StoryId::new(self.registry.next_story_id).0,\n            IdKind::Decision =\u003e DecisionId::new(self.registry.next_decision_id).0,\n        }\n    }\n\n    fn search(\u0026self, query: \u0026str) -\u003e Vec\u003cSearchResult\u003e {\n        let q = query.to_lowercase();\n        let mut results = Vec::new();\n\n        for f in \u0026self.registry.features {\n            if f.title.to_lowercase().contains(\u0026q) || f.body.to_lowercase().contains(\u0026q) {\n                results.push(SearchResult {\n                    id: f.id.0.clone(),\n                    kind: SearchKind::Feature,\n                    title: f.title.clone(),\n                    excerpt: f.body.chars().take(200).collect(),\n                });\n            }\n        }\n\n        for s in \u0026self.registry.stories {\n            if s.title.to_lowercase().contains(\u0026q) || s.body.to_lowercase().contains(\u0026q) {\n                results.push(SearchResult {\n                    id: s.id.0.clone(),\n                    kind: SearchKind::Story,\n                    title: s.title.clone(),\n                    excerpt: s.body.chars().take(200).collect(),\n                });\n            }\n        }\n\n        for d in \u0026self.registry.decisions {\n            if d.title.to_lowercase().contains(\u0026q) || d.body.to_lowercase().contains(\u0026q) {\n                results.push(SearchResult {\n                    id: d.id.0.clone(),\n                    kind: SearchKind::Decision,\n                    title: d.title.clone(),\n                    excerpt: d.body.chars().take(200).collect(),\n                });\n            }\n        }\n\n        results\n    }\n}\n","traces":[{"line":12,"address":[14634645,14633247,14633253,14631888,14634639,14631855,14633280,14630496,14631861],"length":1,"stats":{"Line":0}},{"line":13,"address":[14631986,14633378,14630594],"length":1,"stats":{"Line":0}},{"line":14,"address":[],"length":0,"stats":{"Line":0}},{"line":16,"address":[],"length":0,"stats":{"Line":0}},{"line":17,"address":[],"length":0,"stats":{"Line":0}},{"line":18,"address":[14631229,14632621,14634013],"length":1,"stats":{"Line":0}},{"line":19,"address":[1662303,1665406,1663581,1664991,1663647,1662237,1662718,1664925,1664062],"length":1,"stats":{"Line":0}},{"line":20,"address":[],"length":0,"stats":{"Line":0}},{"line":21,"address":[],"length":0,"stats":{"Line":0}},{"line":24,"address":[1659730,1658912,1658892,1658060,1657248,1659724,1658898,1658080,1658066],"length":1,"stats":{"Line":0}},{"line":25,"address":[],"length":0,"stats":{"Line":0}},{"line":26,"address":[14628880,14629682,14629133,14629869,14629616,1462 how::anyhow!(\"failed to run {}: {e}\", plugin.display()))?;\n\n    if !status.success() {\n        std::process::exit(status.code().unwrap_or(1));\n    }\n\n    Ok(())\n}\n\nfn find_plugin(subcommand: \u0026str) -\u003e Result\u003cPathBuf\u003e {\n    let plugin_name = format!(\"idd-{subcommand}\");\n\n    let paths = env::var_os(\"PATH\").unwrap_or_default();\n    for dir in env::split_paths(\u0026paths) {\n        let candidate = dir.join(\u0026plugin_name);\n        if candidate.is_file() \u0026\u0026 is_executable(\u0026candidate) {\n            return Ok(candidate);\n        }\n    }\n\n    anyhow::bail!(\"unknown command '{subcommand}'. Run `idd --help` for available commands.\")\n}\n\n#[cfg(unix)]\nfn is_executable(path: \u0026std::path::Path) -\u003e bool {\n    use std::os::unix::fs::PermissionsExt;\n    path.metadata()\n        .map(|m| m.permissions().mode() \u0026 0o111 != 0)\n        .unwrap_or(false)\n}\n\n#[cfg(not(unix))]\nfn is_executable(path: \u0026std::path::Path) -\u003e bool {\n    path.is_file()\n}\n\nfn print_help() {\n    println!(\"idd — Intent-Driven Development CLI\");\n    println!();\n    println!(\"Usage: idd \u003ccommand\u003e [ARGS]...\");\n    println!();\n    println!(\"Commands:\");\n\n    let plugins = discover_plugins();\n    if plugins.is_empty() {\n        println!(\"  (no plugins found on $PATH)\");\n    } else {\n        for (name, desc) in plugins {\n            println!(\"  {name:12} {desc}\");\n        }\n    }\n\n    println!();\n    println!(\"Run `idd \u003ccommand\u003e --help` for more information on a command.\");\n}\n\nfn discover_plugins() -\u003e Vec\u003c(String, String)\u003e {\n    let mut plugins = Vec::new();\n\n    let paths = env::var_os(\"PATH\").unwrap_or_default();\n    for dir in env::split_paths(\u0026paths) {\n        let entries = match std::fs::read_dir(\u0026dir) {\n            Ok(e) =\u003e e,\n            Err(_) =\u003e continue,\n        };\n        for entry in entries.flatten() {\n erity\u003e,\n    statement: Option\u003cString\u003e,\n    rationale: Option\u003cString\u003e,\n    owner: Option\u003cString\u003e,\n    enforcement_profile: Option\u003cEnforcementProfile\u003e,\n    tags: Vec\u003cString\u003e,\n    overrides: Option\u003cOverrideInfo\u003e,\n    feature_ref: Option\u003cString\u003e,\n}\n\nimpl DeclarationBuilder {\n    pub fn new() -\u003e Self {\n        Self::default()\n    }\n\n    pub fn id(mut self, id: impl Into\u003cString\u003e) -\u003e Self {\n        self.id = Some(id.into());\n        self\n    }\n\n    pub fn kind(mut self, kind: DeclarationKind) -\u003e Self {\n        self.kind = Some(kind);\n        self\n    }\n\n    pub fn scope(mut self, scope: Scope) -\u003e Self {\n        self.scope = Some(scope);\n        self\n    }\n\n    pub fn severity(mut self, severity: Severity) -\u003e Self {\n        self.severity = Some(severity);\n        self\n    }\n\n    pub fn statement(mut self, statement: impl Into\u003cString\u003e) -\u003e Self {\n        self.statement = Some(statement.into());\n        self\n    }\n\n    pub fn rationale(mut self, rationale: impl Into\u003cString\u003e) -\u003e Self {\n        self.rationale = Some(rationale.into());\n        self\n    }\n\n    pub fn owner(mut self, owner: impl Into\u003cString\u003e) -\u003e Self {\n        self.owner = Some(owner.into());\n        self\n    }\n\n    pub fn enforcement_profile(mut self, profile: EnforcementProfile) -\u003e Self {\n        self.enforcement_profile = Some(profile);\n        self\n    }\n\n    pub fn tag(mut self, tag: impl Into\u003cString\u003e) -\u003e Self {\n        self.tags.push(tag.into());\n        self\n    }\n\n    pub fn overrides(\n        mut self,\n        overridden_id: impl Into\u003cString\u003e,\n        rationale: impl Into\u003cString\u003e,\n    ) -\u003e Self {\n        self.overrides = Some(OverrideInfo {\n            overridden_id: overridden_id.into(),\n            rationale: rationale.into(),\n        });\n        self\n    }\n\n    pub fn feature_ref(mut self, feature_ref: impl Into\u003cString\u003e) -\u003e Self {\n        self.feature_ref = Some(feature_ref.into());\n        self\n    }\n\n    pub fn build(self) -\u003e Result\u003cDeclaration, DeclarationBuildError\u003e {\n        let id = self.id.ok_or(DeclarationBuildError::MissingField(\"id\"))?;\n        let kind = self\n            .kind\n            .ok_or(DeclarationBuildError::MissingField(\"kind\"))?;\n        let scope = self\n            .scope\n            .ok_or(DeclarationBuildError::MissingField(\"scope\"))?;\n        let severity = self\n            .severity\n            .ok_or(DeclarationBuildError::MissingField(\"severity\"))?;\n        let statement = self\n            .statement\n            .ok_or(DeclarationBuildError::MissingField(\"statement\"))?;\n        let rationale = self\n            .rationale\n            .ok_or(DeclarationBuildError::MissingField(\"rationale\"))?;\n\n        Ok(Declaration {\n            id: DeclarationId::new(id),\n            kind,\n            scope,\n            severity,\n            statement,\n            rationale,\n            owner: self.owner,\n            enforcement_profile: self\n                .enforcement_profile\n                .unwrap_or_else(|| EnforcementProfile::new(Vec::new())),\n            tags: self.tags,\n            overrides: self.overrides,\n            feature_ref: self.feature_ref,\n        })\n    }\n}\n\n#[derive(Debug, thiserror::Error)]\npub enum DeclarationBuildError {\n    #[error(\"missing required field: {0}\")]\n    MissingField(\u0026'static str),\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::{EnforcementPoint, EnforcementProfile};\n    use proptest::prelude::*;\n\n    fn arb_declaration() -\u003e impl Strategy\u003cValue = Declaration\u003e {\n        (\n            any::\u003cString\u003e(),\n            prop_oneof![\n                Just(DeclarationKind::Invariant),\n                Just(Declarati ntentFile {\n    #[serde(default)]\n    declaration: Vec\u003cTomlDeclaration\u003e,\n    #[serde(default)]\n    import: Vec\u003cTomlImport\u003e,\n}\n\n#[derive(Debug, Deserialize)]\nstruct TomlDeclaration {\n    id: String,\n    kind: String,\n    scope: String,\n    severity: String,\n    statement: String,\n    rationale: String,\n    #[serde(default)]\n    owner: Option\u003cString\u003e,\n    #[serde(default)]\n    enforcement_points: Vec\u003cString\u003e,\n    #[serde(default)]\n    tags: Vec\u003cString\u003e,\n    #[serde(default)]\n    r#override: Option\u003cTomlOverride\u003e,\n    #[serde(default)]\n    feature_ref: Option\u003cString\u003e,\n}\n\n#[derive(Debug, Deserialize)]\nstruct TomlOverride {\n    overridden_id: String,\n    rationale: String,\n}\n\n#[derive(Debug, Deserialize)]\nstruct TomlImport {\n    library: String,\n    version: String,\n    #[serde(default)]\n    bindings: Vec\u003cTomlBinding\u003e,\n}\n\n#[derive(Debug, Deserialize)]\nstruct TomlBinding {\n    abstract_role: String,\n    concrete_module: String,\n}\n\n#[derive(Debug)]\npub struct IntentFile {\n    pub declarations: Vec\u003cDeclaration\u003e,\n    pub imports: Vec\u003cImportDeclaration\u003e,\n}\n\nfn parse_kind(s: \u0026str) -\u003e Result\u003cDeclarationKind, ParseError\u003e {\n    match s {\n        \"invariant\" =\u003e Ok(DeclarationKind::Invariant),\n        \"precondition\" =\u003e Ok(DeclarationKind::Precondition),\n        \"postcondition\" =\u003e Ok(DeclarationKind::Postcondition),\n        \"assumption\" =\u003e Ok(DeclarationKind::Assumption),\n        \"coupling_limit\" =\u003e Ok(DeclarationKind::CouplingLimit),\n        \"temporal\" =\u003e Ok(DeclarationKind::Temporal),\n        \"resource_bound\" =\u003e Ok(DeclarationKind::ResourceBound),\n        \"process_constraint\" =\u003e Ok(DeclarationKind::ProcessConstraint),\n        \"feature_constraint\" =\u003e Ok(DeclarationKind::FeatureConstraint),\n        other =\u003e Err(ParseError::InvalidKind(other.into())),\n    }\n}\n\nfn parse_scope(s: \u0026str) -\u003e Result\u003cScope, ParseError\u003e {\n    match s {\n        \"global\" =\u003e Ok(Scope::Global),\n        \"platform\" =\u003e Ok(Scope::Platform),\n        \"project\" =\u003e Ok(Scope::Project),\n        \"domain\" =\u003e Ok(Scope::Domain),\n        \"module\" =\u003e Ok(Scope::Module),\n        \"interface\" =\u003e Ok(Scope::Interface),\n        \"function\" =\u003e Ok(Scope::Function),\n        other =\u003e Err(ParseError::InvalidScope(other.into())),\n    }\n}\n\nfn parse_severity(s: \u0026str) -\u003e Result\u003cSeverity, ParseError\u003e {\n    match s {\n        \"hard\" =\u003e Ok(Severity::Hard),\n        \"soft\" =\u003e Ok(Severity::Soft),\n        \"info\" =\u003e Ok(Severity::Info),\n        other =\u003e Err(ParseError::InvalidSeverity(other.into())),\n    }\n}\n\nfn parse_enforcement_point(s: \u0026str) -\u003e Result\u003cEnforcementPoint, ParseError\u003e {\n    match s {\n        \"expression\" =\u003e Ok(EnforcementPoint::Expression),\n        \"development\" =\u003e Ok(EnforcementPoint::Development),\n        \"property_based_tests\" =\u003e Ok(EnforcementPoint::PropertyBasedTests),\n        \"reasoning_tools\" =\u003e Ok(EnforcementPoint::ReasoningTools),\n        \"pre_commit\" =\u003e Ok(EnforcementPoint::PreCommit),\n        \"ci\" =\u003e Ok(EnforcementPoint::Ci),\n        \"runtime\" =\u003e Ok(EnforcementPoint::Runtime),\n        other =\u003e Err(ParseError::InvalidEnforcementPoint(other.into())),\n    }\n}\n\nfn toml_to_declaration(t: TomlDeclaration) -\u003e Result\u003cDeclaration, ParseError\u003e {\n    let kind = parse_kind(\u0026t.kind)?;\n    let scope = parse_scope(\u0026t.scope)?;\n    let severity = parse_severity(\u0026t.severity)?;\n\n    let points: Result\u003cVec\u003c_\u003e, _\u003e = t\n        .enforcement_points\n        .iter()\n        .map(|s| parse_enforcement_point(s))\n        .collect();\n    let enforcement_profile = EnforcementProfile::new(points?);\n\n    let overrides = t\n        .r#override\n        .map(|o| idd_dsl_core::declaration::OverrideInfo {\n            overridden_id: o.overridden_id,\n            rationale: o.rationale,\n        });\n\n    Ok(Declaration {\n        id: DeclarationId::new(t.id),\n        kind,\n        scope,\n        severity,\n        statement: t.statement,\n        rationale: t.rationale,\n        owner: t.owner,\n        enforcement_profile,\n        tags: t.tags,\n        overrides,\n        feature_ref: t.feature_ref,\n    })\n}\n\nfn toml_to_import(t: TomlImport) -\u003e ImportDeclaration {\n    ImportDeclaration {\n        library: t.library,\n        version: t.version,\n        bindings: t\n            .bindings\n            .into_iter()\n            .map(|b| ImportBinding {\n                abstract_role: b.abstract_role,\n                concrete_module: b.concrete_module,\n            })\n            .collect(),\n    }\n}\n\npub fn parse_intent_file(path: \u0026Path) -\u003e Result\u003cIntentFile, ParseError\u003e {\n    let content = std::fs::read_to_string(path)?;\n    let doc: TomlIntentFile = toml::from_str(\u0026content)?;\n\n    let declarations: Result\u003cVec\u003c_\u003e, _\u003e = doc\n        .declaration\n        .into_iter()\n        .map(toml_to_declaration)\n        .collect();\n\n    let imports = doc.import.into_iter().map(toml_to_import).collect();\n\n    Ok(IntentFile {\n        declarations: declarations?,\n        imports,\n    })\n}\n\n/// Check for duplicate declaration IDs across multiple parsed intent files.\n/// Returns an error for the first duplicate found.\npub fn check_duplicate_ids(\n    files: \u0026[(impl AsRef\u003cstd::path::Path\u003e, \u0026IntentFile)],\n) -\u003e Result\u003c(), ParseError\u003e {\n    let mut seen = std::collections::HashMap::new();\n    for (path, file) in files {\n        for decl in \u0026file.declarations {\n            let id = \u0026decl.id.0;\n            let path_str = path.as_ref().display().to_string();\n            if let Some(prev_path) = seen.insert(id.clone(), path_str) {\n                return Err(ParseError::DuplicateId(\n                    id.clone(),\n                    format!(\"{} and {}\", prev_path, path.as_ref().display()),\n                ));\n            }\n        }\n    }\n    Ok(())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    fn parse_str(content: \u0026str) -\u003e Result\u003cIntentFile, ParseError\u003e {\n        let doc: TomlIntentFile = toml::from_str(content)?;\n\n        let declarations: Result\u003cVec\u003c_\u003e, _\u003e = doc\n            .declaration\n            .into_iter()\n            .map(toml_to_declaration)\n            .collect();\n\n        let imports = doc.import.into_iter().map(toml_to_import).collect();\n\n        Ok(IntentFile {\n            declarations: declarations?,\n            imports,\n        })\n    }\n\n    #[test]\n    fn parse_minimal_declaration() {\n        let input = r#\"\n[[declaration]]\nid = \"no-direct-db-access\"\nkind = \"invariant\"\nscope = \"project\"\nseverity = \"hard\"\nstatement = \"All data access goes through the repository layer\"\nrationale = \"Ensures testability\"\n\"#;\n\n        let result = parse_str(input).unwrap();\n        assert_eq!(result.declarations.len(), 1);\n\n        let decl = \u0026result.declarations[0];\n        assert_eq!(decl.id.0, \"no-direct-db-access\");\n        assert!(matches!(decl.kind, DeclarationKind::Invariant));\n        assert!(matches!(decl.scope, Scope::Project));\n        assert!(matches!(decl.severity, Severity::Hard));\n        assert!(decl.tags.is_empty());\n        assert!(decl.overrides.is_none());\n    }\n\n    #[test]\n    fn parse_declaration_with_all_fields() {\n        let input = r#\"\n[[declaration]]\nid = \"payment-latency\"\nkind = \"temporal\"\nscope = \"function\"\nseverity = \"hard\"\nstatement = \"Must complete within 500ms at p99\"\nrationale = \"User is waiting\"\nowner = \"payments-team\"\nenforcement_points = [\"ci\", \"runtime\"]\ntags = [\"performance\", \"user-facing\"]\nfeature_ref = \"FIR-3\"\n\n[declaration.override]\noverridden_id = \"project.api-latency-200ms\"\nrationale = \"Cold path\"\n\"#;\n\n        let result = parse_str(input).unwrap();\n        let decl = \u0026result.declarations[0];\n\n        assert_eq!(decl.id.0, \"payment-latency\");\n        assert!(matches!(decl.kind, DeclarationKind::Temporal));\n        assert!(matches!(decl.scope, Scope::Function));\n        assert_eq!(decl.owner.as_deref(), Some(\"payments-team\"));\n        assert_eq!(decl.tags, vec![\"performance\", \"user-facing\"]);\n        assert_eq!(decl.enforcement_profile.points.len(), 2);\n        assert!(matches!(\n            decl.enforcement_profile.points[0],\n            EnforcementPoint::Ci\n        ));\n        assert!(matches!(\n            decl.enforcement_profile.points[1],\n            EnforcementPoint::Runtime\n        ));\n        let ov = decl.overrides.as_ref().unwrap();\n        assert_eq!(ov.overridden_id, \"project.api-latency-200ms\");\n        assert_eq!(ov.rationale, \"Cold path\");\n        assert_eq!(decl.feature_ref.as_deref(), Some(\"FIR-3\"));\n    }\n\n    #[test]\n    fn parse_imports_with_bindings() {\n        let input = r#\"\n[[import]]\nlibrary = \"idd-lib/gdpr\"\nversion = \"2.1.0\"\n\n[[import.bindings]]\nabstract_role = \"data-controller\"\nconcrete_module = \"billing\"\n\n[[import.bindings]]\nabstract_role = \"personal-data-store\"\nconcrete_module = \"user-db\"\n\"#;\n\n        let result = parse_str(input).unwrap();\n        assert_eq!(result.imports.len(), 1);\n\n        let imp = \u0026result.imports[0];\n        assert_eq!(imp.library, \"idd-lib/gdpr\");\n        assert_eq!(imp.version, \"2.1.0\");\n        assert_eq!(imp.bindings.len(), 2);\n        assert_eq!(imp.bindings[0].abstract_role, \"data-controller\");\n        assert_eq!(imp.bindings[0].concrete_module, \"billing\");\n    }\n\n    #[test]\n    fn parse_multiple_declarations_and_imports() {\n        let input = r#\"\n[[declaration]]\nid = \"auth-only\"\nkind = \"invariant\"\nscope = \"project\"\nseverity = \"hard\"\nstatement = \"All endpoints require authentication\"\nrationale = \"Security baseline\"\n\n[[declaration]]\nid = \"no-coupling\"\nkind = \"coupling_limit\"\nscope = \"module\"\nseverity = \"hard\"\nstatement = \"UI must not import data layer\"\nrationale = \"Separation of concerns\"\n\n[[import]]\nlibrary = \"idd-lib/rest-api\"\nversion = \"1.0.0\"\n\"#;\n\n        let result = parse_str(input).unwrap();\n        assert_eq!(result.declarations.len(), 2);\n        assert_eq!(result.imports.len(), 1);\n        assert!(matches!(\n            result.declarations[0].kind,\n            DeclarationKind::Invariant\n        ));\n        assert!(matches!(\n            result.declarations[1].kind,\n            DeclarationKind::CouplingLimit\n        ));\n    }\n\n    #[test]\n    fn parse_all_declaration_kinds() {\n        let kinds = [\n            \"invariant\",\n            \"precondition\",\n            \"postcondition\",\n            \"assumption\",\n            \"coupling_limit\",\n            \"temporal\",\n            \"resource_bound\",\n            \"process_constraint\",\n            \"feature_constraint\",\n        ];\n\n        for kind in \u0026kinds {\n            let input = format!(\n                r#\"\n[[declaration]]\nid = \"test-{}\"\nkind = \"{}\"\nscope = \"project\"\nseverity = \"hard\"\nstatement = \"Test statement\"\nrationale = \"Test rationale\"\n\"#,\n                kind, kind\n            );\n            let result = parse_str(\u0026input).unwrap();\n            assert_eq!(result.declarations.len(), 1);\n        }\n    }\n\n    #[test]\n    fn parse_all_scopes() {\n        let scopes = [\n            \"global\",\n            \"platform\",\n            \"project\",\n            \"domain\",\n            \"module\",\n            \"interface\",\n            \"function\",\n        ];\n\n        for scope in \u0026scopes {\n            let input = format!(\n                r#\"\n[[declaration]]\nid = \"test-{}\"\nkind = \"invariant\"\nscope = \"{}\"\nseverity = \"hard\"\nstatement = \"Test\"\nrationale = \"Test\"\n\"#,\n                scope, scope\n            );\n            let result = parse_str(\u0026input).unwrap();\n            assert_eq!(result.declarations.len(), 1);\n        }\n    }\n\n    #[test]\n    fn parse_all_severities() {\n        for severity in \u0026[\"hard\", \"soft\", \"info\"] {\n            let input = format!(\n                r#\"\n[[declaration]]\nid = \"test\"\nkind = \"invariant\"\nscope = \"project\"\nseverity = \"{}\"\nstatement = \"Test\"\nrationale = \"Test\"\n\"#,\n                severity\n            );\n            let result = parse_str(\u0026input).unwrap();\n            assert_eq!(result.declarations.len(), 1);\n        }\n    }\n\n    #[test]\n    fn error_on_invalid_kind() {\n        let input = r#\"\n[[declaration]]\nid = \"test\"\nkind = \"not_a_kind\"\nscope = \"project\"\nseverity = \"hard\"\nstatement = \"Test\"\nrationale = \"Test\"\n\"#;\n        let err = parse_str(input).unwrap_err();\n        assert!(matches!(err, ParseError::InvalidKind(_)));\n    }\n\n    #[test]\n    fn error_on_invalid_scope() {\n        let input = r#\"\n[[declaration]]\nid = \"test\"\nkind = \"invariant\"\nscope = \"galaxy\"\nseverity = \"hard\"\nstatement = \"Test\"\nrationale = \"Test\"\n\"#;\n        let err = parse_str(input).unwrap_err();\n        assert!(matches!(err, ParseError::InvalidScope(_)));\n    }\n\n    #[test]\n    fn error_on_invalid_severity() {\n        let input = r#\"\n[[declaration]]\nid = \"test\"\nkind = \"invariant\"\nscope = \"project\"\nseverity = \"extreme\"\nstatement = \"Test\"\nrationale = \"Test\"\n\"#;\n        let err = parse_str(input).unwrap_err();\n        assert!(matches!(err, ParseError::InvalidSeverity(_)));\n    }\n\n    #[test]\n    fn empty_file_parses() {\n        let result = parse_str(\"\").unwrap();\n        assert!(result.declarations.is_empty());\n        assert!(result.imports.is_empty());\n    }\n\n    #[test]\n    fn duplicate_ids_across_files_detected() {\n        let file1 = parse_str(\n            r#\"\n[[declaration]]\nid = \"shared-id\"\nkind = \"invariant\"\nscope = \"project\"\nseverity = \"hard\"\nstatement = \"First\"\nrationale = \"First\"\n\"#,\n        )\n        .unwrap();\n\n        let file2 = parse_str(\n            r#\"\n[[declaration]]\nid = \"shared-id\"\nkind = \"temporal\"\nscope = \"function\"\nseverity = \"hard\"\nstatement = \"Second\"\nrationale = \"Second\"\n\"#,\n        )\n        .unwrap();\n\n        let files: Vec\u003c(\u0026std::path::Path, \u0026IntentFile)\u003e = vec![\n            (std::path::Path::new(\"a.intent\"), \u0026file1),\n            (std::path::Path::new(\"b.intent\"), \u0026file2),\n        ];\n        let err = check_duplicate_ids(\u0026files).unwrap_err();\n        assert!(matches!(err, ParseError::DuplicateId(_, _)));\n    }\n\n    #[test]\n    fn no_false_positives_for_unique_ids_across_files() {\n        let file1 = parse_str(\n            r#\"\n[[declaration]]\nid = \"unique-a\"\nkind = \"invariant\"\nscope = \"project\"\nseverity = \"hard\"\nstatement = \"A\"\nrationale = \"A\"\n\"#,\n        )\n        .unwrap();\n\n        let file2 = parse_str(\n            r#\"\n[[declaration]]\nid = \"unique-b\"\nkind = \"temporal\"\nscope = \"function\"\nseverity = \"hard\"\nstatement = \"B\"\nrationale = \"B\"\n\"#,\n        )\n        .unwrap();\n\n        let files: Vec\u003c(\u0026std::path::Path, \u0026IntentFile)\u003e = vec![\n            (std::path::Path::new(\"a.intent\"), \u0026file1),\n            (std::path::Path::new(\"b.intent\"), \u0026file2),\n        ];\n        assert!(check_duplicate_ids(\u0026files).is_ok());\n    }\n}\n","traces":[{"line":88,"address":[1421792],"length":1,"stats":{"Line":11}},{"line":90,"address":[1421907,1421849],"length":1,"stats":{"Line":13}},{"line":91,"address"

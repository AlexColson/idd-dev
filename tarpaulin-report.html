fmt::Result {\n        write!(f, \"{}\", self.0)\n    }\n}\n\n#[derive(Debug, Clone, PartialEq, Eq, Hash, Serialize, Deserialize)]\npub struct StoryId(pub String);\n\nimpl StoryId {\n    pub fn new(n: u64) -\u003e Self {\n        Self(format!(\"STORY-{n}\"))\n    }\n}\n\nimpl std::fmt::Display for StoryId {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        write!(f, \"{}\", self.0)\n    }\n}\n\n#[derive(Debug, Clone, PartialEq, Eq, Hash, Serialize, Deserialize)]\npub struct DecisionId(pub String);\n\nimpl DecisionId {\n    pub fn new(n: u64) -\u003e Self {\n        Self(format!(\"DEC-{n}\"))\n    }\n}\n\nimpl std::fmt::Display for DecisionId {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        write!(f, \"{}\", self.0)\n    }\n}\n\n// ── Status ──────────────────────────────────────────────────\n\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\n#[serde(rename_all = \"kebab-case\")]\npub enum FeatureStatus {\n    Wish,\n    Exploring,\n    Scoping,\n    Designing,\n    Ready,\n    InProgress,\n    Verifying,\n    Done,\n    Abandoned,\n    Deferred,\n}\n\nimpl FeatureStatus {\n    pub fn next(\u0026self) -\u003e Option\u003cSelf\u003e {\n        match self {\n            FeatureStatus::Wish =\u003e Some(FeatureStatus::Exploring),\n            FeatureStatus::Exploring =\u003e Some(FeatureStatus::Scoping),\n            FeatureStatus::Scoping =\u003e Some(FeatureStatus::Designing),\n            FeatureStatus::Designing =\u003e Some(FeatureStatus::Ready),\n            FeatureStatus::Ready =\u003e Some(FeatureStatus::InProgress),\n            FeatureStatus::InProgress =\u003e Some(FeatureStatus::Verifying),\n            FeatureStatus::Verifying =\u003e Some(FeatureStatus::Done),\n            FeatureStatus::Done | FeatureStatus::Abandoned | FeatureStatus::Deferred =\u003e None,\n        }\n    }\n\n    pub const fn is_terminal(\u0026self) -\u003e bool {\n        matches!(\n            self,\n            FeatureStatus::Done | FeatureStatus::Abandoned | FeatureStatus::Deferred\n        )\n    }\n\n    pub const fn is_active(\u0026self) -\u003e bool {\n        matches!(\n            self,\n            FeatureStatus::Designing\n                | FeatureStatus::Ready\n                | FeatureStatus::InProgress\n                | FeatureStatus::Verifying\n        )\n    }\n}\n\nimpl std::fmt::Display for FeatureStatus {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        let s = match self {\n            FeatureStatus::Wish =\u003e \"wish\",\n            FeatureStatus::Exploring =\u003e \"exploring\",\n            FeatureStatus::Scoping =\u003e \"scoping\",\n            FeatureStatus::Designing =\u003e \"designing\",\n            FeatureStatus::Ready =\u003e \"ready\",\n            FeatureStatus::InProgress =\u003e \"in-progress\",\n            FeatureStatus::Verifying =\u003e \"verifying\",\n            FeatureStatus::Done =\u003e \"done\",\n            FeatureStatus::Abandoned =\u003e \"abandoned\",\n            FeatureStatus::Deferred =\u003e \"deferred\",\n        };\n        write!(f, \"{s}\")\n    }\n}\n\n// ── Relationships ───────────────────────────────────────────\n\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct Conversation {\n    pub date: NaiveDate,\n    pub ref_: String,\n}\n\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct ExternalLinks {\n    #[serde(default, skip_serializing_if = \"Option::is_none\")]\n    pub jira: Option\u003cString\u003e,\n    #[serde(default, skip_serializing_if = \"Option::is_none\")]\n    pub linear: Option\u003cString\u003e,\n}\n\n// ── Feature ─────────────────────────────────────────────────\n\n#[derive(Debug, Clone, PartialEq, Serialize, Deserialize)]\npub struct Feature {\n    pub id: FeatureId,\n    pub title: String,\n    pub status: FeatureStatus,\n    pub created: NaiveDate,\n    #[serde(default, skip_serializing_if = \"Option::is_none\")]\n    pub updated: Option\u003cNaiveDate\u003e,\n    #[serde(default, skip_serializing_if = \"Option::is_none\")]\n    pub author: Option\u003cString\u003e,\n\n    // Lifecycle\n    #[serde(default, skip_serializing_if = \"Option::is_none\")]\n    pub promoted_from: Option\u003cString\u003e,\n    #[serde(default, skip_serializing_if = \"Option::is_none\")]\n    pub promoted_date: Option\u003cNaiveDate\u003e,\n\n    // Relationships\n    #[serde(default, skip_serializing_if = \"Option::is_none\")]\n    pub story: Option\u003cStoryId\u003e,\n    #[serde(default, skip_serializing_if = \"Vec::is_empty\")]\n    pub depends_on: Vec\u003cFeatureId\u003e,\n    #[serde(default, skip_serializing_if = \"Vec::is_empty\")]\n    pub blocks: Vec\u003cFeatureId\u003e,\n    #[serde(default, skip_serializing_if = \"Vec::is_empty\")]\n    pub related: Vec\u003cFeatureId\u003e,\n    #[serde(default, skip_serializing_if = \"Vec::is_empty\")]\n    pub children: Vec\u003cFeatureId\u003e,\n\n    // Constraints\n    #[serde(default, skip_serializing_if = \"Vec::is_empty\")]\n    pub constraints: Vec\u003cDeclarationId\u003e,\n    #[serde(default, skip_serializing_if = \"Vec::is_empty\")]\n    pub preliminary_constraints: Vec\u003cString\u003e,\n\n    // Decisions\n    #[serde(default, skip_serializing_if = \"Vec::is_empty\")]\n    pub decisions: Vec\u003cDecisionId\u003e,\n\n    // Source and context\n    #[serde(default, skip_serializing_if = \"Option::is_none\")]\n    pub source: Option\u003cString\u003e,\n    #[serde(default, skip_serializing_if = \"Vec::is_empty\")]\n    pub conversations: Vec\u003cConversation\u003e,\n\n    // Tags\n    #[serde(default, skip_serializing_if = \"Vec::is_empty\")]\n    pub tags: Vec\u003cString\u003e,\n    #[serde(default, skip_serializing_if = \"Option::is_none\")]\n    pub priority: Option\u003cString\u003e,\n    #[serde(default, skip_serializing_if = \"Option::is_none\")]\n    pub effort_estimate: Option\u003cString\u003e,\n\n    // External\n    #[serde(default, skip_serializing_if = \"Option::is_none\")]\n    pub external: Option\u003cExternalLinks\u003e,\n\n    // Markdown body (everything after frontmatter)\n    #[serde(default, skip_serializing_if = \"String::is_empty\")]\n    pub body: String,\n}\n\n// ── Story ───────────────────────────────────────────────────\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct Story {\n    pub id: StoryId,\n    pub title: String,\n    pub status: String,\n    pub created: NaiveDate,\n    #[serde(default, skip_serializing_if = \"Vec::is_empty\")]\n    pub features: Vec\u003cFeatureId\u003e,\n    #[serde(default, skip_serializing_if = \"Vec::is_empty\")]\n    pub constraints: Vec\u003cDeclarationId\u003e,\n    #[serde(default, skip_serializing_if = \"Vec::is_empty\")]\n    pub tags: Vec\u003cString\u003e,\n    #[serde(default, skip_serializing_if = \"String::is_empty\")]\n    pub body: String,\n}\n\n// ── Decision ────────────────────────────────────────────────\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct Decision {\n    pub id: DecisionId,\n    pub title: String,\n    pub date: NaiveDate,\n    pub status: String,\n    #[serde(default, skip_serializing_if = \"Vec::is_empty\")]\n    pub features: Vec\u003cFeatureId\u003e,\n    #[serde(default, skip_serializing_if = \"Vec::is_empty\")]\n    pub constraints: Vec\u003cDeclarationId\u003e,\n    #[serde(default, skip_serializing_if = \"String::is_empty\")]\n    pub body: String,\n}\n\n// ── Registry ────────────────────────────────────────────────\n\n#[derive(Debug, Clone, Default)]\npub struct Registry {\n    pub features: Vec\u003cFeature\u003e,\n    pub stories: Vec\u003cStory\u003e,\n    pub decisions: Vec\u003cDecision\u003e,\n    pub next_feature_id: u64,\n    pub next_story_id: u64,\n    pub next_decision_id: u64,\n}\n\nimpl Registry {\n    pub fn new() -\u003e Self {\n        Self::default()\n    }\n\n    pub fn feature(\u0026self, id: \u0026FeatureId) -\u003e Option\u003c\u0026Feature\u003e {\n        self.features.iter().find(|f| \u0026f.id == id)\n    }\n\n    pub fn feature_mut(\u0026mut self, id: \u0026FeatureId) -\u003e Option\u003c\u0026mut Feature\u003e {\n        self.features.iter_mut().find(|f| \u0026f.id == id)\n    }\n\n    pub fn story(\u0026self, id: \u0026StoryId) -\u003e Option\u003c\u0026Story\u003e {\n        self.stories.iter().find(|s| \u0026s.id == id)\n    }\n\n    pub fn decision(\u0026self, id: \u0026DecisionId) -\u003e Option\u003c\u0026Decision\u003e {\n        self.decisions.iter().find(|d| \u0026d.id == id)\n    }\n\n    pub fn alloc_feature_id(\u0026mut self) -\u003e FeatureId {\n        let id = FeatureId::new(self.next_feature_id);\n        self.next_feature_id += 1;\n        id\n    }\n\n    pub fn alloc_story_id(\u0026mut self) -\u003e StoryId {\n        let id = StoryId::new(self.next_story_id);\n        self.next_story_id += 1;\n        id\n    }\n\n    pub fn alloc_decision_id(\u0026mut self) -\u003e DecisionId {\n        let id = DecisionId::new(self.next_decision_id);\n        self.next_decision_id += 1;\n        id\n    }\n\n    pub fn active_features(\u0026self) -\u003e Vec\u003c\u0026Feature\u003e {\n        self.features\n            .iter()\n            .filter(|f| !f.status.is_terminal())\n            .collect()\n    }\n\n    pub fn features_by_status(\u0026self, status: FeatureStatus) -\u003e Vec\u003c\u0026Feature\u003e {\n        self.features\n            .iter()\n            .filter(|f| f.status == status)\n            .collect()\n    }\n\n    pub fn features_by_tag(\u0026self, tag: \u0026str) -\u003e Vec\u003c\u0026Feature\u003e {\n        self.features\n            .iter()\n            .filter(|f| f.tags.iter().any(|t| t == tag))\n            .collect()\n    }\n\n    pub fn features_by_story(\u0026self, story_id: \u0026StoryId) -\u003e Vec\u003c\u0026Feature\u003e {\n        self.features\n            .iter()\n            .filter(|f| f.story.as_ref() == Some(story_id))\n            .collect()\n    }\n\n    pub fn features_blocking(\u0026self, feature_id: \u0026FeatureId) -\u003e Vec\u003c\u0026Feature\u003e {\n        self.features\n            .iter()\n            .filter(|f| f.blocks.iter().any(|b| b == feature_id))\n            .collect()\n    }\n\n    pub fn transitive_dependencies(\u0026self, feature_id: \u0026FeatureId) -\u003e Vec\u003c\u0026Feature\u003e {\n        self.transitive_dependencies_depth(feature_id, usize::MAX)\n    }\n\n    pub fn transitive_dependencies_depth(\n        \u0026self,\n        feature_id: \u0026FeatureId,\n        max_depth: usize,\n    ) -\u003e Vec\u003c\u0026Feature\u003e {\n        let mut visited = std::collections::HashSet::new();\n        let mut result = Vec::new();\n        self._collect_deps(feature_id, \u0026mut visited, \u0026mut result, max_depth, 0);\n        result\n    }\n\n    fn _collect_deps\u003c'a\u003e(\n        \u0026'a self,\n        feature_id: \u0026FeatureId,\n        visited: \u0026mut std::collections::HashSet\u003cFeatureId\u003e,\n        result: \u0026mut Vec\u003c\u0026'a Feature\u003e,\n        max_depth: usize,\n        depth: usize,\n    ) {\n        if !visited.insert(feature_id.clone()) || depth \u003e= max_depth {\n            return;\n        }\n        let Some(feature) = self.feature(feature_id) else {\n            return;\n        };\n        for dep_id in \u0026feature.depends_on {\n            if let Some(dep) = self.feature(dep_id) {\n                result.push(dep);\n                self._collect_deps(dep_id, visited, result, max_depth, depth + 1);\n            }\n        }\n    }\n}\n\n// ── Config ──────────────────────────────────────────────────\n\n#[derive(Debug, Clone, Default, Serialize, Deserialize)]\npub struct Config {\n    #[serde(default)]\n    pub registry: RegistryConfig,\n    #[serde(default)]\n    pub counters: CounterConfig,\n    #[serde(default)]\n    pub agent: AgentConfig,\n    #[serde(default)]\n    pub integration: IntegrationConfig,\n}\n\n#[derive(Debug, Clone, Default, Serialize, Deserialize)]\npub struct RegistryConfig {\n    #[serde(default)]\n    pub name: String,\n    #[serde(default)]\n    pub version: String,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct CounterConfig {\n    #[serde(default = \"default_next_feature\")]\n    pub next_feature: u64,\n    #[serde(default = \"default_next_story\")]\n    pub next_story: u64,\n    #[serde(default = \"default_next_decision\")]\n    pub next_decision: u64,\n}\n\nfn default_next_feature() -\u003e u64 {\n    1\n}\nfn default_next_story() -\u003e u64 {\n    1\n}\nfn default_next_decision() -\u003e u64 {\n    1\n}\n\nimpl Default for CounterConfig {\n    fn default() -\u003e Self {\n        Self {\n            next_feature: 1,\n            next_story: 1,\n            next_decision: 1,\n        }\n    }\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct AgentConfig {\n    #[serde(default)]\n    pub context_includes: Vec\u003cString\u003e,\n    #[serde(default = \"default_context_budget\")]\n    pub context_budget: usize,\n}\n\nfn default_context_budget() -\u003e usize {\n    4000\n}\n\nimpl Default for AgentConfig {\n    fn default() -\u003e Self {\n        Self {\n            context_includes: Vec::new(),\n            context_budget: 4000,\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use proptest::prelude::*;\n\n    // ── FeatureStatus state machine invariants ──────────────\n\n    proptest! {\n        #[test]\n        fn status_next_is_monotonic(status in prop_oneof![\n            Just(FeatureStatus::Wish),\n            Just(FeatureStatus::Exploring),\n            Just(FeatureStatus::Scoping),\n            Just(FeatureStatus::Designing),\n            Just(FeatureStatus::Ready),\n            Just(FeatureStatus::InProgress),\n            Just(FeatureStatus::Verifying),\n        ]) {\n            let next = status.next().unwrap();\n            prop_assert!(matches!(\n                (status, next),\n                (FeatureStatus::Wish, FeatureStatus::Exploring)\n                | (FeatureStatus::Exploring, FeatureStatus::Scoping)\n                | (FeatureStatus::Scoping, FeatureStatus::Designing)\n                | (FeatureStatus::Designing, FeatureStatus::Ready)\n                | (FeatureStatus::Ready, FeatureStatus::InProgress)\n                | (FeatureStatus::InProgress, FeatureStatus::Verifying)\n                | (FeatureStatus::Verifying, FeatureStatus::Done),\n            ));\n        }\n\n        #[test]\n        fn terminal_statuses_have_no_next(status in prop_oneof![\n            Just(FeatureStatus::Done),\n            Just(FeatureStatus::Abandoned),\n            Just(FeatureStatus::Deferred),\n        ]) {\n            prop_assert!(status.next().is_none());\n        }\n\n        #[test]\n        fn terminal_and_active_are_mutually_exclusive(status in prop_oneof![\n            Just(FeatureStatus::Wish),\n            Just(FeatureStatus::Exploring),\n            Just(FeatureStatus::Scoping),\n            Just(FeatureStatus::Designing),\n            Just(FeatureStatus::Ready),\n            Just(FeatureStatus::InProgress),\n            Just(FeatureStatus::Verifying),\n            Just(FeatureStatus::Done),\n            Just(FeatureStatus::Abandoned),\n            Just(FeatureStatus::Deferred),\n        ]) {\n            prop_assert!(!(status.is_terminal() \u0026\u0026 status.is_active()));\n        }\n\n        #[test]\n        fn status_display_roundtrip(status in prop_oneof![\n            Just(FeatureStatus::Wish),\n            Just(FeatureStatus::Exploring),\n            Just(FeatureStatus::Scoping),\n            Just(FeatureStatus::Designing),\n            Just(FeatureStatus::Ready),\n            Just(FeatureStatus::InProgress),\n            Just(FeatureStatus::Verifying),\n            Just(FeatureStatus::Done),\n            Just(FeatureStatus::Abandoned),\n            Just(FeatureStatus::Deferred),\n        ]) {\n            let s = status.to_string();\n            prop_assert!(matches!(\n                s.as_str(),\n                \"wish\" | \"exploring\" | \"scoping\" | \"designing\" | \"ready\"\n                | \"in-progress\" | \"verifying\" | \"done\" | \"abandoned\" | \"deferred\"\n            ));\n        }\n    }\n\n    // ── ID generation invariants ────────────────────────────\n\n    proptest! {\n        #[test]\n        fn feature_ids_are_sequential_and_unique(\n            start in 0u64..1000u64,\n            count in 1u64..100u64,\n        ) {\n            let mut registry = Registry {\n                next_feature_id: start,\n                ..Registry::new()\n            };\n            let mut ids = Vec::new();\n            for i in 0..count {\n                let id = registry.alloc_feature_id();\n                prop_assert_eq!(id.0.as_str(), format!(\"FIR-{}\", start + i));\n                ids.push(id);\n            }\n            // All unique\n            let unique: std::collections::HashSet\u003c_\u003e = ids.iter().collect();\n            prop_assert_eq!(unique.len(), ids.len());\n            // Counter advanced correctly\n            prop_assert_eq!(registry.next_feature_id, start + count);\n        }\n\n        #[test]\n        fn all_id_formats_are_correct(\n            feature_n in 0u64..10000u64,\n            story_n in 0u64..10000u64,\n            decision_n in 0u64..10000u64,\n        ) {\n            let fid = FeatureId::new(feature_n);\n            let expected_fid = format!(\"FIR-{feature_n}\");\n            prop_assert_eq!(\u0026fid.0, \u0026expected_fid);\n            prop_assert_eq!(fid.to_string(), expected_fid);\n\n            let sid = StoryId::new(story_n);\n            let expected_sid = format!(\"STORY-{story_n}\");\n            prop_assert_eq!(\u0026sid.0, \u0026expected_sid);\n            prop_assert_eq!(sid.to_string(), expected_sid);\n\n            let did = DecisionId::new(decision_n);\n            let expected_did = format!(\"DEC-{decision_n}\");\n            prop_assert_eq!(\u0026did.0, \u0026expected_did);\n            prop_assert_eq!(did.to_string(), expected_did);\n        }\n    }\n\n    // ── Registry query invariants ───────────────────────────\n\n    proptest! {\n        #[test]\n        fn active_features_excludes_terminal(\n            n in 1usize..20usize,\n        ) {\n            let mut registry = Registry::new();\n            let statuses = [\n                FeatureStatus::Wish,\n                FeatureStatus::Exploring,\n                FeatureStatus::Scoping,\n                FeatureStatus::Designing,\n                FeatureStatus::Ready,\n                FeatureStatus::InProgress,\n                FeatureStatus::Verifying,\n                FeatureStatus::Done,\n                FeatureStatus::Abandoned,\n                FeatureStatus::Deferred,\n            ];\n\n            for i in 0..n {\n                let status = statuses[i % statuses.len()];\n                let id = registry.alloc_feature_id();\n                registry.features.push(Feature {\n                    id,\n                    title: format!(\"Feature {i}\"),\n                    status,\n                    created: chrono::NaiveDate::from_ymd_opt(2026, 1, 1).unwrap(),\n                    updated: None,\n                    author: None,\n                    promoted_from: None,\n                    promoted_date: None,\n                    story: None,\n                    depends_on: Vec::new(),\n                    blocks: Vec::new(),\n                    related: Vec::new(),\n                    children: Vec::new(),\n                    constraints: Vec::new(),\n                    preliminary_constraints: Vec::new(),\n                    decisions: Vec::new(),\n                    source: None,\n                    conversations: Vec::new(),\n                    tags: Vec::new(),\n                    priority: None,\n                    effort_estimate: None,\n                    external: None,\n                    body: String::new(),\n                });\n            }\n\n            let active = registry.active_features();\n            for f in \u0026active {\n                prop_assert!(!f.status.is_terminal());\n            }\n\n            let expected_active = registry.features.iter()\n                .filter(|f| !f.status.is_terminal())\n                .count();\n            prop_assert_eq!(active.len(), expected_active);\n        }\n    }\n\n    // ── Serialization roundtrips ────────────────────────────\n\n    fn arb_feature() -\u003e impl Strategy\u003cValue = Feature\u003e {\n        (any::\u003cu64\u003e(), any::\u003cString\u003e(), any::\u003cString\u003e()).prop_map(|(n, title, body)| Feature {\n            id: FeatureId::new(n),\n            title,\n            status: FeatureStatus::Wish,\n            created: chrono::NaiveDate::from_ymd_opt(2026, 1, 1).unwrap(),\n            updated: None,\n            author: None,\n            promoted_from: None,\n            promoted_date: None,\n            story: None,\n            depends_on: Vec::new(),\n            blocks: Vec::new(),\n            related: Vec::new(),\n            children: Vec::new(),\n            constraints: Vec::new(),\n            preliminary_constraints: Vec::new(),\n            decisions: Vec::new(),\n            source: None,\n            conversations: Vec::new(),\n            tags: Vec::new(),\n            priority: None,\n            effort_estimate: None,\n            external: None,\n            body,\n        })\n    }\n\n    proptest! {\n        #[test]\n        fn feature_json_roundtrip(feature in arb_feature()) {\n            let json = serde_json::to_string(\u0026feature).unwrap();\n            let parsed: Feature = serde_json::from_str(\u0026json).unwrap();\n            prop_assert_eq!(feature, parsed);\n        }\n\n        #[test]\n        fn config_json_roundtrip(config in prop_oneof![\n            Just(Config::default()),\n            Just(Config {\n                counters: CounterConfig {\n                    next_feature: 42,\n                    next_story: 5,\n                    next_decision: 3,\n                },\n                ..Config::default()\n            }),\n        ]) {\n            let json = serde_json::to_string(\u0026config).unwrap();\n            let parsed: Config = serde_json::from_str(\u0026json).unwrap();\n            prop_assert_eq!(config.counters.next_feature, parsed.counters.next_feature);\n            prop_assert_eq!(config.counters.next_story, parsed.counters.next_story);\n            prop_assert_eq!(config.counters.next_decision, parsed.counters.next_decision);\n        }\n    }\n\n    // ── Invalid input rejection ─────────────────────────────\n\n    proptest! {\n        #[test]\n        fn malformed_feature_json_never_panics(\n            bytes in proptest::collection::vec(0u8..=255, 0..=512),\n        ) {\n            let s = String::from_utf8_lossy(\u0026bytes);\n            let _: Result\u003cFeature, _\u003e = serde_json::from_str(\u0026s);\n        }\n\n        #[test]\n        fn unknown_status_json_fails(\n            status in \"[a-zA-Z0-9_-]+\",\n        ) {\n            let json = format!(\n                r#\"{{\"id\":\"FIR-1\",\"title\":\"t\",\"status\":\"{}\",\"created\":\"2026-01-01\",\"body\":\"\"}}\"#,\n                status\n            );\n            let result: Result\u003cFeature, _\u003e = serde_json::from_str(\u0026json);\n            prop_assert!(result.is_err() || status == \"wish\" || status == \"exploring\"\n                || status == \"scoping\" || status == \"designing\" || status == \"ready\"\n                || status == \"in-progress\" || status == \"verifying\" || status == \"done\"\n                || status == \"abandoned\" || status == \"deferred\");\n        }\n\n        #[test]\n        fn structurally_invalid_feature_json_fails(\n            value in prop_oneof![\n                Just(serde_json::Value::Null),\n                Just(serde_json::Value::Bool(true)),\n                Just(serde_json::Value::Number(0.into())),\n                Just(serde_json::Value::Array(vec![])),\n            ],\n        ) {\n            let json = serde_json::to_string(\u0026value).unwrap();\n            let result: Result\u003cFeature, _\u003e = serde_json::from_str(\u0026json);\n            prop_assert!(result.is_err());\n        }\n    }\n\n    // ── Graph traversal tests ──────────────────────────────\n\n    fn build_dep_graph() -\u003e Registry {\n        let mut reg = Registry::new();\n\n        // Feature 0 depends on Feature 1 and Feature 2\n        let f0 = Feature {\n            id: FeatureId::new(0),\n            title: \"Feature 0\".into(),\n            status: FeatureStatus::InProgress,\n            created: chrono::NaiveDate::from_ymd_opt(2024, 1, 1).unwrap(),\n            updated: None,\n            author: None,\n            promoted_from: None,\n            promoted_date: None,\n            story: None,\n            depends_on: vec![FeatureId::new(1), FeatureId::new(2)],\n            blocks: vec![],\n            related: vec![],\n            children: vec![],\n            constraints: vec![],\n            preliminary_constraints: vec![],\n            decisions: vec![],\n            source: None,\n            conversations: vec![],\n            tags: vec![],\n            priority: None,\n            effort_estimate: None,\n            external: None,\n            body: String::new(),\n        };\n        reg.features.push(f0);\n\n        // Feature 1 depends on Feature 3\n        let f1 = Feature {\n            id: FeatureId::new(1),\n            title: \"Feature 1\".into(),\n            status: FeatureStatus::Ready,\n            created: chrono::NaiveDate::from_ymd_opt(2024, 1, 1).unwrap(),\n            updated: None,\n            author: None,\n            promoted_from: None,\n            promoted_date: None,\n            story: None,\n            depends_on: vec![FeatureId::new(3)],\n            blocks: vec![],\n            related: vec![],\n            children: vec![],\n            constraints: vec![],\n            preliminary_constraints: vec![],\n            decisions: vec![],\n            source: None,\n            conversations: vec![],\n            tags: vec![],\n            priority: None,\n            effort_estimate: None,\n            external: None,\n            body: String::new(),\n        };\n        reg.features.push(f1);\n\n        // Feature 2 has no dependencies\n        let f2 = Feature {\n            id: FeatureId::new(2),\n            title: \"Feature 2\".into(),\n            status: FeatureStatus::Done,\n            created: chrono::NaiveDate::from_ymd_opt(2024, 1, 1).unwrap(),\n            updated: None,\n            author: None,\n            promoted_from: None,\n            promoted_date: None,\n            story: None,\n            depends_on: vec![],\n            blocks: vec![],\n            related: vec![],\n            children: vec![],\n            constraints: vec![],\n            preliminary_constraints: vec![],\n            decisions: vec![],\n            source: None,\n            conversations: vec![],\n            tags: vec![],\n            priority: None,\n            effort_estimate: None,\n            external: None,\n            body: String::new(),\n        };\n        reg.features.push(f2);\n\n        // Feature 3 has no dependencies\n        let f3 = Feature {\n            id: FeatureId::new(3),\n            title: \"Feature 3\".into(),\n            status: FeatureStatus::Done,\n            created: chrono::NaiveDate::from_ymd_opt(2024, 1, 1).unwrap(),\n            updated: None,\n            author: None,\n            promoted_from: None,\n            promoted_date: None,\n            story: None,\n            depends_on: vec![],\n            blocks: vec![],\n            related: vec![],\n            children: vec![],\n            constraints: vec![],\n            preliminary_constraints: vec![],\n            decisions: vec![],\n            source: None,\n            conversations: vec![],\n            tags: vec![],\n            priority: None,\n            effort_estimate: None,\n            external: None,\n            body: String::new(),\n        };\n        reg.features.push(f3);\n\n        reg\n    }\n\n    #[test]\n    fn test_transitive_dependencies_simple() {\n        let reg = build_dep_graph();\n        let fid = FeatureId::new(0);\n\n        let deps = reg.transitive_dependencies(\u0026fid);\n        // Should return F1, F2, F3 (direct deps: F1, F2; transitive from F1: F3)\n        assert_eq!(deps.len(), 3);\n        let ids: Vec\u003cFeatureId\u003e = deps.iter().map(|f| f.id.clone()).collect();\n        assert!(ids.contains(\u0026FeatureId::new(1)));\n        assert!(ids.contains(\u0026FeatureId::new(2)));\n        assert!(ids.contains(\u0026FeatureId::new(3)));\n    }\n\n    #[test]\n    fn test_transitive_dependencies_with_max_depth() {\n        let reg = build_dep_graph();\n        let fid = FeatureId::new(0);\n\n        // Max depth 1 should only return direct dependencies\n        let deps = reg.transitive_dependencies_depth(\u0026fid, 1);\n        assert_eq!(deps.len(), 2); // F1 and F2 only\n        let ids: Vec\u003cFeatureId\u003e = deps.iter().map(|f| f.id.clone()).collect();\n        assert!(ids.contains(\u0026FeatureId::new(1)));\n        assert!(ids.contains(\u0026FeatureId::new(2)));\n        assert!(!ids.contains(\u0026FeatureId::new(3)));\n    }\n\n    #[test]\n    fn test_transitive_dependencies_no_deps() {\n        let reg = Registry::new();\n        let fid = FeatureId::new(999); // Non-existent feature\n\n        let deps = reg.transitive_dependencies(\u0026fid);\n        assert_eq!(deps.len(), 0);\n    }\n\n    #[test]\n    fn test_transitive_dependencies_no_cycles() {\n        let mut reg = Registry::new();\n\n        // Create a cycle: F0 -\u003e F1 -\u003e F0\n        let f0 = Feature {\n            id: FeatureId::new(0),\n            title: \"Feature 0\".into(),\n            status: FeatureStatus::InProgress,\n            created: chrono::NaiveDate::from_ymd_opt(2024, 1, 1).unwrap(),\n            updated: None,\n            author: None,\n            promoted_from: None,\n            promoted_date: None,\n            story: None,\n            depends_on: vec![FeatureId::new(1)],\n            blocks: vec![],\n            related: vec![],\n            children: vec![],\n            constraints: vec![],\n            preliminary_constraints: vec![],\n            decisions: vec![],\n            source: None,\n            conversations: vec![],\n            tags: vec![],\n            priority: None,\n            effort_estimate: None,\n            external: None,\n            body: String::new(),\n        };\n        reg.features.push(f0);\n\n        let f1 = Feature {\n            id: FeatureId::new(1),\n            title: \"Feature 1\".into(),\n            status: FeatureStatus::InProgress,\n            created: chrono::NaiveDate::from_ymd_opt(2024, 1, 1).unwrap(),\n            updated: None,\n            author: None,\n            promoted_from: None,\n            promoted_date: None,\n            story: None,\n            depends_on: vec![FeatureId::new(0)],\n            blocks: vec![],\n            related: vec![],\n            children: vec![],\n            constraints: vec![],\n            preliminary_constraints: vec![],\n            decisions: vec![],\n            source: None,\n            conversations: vec![],\n            tags: vec![],\n            priority: None,\n            effort_estimate: None,\n            external: None,\n            body: String::new(),\n        };\n        reg.features.push(f1);\n\n        // Should not panic and should handle cycles gracefully\n        let deps = reg.transitive_dependencies(\u0026FeatureId::new(0));\n        assert!(!deps.is_empty());\n    }\n}\n\n#[derive(Debug, Clone, Serialize, Deser eStatus::InProgress])\n            .resolve();\n\n        assert_eq!(results.len(), 0);\n    }\n}\n\nenum StaleMode {\n    Stale { days: u32, now: chrono::NaiveDate },\n    Recent { days: u32, now: chrono::NaiveDate },\n}\n\n/// Composable query builder over a [`Registry`].\n///\n/// Accumulates filter predicates via a builder API, then resolves them\n/// in a single pass over the feature set via [`resolve`](Self::resolve).\n///\n/// # Example\n/// ```ignore\n/// let features = Query::new(\u0026registry)\n///     .status(vec![FeatureStatus::InProgress, FeatureStatus::Ready])\n///     .tag(\"backend\")\n///     .stale_days(14)\n///     .resolve();\n/// ```\npub struct Query\u003c'a\u003e {\n    registry: \u0026'a Registry,\n    statuses: Vec\u003cFeatureStatus\u003e,\n    tag: Option\u003cString\u003e,\n    story: Option\u003cStoryId\u003e,\n    blocks: Option\u003cFeatureId\u003e,\n    constraint: Option\u003cString\u003e,\n    depends_on: Option\u003cFeatureId\u003e,\n    stale_mode: Option\u003cStaleMode\u003e,\n}\n\nimpl\u003c'a\u003e Query\u003c'a\u003e {\n    pub fn new(registry: \u0026'a Registry) -\u003e Self {\n        Self {\n            registry,\n            statuses: Vec::new(),\n            tag: None,\n            story: None,\n            blocks: None,\n            constraint: None,\n            depends_on: None,\n            stale_mode: None,\n        }\n    }\n\n    /// Filter to features matching any of the given statuses.\n    pub fn status(mut self, statuses: Vec\u003cFeatureStatus\u003e) -\u003e Self {\n        self.statuses = statuses;\n        self\n    }\n\n    /// Filter to features containing the given tag.\n    pub fn tag(mut self, tag: impl Into\u003cString\u003e) -\u003e Self {\n        self.tag = Some(tag.into());\n        self\n    }\n\n    /// Filter to features linked to the given story.\n    pub fn story(mut self, story_id: StoryId) -\u003e Self {\n        self.story = Some(story_id);\n        self\n    }\n\n    /// Filter to feature     let config_path = self.fir_path().join(\"config.toml\");\n        let content = std::fs::read_to_string(\u0026config_path).map_err(|e| {\n            if e.kind() == std::io::ErrorKind::NotFound {\n                BackendError::NotFound(format!(\"config at {:?}\", config_path))\n            } else {\n                BackendError::Io(e)\n            }\n        })?;\n        toml::from_str(\u0026content).map_err(|e| BackendError::Parse(e.to_string()))\n    }\n\n    pub fn archive_feature(\u0026self, id: \u0026FeatureId) -\u003e BackendResult\u003c()\u003e {\n        let src = self.feature_path(id);\n        self.ensure_dirs().map_err(BackendError::Io)?;\n        let dst = self.fir_path().join(\"archive\").join(format!(\"{}.md\", id.0));\n        if src.exists() {\n            std::fs::rename(\u0026src, \u0026dst).map_err(BackendError::Io)?;\n        }\n        Ok(())\n    }\n}\n\nimpl FirBackend for FileBackend {\n    fn load_all(\u0026mut self) -\u003e BackendResult\u003cRegistry\u003e {\n        let config = match self.load_config() {\n            Ok(c) =\u003e c,\n            Err(BackendError::NotFound(_)) =\u003e Config::default(),\n            Err(e) =\u003e return Err(e),\n        };\n\n        let mut registry = Registry {\n            next_feature_id: config.counters.next_feature,\n            next_story_id: config.counters.next_story,\n            next_decision_id: config.counters.next_decision,\n            ..Registry::new()\n        };\n\n        let features_dir = self.fir_path().join(\"features\");\n        if features_dir.exists() {\n            for entry in std::fs::read_dir(\u0026features_dir).map_err(BackendError::Io)? {\n                let entry = entry.map_err(BackendError::Io)?;\n                let path = entry.path();\n                if path.extension().and_then(|e| e.to_str()) == Some(\"md\") {\n                    let (feature, body) = read_md::\u003cFeature\u003e(\u0026path)?;\n                    let mut feature = feature;\n     <script>const e = React.createElement;

function pathToString(path) {
  if (path[0] === '/') {
    return '/' + path.slice(1).join('/');
  } else {
    return path.join('/');
  }
}

function findCommonPath(files) {
  if (!files || !files.length) {
    return [];
  }

  function isPrefix(arr, prefix) {
    if (arr.length < prefix.length) {
      return false;
    }
    for (let i = prefix.length - 1; i >= 0; --i) {
      if (arr[i] !== prefix[i]) {
        return false;
      }
    }
    return true;
  }

  let commonPath = files[0].path.slice(0, -1);
  while (commonPath.length) {
    if (files.every(file => isPrefix(file.path, commonPath))) {
      break;
    }
    commonPath.pop();
  }
  return commonPath;
}

function findFolders(files) {
  if (!files || !files.length) {
    return [];
  }

  let folders = files.filter(file => file.path.length > 1).map(file => file.path[0]);
  folders = [...new Set(folders)]; // unique
  folders.sort();

  folders = folders.map(folder => {
    let filesInFolder = files
      .filter(file => file.path[0] === folder)
      .map(file => ({
        ...file,
        path: file.path.slice(1),
        parent: [...file.parent, file.path[0]],
      }));

    const children = findFolders(filesInFolder); // recursion

    return {
      is_folder: true,
      path: [folder],
      parent: files[0].parent,
      children,
      covered: children.reduce((sum, file) => sum + file.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.coverable, 0),
      prevRun: {
        covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
        coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
      },
    };
  });

  return [...folders, ...files.filter(file => file.path.length === 1)];
}

class App extends React.Component {
  constructor(...args) {
    super(...args);

    this.state = {
      current: [],
    };
  }

  componentDidMount() {
    this.updateStateFromLocation();
    window.addEventListener('hashchange', () => this.updateStateFromLocation(), false);
  }

  updateStateFromLocation() {
    if (window.location.hash.length > 1) {
      const current = window.location.hash.slice(1).split('/');
      this.setState({current});
    } else {
      this.setState({current: []});
    }
  }

  getCurrentPath() {
    let file = this.props.root;
    let path = [file];
    for (let p of this.state.current) {
      file = file.children.find(file => file.path[0] === p);
      if (!file) {
        return path;
      }
      path.push(file);
    }
    return path;
  }

  render() {
    const path = this.getCurrentPath();
    const file = path[path.length - 1];

    let w = null;
    if (file.is_folder) {
      w = e(FilesList, {
        folder: file,
        onSelectFile: this.selectFile.bind(this),
        onBack: path.length > 1 ? this.back.bind(this) : null,
      });
    } else {
      w = e(DisplayFile, {
        file,
        onBack: this.back.bind(this),
      });
    }

    return e('div', {className: 'app'}, w);
  }

  selectFile(file) {
    this.setState(
      ({current}) => {
        return {current: [...current, file.path[0]]};
      },
      () => this.updateHash(),
    );
  }

  back(file) {
    this.setState(
      ({current}) => {
        return {current: current.slice(0, current.length - 1)};
      },
      () => this.updateHash(),
    );
  }

  updateHash() {
    if (!this.state.current || !this.state.current.length) {
      window.location = '#';
    } else {
      window.location = '#' + this.state.current.join('/');
    }
  }
}

function FilesList({folder, onSelectFile, onBack}) {
  let files = folder.children;
  return e(
    'div',
    {className: 'display-folder'},
    e(FileHeader, {file: folder, onBack}),
    e(
      'table',
      {className: 'files-list'},
      e('thead', {className: 'files-list__head'}, e('tr', null, e('th', null, 'Path'), e('th', null, 'Coverage'))),
      e(
        'tbody',
        {className: 'files-list__body'},
        files.map(file => e(File, {file, onClick: onSelectFile})),
      ),
    ),
  );
}

function File({file, onClick}) {
  const coverage = file.coverable ? (file.covered / file.coverable) * 100 : -1;
  const coverageDelta =
    file.prevRun && (file.covered / file.coverable) * 100 - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'tr',
    {
      className:
        'files-list__file' +
        (coverage >= 0 && coverage < 50 ? ' files-list__file_low' : '') +
        (coverage >= 50 && coverage < 80 ? ' files-list__file_medium' : '') +
        (coverage >= 80 ? ' files-list__file_high' : '') +
        (file.is_folder ? ' files-list__file_folder' : ''),
      onClick: () => onClick(file),
    },
    e('td', null, e('a', null, pathToString(file.path))),
    e(
      'td',
      null,
      file.covered + ' / ' + file.coverable + (coverage >= 0 ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
    ),
  );
}

function DisplayFile({file, onBack}) {
  return e('div', {className: 'display-file'}, e(FileHeader, {file, onBack}), e(FileContent, {file}));
}

function FileHeader({file, onBack}) {
  const coverage = (file.covered / file.coverable) * 100;
  const coverageDelta = file.prevRun && coverage - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'div',
    {className: 'file-header'},
    onBack ? e('a', {className: 'file-header__back', onClick: onBack}, 'Back') : null,
    e('div', {className: 'file-header__name'}, pathToString([...file.parent, ...file.path])),
    e(
      'div',
      {className: 'file-header__stat'},
      'Covered: ' + file.covered + ' of ' + file.coverable + (file.coverable ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
      e('input', {id: 'theme-toggle', type: 'checkbox', hidden: true}),
      e('label', {for: 'theme-toggle', id: 'theme-toggle-label'}, '🌙'),
    ),
  );
}

function FileContent({file}) {
  return e(
    'pre',
    {className: 'file-content'},
    file.content.split(/\r?\n/).map((line, index) => {
      const trace = file.traces.find(trace => trace.line === index + 1);
      const covered = trace && trace.stats.Line;
      const uncovered = trace && !trace.stats.Line;
      const nbHit = covered? trace.stats.Line: 0;
      return e(
        'div',
        { className: 'code-text-container' },
        e(
          'code',
          {
            className: 'code-line' + (covered ? ' code-line_covered' : '') + (uncovered ? ' code-line_uncovered' : ''),
          },
          line
        ),
        e(
          'div',
          { className: 'cover-indicator' + (covered? ' check-cover': '') + (uncovered? ' no-cover': '')},
          e(
            'div',
            { className: (covered? 'stat-line-hit': '')},
            covered? nbHit: ""
          )
        )
      );
    }),
  );
}

(function () {
  const commonPath = findCommonPath(data.files);
  const prevFilesMap = new Map();

  previousData &&
    previousData.files.forEach(file => {
      const path = file.path.slice(commonPath.length).join('/');
      prevFilesMap.set(path, file);
    });

  const files = data.files.map(file => {
    const path = file.path.slice(commonPath.length);
    const {covered = 0, coverable = 0} = prevFilesMap.get(path.join('/')) || {};
    return {
      ...file,
      path,
      parent: commonPath,
      prevRun: {covered, coverable},
    };
  });

  const children = findFolders(files);

  const root = {
    is_folder: true,
    children,
    path: commonPath,
    parent: [],
    covered: children.reduce((sum, file) => sum + file.covered, 0),
    coverable: children.reduce((sum, file) => sum + file.coverable, 0),
    prevRun: {
      covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
    },
  };

  ReactDOM.render(e(App, {root, prevFilesMap}), document.getElementById('root'));

  const toggle = document.getElementById('theme-toggle');
  const label = document.getElementById('theme-toggle-label');
  label.textContent = '🌙';

  toggle.addEventListener('change', () => {
    if (toggle.checked) {
      document.documentElement.setAttribute('data-theme', 'dark');
      label.textContent = '☀️';
    } else {
      document.documentElement.removeAttribute('data-theme');
      label.textContent = '🌙';
    }
  });
})();
</script>
</body>
</html>
